<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SNARE SIGHT – リズム初見読譜トレーナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #ff3b5c;
    --accent2: #00e5ff;
    --accent3: #ffd600;
    --text: #e8e8f0;
    --text2: #8888aa;
    --perfect: #00e676;
    --good: #ffd600;
    --miss: #ff3b5c;
    --font-mono: 'Space Mono', monospace;
    --font-display: 'Bebas Neue', sans-serif;
    --font-jp: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-jp);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── SCREENS ─── */
  .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* ─── HOME SCREEN ─── */
  #homeScreen {
    justify-content: flex-start;
    padding: 0;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #homeScreen::before {
    content: '';
    position: absolute;
    top: -120px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,59,92,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .home-header {
    width: 100%;
    padding: 48px 24px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .home-logo {
    font-family: var(--font-display);
    font-size: clamp(52px, 14vw, 80px);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,59,92,0.4);
  }
  .home-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text2);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .level-grid {
    width: 100%;
    padding: 8px 16px 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    max-height: calc(100vh - 220px);
  }
  .level-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .level-btn.locked { opacity: 0.35; }
  .level-btn.unlocked { border-color: var(--border); }
  .level-btn.unlocked:active { transform: scale(0.93); background: var(--surface2); }
  .level-btn .lv-num {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--text);
    line-height: 1;
  }
  .level-btn .lv-label {
    font-size: 9px;
    color: var(--text2);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .level-btn .lv-stars {
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .level-btn.best-s { border-color: var(--accent3); background: rgba(255,214,0,0.06); }
  .level-btn.best-s .lv-num { color: var(--accent3); }

  .home-footer {
    width: 100%;
    padding: 12px 16px 24px;
    display: flex;
    gap: 8px;
  }
  .footer-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 13px;
    font-family: var(--font-jp);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .footer-btn:active { background: var(--surface2); }

  /* ─── PLAY SCREEN ─── */
  #playScreen {
    justify-content: flex-start;
    background: var(--bg);
  }
  .play-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 52px 16px 8px;
  }
  .play-header .back-btn {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text2);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.1em;
    padding: 8px 4px;
  }
  .play-info {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text2);
    text-align: right;
  }
  .play-info span { color: var(--text); }

  /* BPM control */
  .bpm-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 4px 16px 8px;
  }
  .bpm-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .bpm-btn:active { background: var(--surface2); transform: scale(0.9); }
  .bpm-display {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--accent);
    min-width: 90px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .bpm-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.15em;
  }

  /* Score canvas */
  #scoreCanvas {
    display: block;
    width: 100%;
    max-width: 600px;
    touch-action: none;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Phase indicator */
  .phase-display {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.15em;
    color: var(--text2);
    padding: 8px 0 4px;
    text-align: center;
    min-height: 36px;
  }
  .phase-display.counting { color: var(--accent2); }
  .phase-display.playing { color: var(--accent); }

  /* beat dots */
  .beat-dots {
    display: flex;
    gap: 10px;
    padding: 0 0 8px;
  }
  .beat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    transition: background 0.05s;
  }
  .beat-dot.active { background: var(--accent); border-color: var(--accent); }

  /* TAP button */
  .tap-area {
    flex: 1;
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 16px 16px;
    gap: 12px;
  }
  #tapBtn {
    width: 100%;
    max-width: 340px;
    height: 110px;
    border-radius: 20px;
    border: 2px solid var(--accent);
    background: rgba(255,59,92,0.08);
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 52px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.06s;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  #tapBtn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,59,92,0.15);
    opacity: 0;
    transition: opacity 0.06s;
  }
  #tapBtn:active::after { opacity: 1; }
  #tapBtn.flash { background: rgba(255,59,92,0.25); }
  #tapBtn:disabled { opacity: 0.3; border-color: var(--border); color: var(--text2); }

  .start-btn {
    width: 100%;
    max-width: 340px;
    padding: 18px;
    border-radius: 16px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.1s;
  }
  .start-btn:active { transform: scale(0.97); }

  .mic-toggle {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text2);
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.1s;
  }
  .mic-toggle.on { border-color: var(--accent2); color: var(--accent2); }

  /* ─── RESULT SCREEN ─── */
  #resultScreen {
    justify-content: flex-start;
    padding: 0 16px;
    overflow-y: auto;
  }
  .result-header {
    width: 100%;
    padding: 52px 0 16px;
    text-align: center;
  }
  .result-grade {
    font-family: var(--font-display);
    font-size: 96px;
    line-height: 1;
  }
  .grade-S { color: var(--accent3); text-shadow: 0 0 40px rgba(255,214,0,0.5); }
  .grade-A { color: var(--perfect); }
  .grade-B { color: var(--accent2); }
  .grade-C { color: var(--text); }
  .grade-D { color: var(--miss); }

  .result-score {
    font-family: var(--font-display);
    font-size: 42px;
    color: var(--text);
    margin-top: -8px;
  }
  .result-accuracy {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  .result-stats {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 16px 0;
  }
  .stat-box {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    border: 1.5px solid var(--border);
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 36px;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text2);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .stat-box.p .stat-num { color: var(--perfect); }
  .stat-box.g .stat-num { color: var(--good); }
  .stat-box.m .stat-num { color: var(--miss); }

  .result-actions {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 32px;
  }
  .result-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.1s;
    border: none;
  }
  .result-btn:active { transform: scale(0.97); }
  .result-btn.primary { background: var(--accent); color: #fff; }
  .result-btn.secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
  .result-btn.weak { background: var(--surface); color: var(--accent2); border: 1.5px solid var(--accent2); font-size: 16px; font-family: var(--font-jp); letter-spacing: 0; }

  /* ─── WEAK SCREEN ─── */
  #weakScreen {
    justify-content: flex-start;
    padding: 0 16px;
    overflow-y: auto;
  }
  .weak-header {
    width: 100%;
    padding: 52px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .weak-header h2 {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--accent2);
    letter-spacing: 0.1em;
  }
  .weak-list { width: 100%; display: flex; flex-direction: column; gap: 10px; padding-bottom: 32px; }
  .weak-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .weak-item-info { font-size: 13px; color: var(--text2); font-family: var(--font-mono); }
  .weak-item-info span { color: var(--text); display: block; font-size: 15px; }
  .weak-play-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .weak-play-btn:active { background: rgba(255,59,92,0.1); }
  .weak-del-btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    margin-left: 6px;
  }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Judgment popup */
  #judgePop {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    font-family: var(--font-display);
    font-size: 52px;
    letter-spacing: 0.15em;
    pointer-events: none;
    opacity: 0;
    transition: all 0.12s;
    z-index: 50;
  }
  #judgePop.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #judgePop.perfect { color: var(--perfect); }
  #judgePop.good { color: var(--good); }
  #judgePop.miss { color: var(--miss); }
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="home-header">
    <div class="home-logo">SNARE SIGHT</div>
    <div class="home-sub">RHYTHM SIGHT-READING TRAINER</div>
  </div>
  <div class="level-grid" id="levelGrid"></div>
  <div class="home-footer">
    <button class="footer-btn" onclick="showScreen('weakScreen'); renderWeakList()">苦手パターン</button>
    <button class="footer-btn" onclick="showToast('設定は開発中です')">設定</button>
  </div>
</div>

<!-- PLAY -->
<div id="playScreen" class="screen">
  <div class="play-header">
    <button class="back-btn" onclick="stopSession(); showScreen('homeScreen')">← BACK</button>
    <div class="play-info">Lv.<span id="curLvLabel">1</span> &nbsp;|&nbsp; <span id="curBeatLabel">4</span>/4</div>
  </div>
  <div class="bpm-row">
    <button class="bpm-btn" onclick="changeBPM(-5)">−</button>
    <div>
      <div class="bpm-display" id="bpmDisplay">80</div>
      <div class="bpm-label" style="text-align:center">BPM</div>
    </div>
    <button class="bpm-btn" onclick="changeBPM(+5)">+</button>
  </div>
  <canvas id="scoreCanvas"></canvas>
  <div class="phase-display" id="phaseDisplay">– READY –</div>
  <div class="beat-dots" id="beatDots">
    <div class="beat-dot"></div>
    <div class="beat-dot"></div>
    <div class="beat-dot"></div>
    <div class="beat-dot"></div>
  </div>
  <div class="tap-area">
    <button id="tapBtn" disabled ontouchstart="handleTap(event)" onmousedown="handleTap(event)">TAP</button>
    <button class="start-btn" id="startBtn" onclick="startSession()">START</button>
    <button class="mic-toggle" id="micToggle" onclick="toggleMic()">🎙 MIC OFF</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-header">
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-accuracy" id="resultAccuracy"></div>
  </div>
  <div class="result-stats">
    <div class="stat-box p"><div class="stat-num" id="rPerfect">0</div><div class="stat-label">PERFECT</div></div>
    <div class="stat-box g"><div class="stat-num" id="rGood">0</div><div class="stat-label">GOOD</div></div>
    <div class="stat-box m"><div class="stat-num" id="rMiss">0</div><div class="stat-label">MISS</div></div>
  </div>
  <div class="result-actions">
    <button class="result-btn primary" onclick="replaySession()">もう一度</button>
    <button class="result-btn secondary" onclick="newPattern()">新しい譜面</button>
    <button class="result-btn weak" id="weakRegBtn" onclick="registerWeak()">苦手として登録する</button>
    <button class="result-btn secondary" onclick="showScreen('homeScreen')">ホームに戻る</button>
  </div>
</div>

<!-- WEAK -->
<div id="weakScreen" class="screen">
  <div class="weak-header">
    <button class="back-btn" onclick="showScreen('homeScreen')" style="font-family:var(--font-mono);font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;">← BACK</button>
    <h2>WEAK PATTERNS</h2>
  </div>
  <div class="weak-list" id="weakList"></div>
</div>

<div id="toast"></div>
<div id="judgePop"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════
const PERFECT_MS = 80;
const GOOD_MS = 200;
const GRID = 1260; // LCM(4,3,5,6,7,9,... for tuplets)
const BEATS_PER_MEASURE = 4;
const MEASURES = 2;
const TOTAL_BEATS = BEATS_PER_MEASURE * MEASURES;
const CANVAS_H = 210;

let ac = null;
let bpm = 80;
let currentLevel = 1;
let sessionPhase = 'idle'; // idle | counting | playing | done
let patternNotes = []; // [{gridPos, duration, isRest, tuplet}]
let taps = [];
let judgments = []; // per-note: {type, deltaMsRaw}
let tapMarks = []; // {xRatio} for display
let countInBeat = 0;
let animFrameId = null;
let animStartPN = null; // performance.now at pattern start
let patternStartAC = null;
let beatInterval = 0; // seconds per beat
let micStream = null;
let micMode = false;
let analyserNode = null;
let micCheckInterval = null;
let lastMicTrigger = 0;
let scheduledSounds = [];
let currentPatternSeed = null;

// ═══════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'homeScreen') renderLevelGrid();
}

// ═══════════════════════════════════════════════════════
// AUDIO CONTEXT
// ═══════════════════════════════════════════════════════
function getAC() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state === 'suspended') ac.resume();
  return ac;
}

function synthClick(time, accent) {
  const a = getAC();
  const osc = a.createOscillator();
  const g = a.createGain();
  osc.frequency.value = accent ? 1200 : 900;
  g.gain.setValueAtTime(accent ? 0.7 : 0.4, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
  osc.connect(g); g.connect(a.destination);
  osc.start(time); osc.stop(time + 0.05);
}

function synthSnare(time) {
  const a = getAC();
  // noise burst
  const bufLen = a.sampleRate * 0.12;
  const buf = a.createBuffer(1, bufLen, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1);
  const src = a.createBufferSource();
  src.buffer = buf;
  const filter = a.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 3000;
  filter.Q.value = 0.5;
  const g = a.createGain();
  g.gain.setValueAtTime(0.5, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
  src.connect(filter); filter.connect(g); g.connect(a.destination);
  src.start(time); src.stop(time + 0.13);
  // tone body
  const osc = a.createOscillator();
  const g2 = a.createGain();
  osc.frequency.setValueAtTime(200, time);
  osc.frequency.exponentialRampToValueAtTime(80, time + 0.06);
  g2.gain.setValueAtTime(0.6, time);
  g2.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
  osc.connect(g2); g2.connect(a.destination);
  osc.start(time); osc.stop(time + 0.1);
}

// ═══════════════════════════════════════════════════════
// PATTERN GENERATION
// ═══════════════════════════════════════════════════════
// Each note: { gridStart, gridDur, isRest, tuplet|null }
// gridDur in 1260 units: quarter=315, eighth=157.5→round to 158 (use 1260/8=157.5 → use 1260/4=315, 1260/8≈158)
// Actually: GRID per beat = 1260/4 = 315. Full measure = 1260. 2 measures = 2520.
const GRID_BEAT = GRID / 4; // 315 per beat
const GRID_MEASURE = GRID;  // 1260 per measure
const GRID_TOTAL = GRID * MEASURES; // 2520

// Note durations in grid units (relative to 1/4 note = 315)
const DUR = {
  whole: 1260,
  half: 630,
  dottedHalf: 945,
  quarter: 315,
  dottedQuarter: 472, // 315*1.5
  eighth: 157, // 315/2 ≈ 157.5 → 158 but keep 157 for odd fit
  dottedEighth: 236,
  sixteenth: 79, // 315/4
};

function lcm(a, b) { return a * b / gcd(a, b); }
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

// Level configs
const LEVEL_CFG = [
  // Lv1: quarter + half only, no rests, no tuplets
  { notes: ['quarter','half'], restProb: 0, tupletProbs: {} },
  // Lv2: + eighth
  { notes: ['quarter','eighth','half'], restProb: 0.05, tupletProbs: {} },
  // Lv3: + sixteenth
  { notes: ['quarter','eighth','sixteenth'], restProb: 0.1, tupletProbs: {} },
  // Lv4: dotted notes
  { notes: ['quarter','eighth','sixteenth','dottedQuarter','dottedEighth'], restProb: 0.15, tupletProbs: {} },
  // Lv5: triplets
  { notes: ['quarter','eighth','sixteenth'], restProb: 0.15, tupletProbs: {3: 0.2} },
  // Lv6: more rests + triplets
  { notes: ['quarter','eighth','sixteenth'], restProb: 0.25, tupletProbs: {3: 0.3} },
  // Lv7: quintuplets
  { notes: ['quarter','eighth','sixteenth'], restProb: 0.2, tupletProbs: {3: 0.25, 5: 0.15} },
  // Lv8: sextuplets
  { notes: ['quarter','eighth','sixteenth'], restProb: 0.25, tupletProbs: {3: 0.2, 5: 0.15, 6: 0.15} },
  // Lv9: septuplets
  { notes: ['quarter','eighth','sixteenth'], restProb: 0.25, tupletProbs: {3: 0.2, 5: 0.1, 6: 0.1, 7: 0.1} },
  // Lv10: everything
  { notes: ['quarter','eighth','sixteenth','dottedEighth'], restProb: 0.3, tupletProbs: {3: 0.2, 5: 0.1, 6: 0.1, 7: 0.08, 9: 0.05} },
];

// Simple seeded RNG
function makeRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function generatePattern(level, seed) {
  const cfg = LEVEL_CFG[Math.min(level - 1, 9)];
  const rng = makeRng(seed);
  const notes = [];
  let pos = 0;
  const total = GRID_TOTAL;

  while (pos < total) {
    const remaining = total - pos;
    const beatPos = pos % GRID_BEAT; // position within current beat
    const beatRemaining = GRID_BEAT - beatPos;

    // Try tuplet?
    let usedTuplet = false;
    if (beatPos === 0 && beatRemaining === GRID_BEAT) {
      for (const [n, prob] of Object.entries(cfg.tupletProbs)) {
        if (rng() < prob) {
          const count = parseInt(n);
          // Tuplet fills exactly 1 beat (315 grid units)
          const noteDur = Math.floor(GRID_BEAT / count);
          const isRest = rng() < cfg.restProb;
          for (let i = 0; i < count; i++) {
            const d = (i === count - 1) ? (GRID_BEAT - noteDur * (count - 1)) : noteDur;
            notes.push({ gridStart: pos, gridDur: d, isRest: rng() < cfg.restProb * 0.5, tuplet: count, tupletIdx: i, tupletTotal: count });
            pos += d;
          }
          usedTuplet = true;
          break;
        }
      }
    }
    if (usedTuplet) continue;

    // Pick a note duration that fits
    const candidates = cfg.notes.filter(n => DUR[n] <= remaining && DUR[n] <= beatRemaining);
    let candidate;
    if (candidates.length === 0) {
      // Fill with shortest available
      candidate = 'sixteenth';
    } else {
      candidate = candidates[Math.floor(rng() * candidates.length)];
    }

    const dur = Math.min(DUR[candidate], remaining);
    const isRest = rng() < cfg.restProb;
    notes.push({ gridStart: pos, gridDur: dur, isRest, tuplet: null, noteType: candidate });
    pos += dur;
  }

  return notes;
}

// ═══════════════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('scoreCanvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || window.innerWidth;
  canvas.width = w * dpr;
  canvas.height = CANVAS_H * dpr;
  canvas.style.height = CANVAS_H + 'px';
  ctx.scale(dpr, dpr);
  return w;
}

// ── Layout constants for notation (stem-UP style) ──
const STAFF_Y_RATIO = 0.68;  // staff line lower, stems go up with room above
const NOTE_R_W = 8;
const NOTE_R_H = 6;
const STEM_H = 46;
const BEAM_THICK = 6;
const BEAM_GAP = 8;

function noteXCalc(gridStart, scoreLeft, scoreW) {
  // Each measure gets a small inset padding so notes don't sit on barlines
  const PAD = 10; // px padding inside each measure from barline
  const measureW = scoreW / MEASURES;
  const measureIdx = Math.floor(gridStart / GRID_MEASURE);
  const posInMeasure = gridStart % GRID_MEASURE;
  const innerW = measureW - PAD * 2;
  const measureLeft = scoreLeft + measureIdx * measureW + PAD;
  return measureLeft + (posInMeasure / GRID_MEASURE) * innerW;
}

function drawScore(cursorRatio) {
  const w = canvas.offsetWidth || window.innerWidth;
  const h = CANVAS_H;
  ctx.clearRect(0, 0, w, h);

  // Parchment-white background for clear notation
  ctx.fillStyle = '#f8f5ef';
  ctx.fillRect(0, 0, w, h);

  // Layout
  const marginL = 54;
  const marginR = 12;
  const staffY = Math.round(h * STAFF_Y_RATIO);
  const sL = marginL;
  const sW = w - marginL - marginR;
  const nX = (gs) => noteXCalc(gs, sL, sW);

  // ── Percussion clef (two bold vertical bars) ──
  ctx.fillStyle = '#111';
  ctx.fillRect(6,  staffY - 16, 5, 32);
  ctx.fillRect(15, staffY - 16, 5, 32);

  // ── Time signature 4/4 ──
  ctx.fillStyle = '#111';
  ctx.font = 'bold 24px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('4', 40, staffY - 1);
  ctx.fillText('4', 40, staffY + 21);

  // ── Staff line ──
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(sL, staffY);
  ctx.lineTo(sL + sW, staffY);
  ctx.stroke();

  // ── Bar lines ──
  for (let m = 0; m <= MEASURES; m++) {
    const x = sL + (m / MEASURES) * sW;
    ctx.strokeStyle = '#111';
    ctx.lineWidth = m === 0 || m === MEASURES ? 2.5 : 1.6;
    ctx.beginPath();
    ctx.moveTo(x, staffY - 20);
    ctx.lineTo(x, staffY + 20);
    ctx.stroke();
  }

  // ── Faint beat guides ──
  for (let b = 1; b < TOTAL_BEATS; b++) {
    if (b % BEATS_PER_MEASURE === 0) continue;
    const x = sL + (b / TOTAL_BEATS) * sW;
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, staffY - 16);
    ctx.lineTo(x, staffY + 16);
    ctx.stroke();
  }

  if (!patternNotes.length) return;

  // ── Build beam groups per beat (non-rest, non-tuplet, 8th or shorter) ──
  const beamMap = {};
  for (const note of patternNotes) {
    if (note.isRest || note.tuplet) continue;
    if (note.gridDur > DUR.eighth + 5) continue;
    const b = Math.floor(note.gridStart / GRID_BEAT);
    if (!beamMap[b]) beamMap[b] = [];
    beamMap[b].push(note);
  }

  // ── Draw beams (stem-UP: beam at top of stems) ──
  for (const grp of Object.values(beamMap)) {
    if (grp.length < 2) continue;
    const stemTop = staffY - STEM_H;
    const x1 = nX(grp[0].gridStart) + NOTE_R_W;
    const x2 = nX(grp[grp.length - 1].gridStart) + NOTE_R_W;
    ctx.fillStyle = '#111';
    ctx.fillRect(x1, stemTop - BEAM_THICK, x2 - x1, BEAM_THICK);
    // Secondary 16th beam
    const s16 = grp.filter(n => n.gridDur <= DUR.sixteenth + 5);
    if (s16.length >= 2) {
      const sx1 = nX(s16[0].gridStart) + NOTE_R_W;
      const sx2 = nX(s16[s16.length - 1].gridStart) + NOTE_R_W;
      ctx.fillRect(sx1, stemTop - BEAM_THICK - BEAM_GAP, sx2 - sx1, BEAM_THICK);
    }
  }

  // ── Draw each note/rest ──
  for (let i = 0; i < patternNotes.length; i++) {
    const note = patternNotes[i];
    const x = nX(note.gridStart);
    const jud = judgments[i];
    let color = '#111';
    if (jud) {
      if (jud.type === 'perfect') color = '#007a30';
      else if (jud.type === 'good') color = '#9a6800';
      else color = '#bb0015';
    }
    if (note.isRest) {
      drawRest(x, staffY, note.gridDur, color);
    } else {
      const b = Math.floor(note.gridStart / GRID_BEAT);
      const inBeam = beamMap[b] && beamMap[b].length >= 2;
      drawNoteHead(x, staffY, note, color, inBeam);
    }
    if (note.tuplet !== null && note.tupletIdx === 0) {
      drawTuplet(note, patternNotes, nX, staffY);
    }
  }

  // ── Tap marks ──
  for (const tm of tapMarks) {
    const x = noteXCalc(tm.gridPos, sL, sW);
    ctx.strokeStyle = 'rgba(200,20,50,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x, staffY - 24);
    ctx.lineTo(x, staffY + 24);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Cursor ──
  if (cursorRatio !== undefined && cursorRatio >= 0 && cursorRatio <= 1) {
    // Map ratio to grid position, then use noteXCalc for consistent spacing
    const cursorGrid = cursorRatio * GRID_TOTAL;
    const cx = noteXCalc(Math.min(cursorGrid, GRID_TOTAL - 1), sL, sW);
    ctx.strokeStyle = '#e8002a';
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(cx, staffY - 30);
    ctx.lineTo(cx, staffY + 30);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawNoteHead(x, staffY, note, color, inBeamGroup) {
  const dur = note.gridDur;
  const isOpen = dur >= DUR.half;
  const stemTop = staffY - STEM_H;
  const stemX = x + NOTE_R_W;  // right side of head, stem goes up

  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8;

  // Note head: slightly tilted ellipse
  ctx.beginPath();
  ctx.ellipse(x, staffY, NOTE_R_W, NOTE_R_H, -0.25, 0, Math.PI * 2);
  if (isOpen) {
    ctx.stroke();
  } else {
    ctx.fill();
  }

  // Whole note: no stem
  if (dur >= DUR.whole - 5) {
    if (dur > DUR.whole + 5) drawDot(x + NOTE_R_W + 5, staffY - 2, color);
    return;
  }

  // Stem (upward from right side of head)
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(stemX, staffY - NOTE_R_H + 1);
  ctx.lineTo(stemX, stemTop);
  ctx.stroke();

  // Flags (only when not beamed)
  if (!inBeamGroup) {
    if (dur <= DUR.sixteenth + 5) {
      drawFlagUp(stemX, stemTop, color, 2);
    } else if (dur <= DUR.eighth + 5) {
      drawFlagUp(stemX, stemTop, color, 1);
    }
  }

  // Augmentation dot
  if (dur === DUR.dottedHalf || dur === DUR.dottedQuarter || dur === DUR.dottedEighth) {
    drawDot(x + NOTE_R_W + 5, staffY - 2, color);
  }
}

function drawFlagUp(sx, stemTop, color, count) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8;
  for (let f = 0; f < count; f++) {
    const fy = stemTop + f * 8;
    ctx.beginPath();
    ctx.moveTo(sx, fy);
    ctx.bezierCurveTo(sx + 13, fy + 5, sx + 14, fy + 13, sx + 1, fy + 18);
    ctx.stroke();
  }
}

function drawDot(x, y, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 2.8, 0, Math.PI * 2);
  ctx.fill();
}

function drawRest(x, staffY, gridDur, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;

  if (gridDur >= DUR.whole - 5) {
    // Whole rest: thick rectangle hanging below imaginary upper line
    ctx.fillRect(x - 10, staffY - 10, 20, 8);
  } else if (gridDur >= DUR.half - 5) {
    // Half rest: thick rectangle sitting on staff line
    ctx.fillRect(x - 10, staffY + 2, 20, 8);
  } else if (gridDur >= DUR.quarter - 5) {
    // Quarter rest: standard squiggle
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x + 3, staffY - 14);
    ctx.bezierCurveTo(x + 9, staffY - 10, x + 5, staffY - 5, x - 1, staffY - 3);
    ctx.lineTo(x - 5, staffY + 2);
    ctx.bezierCurveTo(x - 2, staffY + 5, x + 5, staffY + 6, x + 2, staffY + 13);
    ctx.stroke();
    ctx.lineCap = 'butt';
  } else if (gridDur >= DUR.eighth - 5) {
    // Eighth rest
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 1, staffY - 9);
    ctx.lineTo(x + 4, staffY + 7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + 4, staffY + 7, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineCap = 'butt';
  } else {
    // Sixteenth rest: two-dot diagonal
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x, staffY - 11);
    ctx.lineTo(x + 5, staffY + 9);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + 5, staffY + 9, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 2, staffY + 1, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineCap = 'butt';
  }
}

function drawTuplet(firstNote, allNotes, nX, staffY) {
  const count = firstNote.tuplet;
  const beatStart = firstNote.gridStart;
  const beatEnd = beatStart + GRID_BEAT;
  const grp = allNotes.filter(n => n.tuplet === count && n.gridStart >= beatStart && n.gridStart < beatEnd);
  if (grp.length < 2) return;

  const x1 = nX(grp[0].gridStart) - NOTE_R_W - 2;
  const x2 = nX(grp[grp.length - 1].gridStart) + NOTE_R_W + 2;
  // Bracket sits just above the noteheads (staff line level - small offset)
  const bracketY = staffY - STEM_H - 14;  // above the beam
  const tickH = 5;

  ctx.strokeStyle = '#333';
  ctx.fillStyle = '#111';
  ctx.lineWidth = 1.4;

  ctx.beginPath();
  ctx.moveTo(x1, bracketY + tickH);
  ctx.lineTo(x1, bracketY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x2, bracketY + tickH);
  ctx.lineTo(x2, bracketY);
  ctx.stroke();

  ctx.font = 'bold 12px Georgia, serif';
  ctx.textAlign = 'center';
  const numW = ctx.measureText(count).width + 6;
  const mid = (x1 + x2) / 2;

  ctx.beginPath();
  ctx.moveTo(x1, bracketY);
  ctx.lineTo(mid - numW / 2, bracketY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(mid + numW / 2, bracketY);
  ctx.lineTo(x2, bracketY);
  ctx.stroke();

  ctx.fillStyle = '#111';
  ctx.fillText(count, mid, bracketY - 1);
}

// ═══════════════════════════════════════════════════════
// SESSION CONTROL
// ═══════════════════════════════════════════════════════
function startSession() {
  getAC();
  stopSession();
  const seed = currentPatternSeed || Date.now();
  currentPatternSeed = seed;
  patternNotes = generatePattern(currentLevel, seed);
  taps = [];
  judgments = new Array(patternNotes.length).fill(null);
  tapMarks = [];
  sessionPhase = 'counting';
  countInBeat = 0;

  beatInterval = 60 / bpm;
  const now = ac.currentTime + 0.1;

  // Schedule count-in (4 beats) + metronome during playing
  const totalBeats = BEATS_PER_MEASURE + TOTAL_BEATS; // 4 count-in + 8 playing
  for (let i = 0; i < totalBeats; i++) {
    const t = now + i * beatInterval;
    synthClick(t, i % 4 === 0);
  }

  // Schedule snare preview? No – user taps.
  // Record pattern start time
  const patternStartACTime = now + BEATS_PER_MEASURE * beatInterval; // after count-in

  // Update phase display on count-in beats
  for (let i = 0; i < BEATS_PER_MEASURE; i++) {
    const delay = (now + i * beatInterval - ac.currentTime) * 1000;
    setTimeout(() => {
      countInBeat = i + 1;
      updateBeatDots(countInBeat - 1);
      updatePhaseDisplay('counting', `COUNT ${countInBeat}`);
    }, delay);
  }

  // On 3rd beat of count-in: set playing phase (so 1st beat tap registers)
  const playPhaseDelay = (now + (BEATS_PER_MEASURE - 1) * beatInterval - ac.currentTime) * 1000;
  setTimeout(() => {
    sessionPhase = 'playing';
    updatePhaseDisplay('playing', 'PLAY!');
    document.getElementById('tapBtn').disabled = false;
    document.getElementById('startBtn').style.display = 'none';

    // Record animStartPN + patternStartAC for cursor
    patternStartAC = patternStartACTime;
    // Calculate animStartPN: when pattern starts in performance.now
    animStartPN = performance.now() + (patternStartACTime - ac.currentTime) * 1000;

    startCursorAnim();
    if (micMode) startMicListening();
  }, playPhaseDelay);

  // End of pattern
  const endDelay = (now + totalBeats * beatInterval - ac.currentTime) * 1000;
  setTimeout(() => {
    endSession();
  }, endDelay + 300);

  updatePhaseDisplay('', '– COUNT IN –');
  document.getElementById('tapBtn').disabled = true;
}

function stopSession() {
  sessionPhase = 'idle';
  cancelAnimationFrame(animFrameId);
  clearInterval(micCheckInterval);
  if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
  document.getElementById('tapBtn').disabled = true;
  document.getElementById('startBtn').style.display = '';
  updateBeatDots(-1);
  updatePhaseDisplay('', '– READY –');
}

function endSession() {
  sessionPhase = 'done';
  cancelAnimationFrame(animFrameId);
  clearInterval(micCheckInterval);
  // Check unmatched notes as MISS
  for (let i = 0; i < patternNotes.length; i++) {
    if (!patternNotes[i].isRest && judgments[i] === null) {
      judgments[i] = { type: 'miss', delta: 999 };
    }
  }
  drawScore(null);
  showResult();
}

function replaySession() {
  // Same pattern, replay
  showScreen('playScreen');
  patternNotes = generatePattern(currentLevel, currentPatternSeed);
  judgments = new Array(patternNotes.length).fill(null);
  tapMarks = [];
  setupCanvas();
  drawScore(undefined);
  document.getElementById('startBtn').style.display = '';
  document.getElementById('tapBtn').disabled = true;
  updatePhaseDisplay('', '– READY –');
  startSession();
}

function newPattern() {
  // Fresh random pattern
  currentPatternSeed = Date.now();
  showScreen('playScreen');
  setupCanvas();
  document.getElementById('curLvLabel').textContent = currentLevel;
  patternNotes = generatePattern(currentLevel, currentPatternSeed);
  judgments = new Array(patternNotes.length).fill(null);
  tapMarks = [];
  drawScore(undefined);
  document.getElementById('startBtn').style.display = '';
  document.getElementById('tapBtn').disabled = true;
  updatePhaseDisplay('', '– READY –');
}

// ═══════════════════════════════════════════════════════
// CURSOR ANIMATION
// ═══════════════════════════════════════════════════════
function startCursorAnim() {
  function frame() {
    if (sessionPhase !== 'playing') return;
    const elapsed = performance.now() - animStartPN; // ms
    const totalMs = TOTAL_BEATS * beatInterval * 1000;
    const ratio = Math.max(0, Math.min(1, elapsed / totalMs));
    drawScore(ratio);
    if (ratio < 1) animFrameId = requestAnimationFrame(frame);
  }
  animFrameId = requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════
// TAP HANDLING & JUDGMENT
// ═══════════════════════════════════════════════════════
function handleTap(e) {
  e.preventDefault();
  if (sessionPhase !== 'playing') return;
  const tapAC = ac.currentTime;
  const tapMs = (tapAC - patternStartAC) * 1000;
  taps.push(tapMs);
  judgeLastTap(tapMs);
  flashTapBtn();

  // tap mark: store as grid position
  const totalMs = TOTAL_BEATS * beatInterval * 1000;
  const gridPos = Math.max(0, Math.min(GRID_TOTAL - 1, (tapMs / totalMs) * GRID_TOTAL));
  tapMarks.push({ gridPos });
}

function judgeLastTap(tapMs) {
  // Find nearest unmatched, non-rest note
  let bestIdx = -1;
  let bestDelta = Infinity;
  const totalMs = TOTAL_BEATS * beatInterval * 1000;

  for (let i = 0; i < patternNotes.length; i++) {
    const note = patternNotes[i];
    if (note.isRest) continue;
    if (judgments[i] !== null) continue;
    const noteMs = (note.gridStart / GRID_TOTAL) * totalMs;
    const delta = Math.abs(tapMs - noteMs);
    if (delta < bestDelta) { bestDelta = delta; bestIdx = i; }
  }

  if (bestIdx === -1) return;
  const note = patternNotes[bestIdx];
  const noteMs = (note.gridStart / GRID_TOTAL) * totalMs;
  const delta = tapMs - noteMs;
  let type;
  if (Math.abs(delta) <= PERFECT_MS) type = 'perfect';
  else if (Math.abs(delta) <= GOOD_MS) type = 'good';
  else type = 'miss';

  // Only match if within 2x GOOD window
  if (Math.abs(delta) > GOOD_MS * 2) return;

  judgments[bestIdx] = { type, delta };
  showJudge(type);
}

function showJudge(type) {
  const el = document.getElementById('judgePop');
  el.className = '';
  el.textContent = type === 'perfect' ? 'PERFECT' : type === 'good' ? 'GOOD' : 'MISS';
  el.classList.add('show', type);
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.classList.remove('show'); }, 500);
}

function flashTapBtn() {
  const btn = document.getElementById('tapBtn');
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 80);
}

// ═══════════════════════════════════════════════════════
// MIC MODE
// ═══════════════════════════════════════════════════════
async function toggleMic() {
  if (!micMode) {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      micMode = true;
      document.getElementById('micToggle').textContent = '🎙 MIC ON';
      document.getElementById('micToggle').classList.add('on');
      showToast('MICモード ON');
    } catch (e) {
      showToast('マイクの使用が拒否されました');
    }
  } else {
    micMode = false;
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    document.getElementById('micToggle').textContent = '🎙 MIC OFF';
    document.getElementById('micToggle').classList.remove('on');
    showToast('MICモード OFF');
  }
}

function startMicListening() {
  if (!micStream) return;
  const a = getAC();
  const src = a.createMediaStreamSource(micStream);
  analyserNode = a.createAnalyser();
  analyserNode.fftSize = 512;
  src.connect(analyserNode);
  const buf = new Float32Array(analyserNode.fftSize);
  let prevRMS = 0;
  const THRESHOLD = 0.04;
  const MIN_INTERVAL_MS = 80;

  micCheckInterval = setInterval(() => {
    if (sessionPhase !== 'playing') return;
    analyserNode.getFloatTimeDomainData(buf);
    let rms = 0;
    for (const v of buf) rms += v * v;
    rms = Math.sqrt(rms / buf.length);
    if (rms > THRESHOLD && rms > prevRMS * 1.5) {
      const now = performance.now();
      if (now - lastMicTrigger > MIN_INTERVAL_MS) {
        lastMicTrigger = now;
        const tapAC = ac.currentTime;
        const tapMs = (tapAC - patternStartAC) * 1000;
        judgeLastTap(tapMs);
        flashTapBtn();
        const totalMs2 = TOTAL_BEATS * beatInterval * 1000;
        const gp = Math.max(0, Math.min(GRID_TOTAL - 1, (tapMs / totalMs2) * GRID_TOTAL));
        tapMarks.push({ gridPos: gp });
      }
    }
    prevRMS = rms;
  }, 10);
}

// ═══════════════════════════════════════════════════════
// RESULT
// ═══════════════════════════════════════════════════════
function calcScore() {
  const nonRests = patternNotes.filter(n => !n.isRest);
  let p = 0, g = 0, m = 0;
  for (let i = 0; i < patternNotes.length; i++) {
    if (patternNotes[i].isRest) continue;
    const j = judgments[i];
    if (!j || j.type === 'miss') m++;
    else if (j.type === 'perfect') p++;
    else g++;
  }
  const total = nonRests.length || 1;
  const accuracy = Math.round(((p + g * 0.5) / total) * 100);
  const score = Math.round((p * 100 + g * 50) / total * 10);
  let grade;
  if (accuracy >= 95) grade = 'S';
  else if (accuracy >= 80) grade = 'A';
  else if (accuracy >= 65) grade = 'B';
  else if (accuracy >= 50) grade = 'C';
  else grade = 'D';
  return { p, g, m, accuracy, score, grade };
}

function showResult() {
  const { p, g, m, accuracy, score, grade } = calcScore();
  document.getElementById('rPerfect').textContent = p;
  document.getElementById('rGood').textContent = g;
  document.getElementById('rMiss').textContent = m;
  const gradeEl = document.getElementById('resultGrade');
  gradeEl.textContent = grade;
  gradeEl.className = 'result-grade grade-' + grade;
  document.getElementById('resultScore').textContent = score + ' pts';
  document.getElementById('resultAccuracy').textContent = `ACCURACY ${accuracy}%`;

  // Unlock next level
  const data = loadLevelData();
  const best = data[currentLevel] || {};
  if (accuracy >= 70 && currentLevel < 10) {
    if (!data[currentLevel + 1]) data[currentLevel + 1] = {};
    saveLevelData(data);
  }
  if (!best.grade || gradeRank(grade) > gradeRank(best.grade)) {
    data[currentLevel] = { grade, accuracy };
    saveLevelData(data);
  }

  showScreen('resultScreen');
}

function gradeRank(g) { return { S: 5, A: 4, B: 3, C: 2, D: 1 }[g] || 0; }

// ═══════════════════════════════════════════════════════
// LEVEL SYSTEM
// ═══════════════════════════════════════════════════════
function loadLevelData() {
  try { return JSON.parse(localStorage.getItem('snareSight_levels') || '{"1":{}}'); } catch { return { '1': {} }; }
}
function saveLevelData(d) { localStorage.setItem('snareSight_levels', JSON.stringify(d)); }

function renderLevelGrid() {
  const grid = document.getElementById('levelGrid');
  const data = loadLevelData();
  grid.innerHTML = '';
  const LEVEL_NAMES = ['初級','初中級','中級','中級+','中上級','中上級+','上級','上級+','最上級','達人'];
  for (let lv = 1; lv <= 10; lv++) {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const info = data[lv];
    const unlocked = !!info || lv === 1;
    btn.classList.add(unlocked ? 'unlocked' : 'locked');
    if (info && info.grade === 'S') btn.classList.add('best-s');
    const stars = info ? (info.accuracy >= 95 ? '★★★' : info.accuracy >= 80 ? '★★☆' : '★☆☆') : '☆☆☆';
    btn.innerHTML = `
      <div class="lv-num">${lv}</div>
      <div class="lv-label">${LEVEL_NAMES[lv-1]}</div>
      <div class="lv-stars">${stars}</div>
    `;
    if (unlocked) {
      btn.onclick = () => {
        currentLevel = lv;
        currentPatternSeed = Date.now();
        showScreen('playScreen');
        setupCanvas();
        document.getElementById('curLvLabel').textContent = lv;
        patternNotes = generatePattern(lv, currentPatternSeed);
        judgments = new Array(patternNotes.length).fill(null);
        tapMarks = [];
        drawScore(undefined);
        document.getElementById('startBtn').style.display = '';
        document.getElementById('tapBtn').disabled = true;
        updatePhaseDisplay('', '– READY –');
      };
    }
    grid.appendChild(btn);
  }
}

// ═══════════════════════════════════════════════════════
// WEAK PATTERNS
// ═══════════════════════════════════════════════════════
function loadWeak() {
  try { return JSON.parse(localStorage.getItem('snareSight_weak') || '[]'); } catch { return []; }
}
function saveWeak(arr) { localStorage.setItem('snareSight_weak', JSON.stringify(arr)); }

function registerWeak() {
  if (!currentPatternSeed) { showToast('パターンがありません'); return; }
  const list = loadWeak();
  if (list.find(w => w.seed === currentPatternSeed)) { showToast('すでに登録済みです'); return; }
  const { accuracy, grade } = calcScore();
  list.push({ seed: currentPatternSeed, level: currentLevel, grade, accuracy, date: Date.now() });
  saveWeak(list);
  showToast('苦手パターンに登録しました');
}

function renderWeakList() {
  const list = loadWeak();
  const el = document.getElementById('weakList');
  el.innerHTML = '';
  if (list.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);font-size:14px;text-align:center;padding:32px">苦手パターンはまだありません</div>';
    return;
  }
  list.forEach((w, i) => {
    const item = document.createElement('div');
    item.className = 'weak-item';
    const d = new Date(w.date);
    item.innerHTML = `
      <div class="weak-item-info">
        <span>Lv.${w.level} — Grade ${w.grade}</span>
        ${d.getMonth()+1}/${d.getDate()} &nbsp; 精度 ${w.accuracy}%
      </div>
      <div style="display:flex;gap:4px">
        <button class="weak-play-btn">練習</button>
        <button class="weak-del-btn">×</button>
      </div>
    `;
    item.querySelector('.weak-play-btn').onclick = () => {
      currentLevel = w.level;
      currentPatternSeed = w.seed;
      showScreen('playScreen');
      setupCanvas();
      document.getElementById('curLvLabel').textContent = w.level;
      patternNotes = generatePattern(w.level, w.seed);
      judgments = new Array(patternNotes.length).fill(null);
      tapMarks = [];
      drawScore(undefined);
      document.getElementById('startBtn').style.display = '';
      document.getElementById('tapBtn').disabled = true;
      updatePhaseDisplay('', '– READY –');
    };
    item.querySelector('.weak-del-btn').onclick = () => {
      const l2 = loadWeak();
      l2.splice(i, 1);
      saveWeak(l2);
      renderWeakList();
    };
    el.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════
// BPM
// ═══════════════════════════════════════════════════════
function changeBPM(delta) {
  bpm = Math.max(40, Math.min(200, bpm + delta));
  document.getElementById('bpmDisplay').textContent = bpm;
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function updatePhaseDisplay(cls, text) {
  const el = document.getElementById('phaseDisplay');
  el.className = 'phase-display' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

function updateBeatDots(activeBeat) {
  const dots = document.querySelectorAll('.beat-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === activeBeat));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  renderLevelGrid();
  setupCanvas();
  window.addEventListener('resize', () => {
    if (document.getElementById('playScreen').classList.contains('active')) {
      setupCanvas();
      if (patternNotes.length) drawScore(undefined);
    }
  });
});
</script>
