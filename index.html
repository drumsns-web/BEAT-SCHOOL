<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>リズム初見練習 — スネアトレーナー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --paper: #fdf8f0;
  --paper2: #f5efe2;
  --ink: #1a1408;
  --ink2: #3a3020;
  --staff: #2a2010;
  --accent: #c8390a;
  --accent2: #1a6b3a;
  --gold: #c8920a;
  --blue: #0a4a8a;
  --muted: #8a7a60;
  --border: #c8b890;
  --shadow: rgba(50,30,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--paper2);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(200,180,140,0.15) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(200,180,140,0.08) 28px);
}

/* HEADER */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255,255,255,0.02) 6px, rgba(255,255,255,0.02) 12px);
}
.header-top {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  position: relative;
  z-index: 1;
}
.app-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--paper);
}
.app-subtitle {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 1px;
}
.header-score {
  text-align: right;
}
.score-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--gold);
  letter-spacing: 2px;
  line-height: 1;
}
.score-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* LEVEL BAR */
.level-bar {
  width: 100%;
  background: rgba(255,255,255,0.05);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 1;
}
.level-chip {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.level-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  flex: 1;
}
.xp-wrap { width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; flex-shrink: 0; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c040); border-radius: 2px; transition: width 0.6s ease; }
.streak-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--accent);
  flex-shrink: 0;
}

/* MAIN */
main { padding: 12px 14px; }

/* INFO ROW */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.time-sig {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
}
.bpm-chip {
  background: var(--ink);
  color: var(--paper);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  padding: 4px 12px;
  border-radius: 3px;
}
.pattern-num {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--muted);
}

/* SHEET MUSIC AREA */
.sheet-wrap {
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 10px 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
  position: relative;
  overflow: hidden;
}
.sheet-wrap::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(200,150,100,0.15);
}
canvas#staffCanvas {
  width: 100%;
  display: block;
}

/* PLAYBACK CURSOR */
.cursor-line {
  position: absolute;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: rgba(200,57,10,0.6);
  border-radius: 1px;
  pointer-events: none;
  display: none;
  box-shadow: 0 0 6px rgba(200,57,10,0.4);
}

/* FEEDBACK */
.feedback-zone {
  min-height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  gap: 4px;
}
.feedback-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 5px;
  line-height: 1;
  transition: all 0.08s;
}
.feedback-main.perfect { color: var(--accent2); }
.feedback-main.good    { color: var(--gold); }
.feedback-main.early   { color: var(--blue); }
.feedback-main.late    { color: var(--blue); }
.feedback-main.miss    { color: var(--accent); }
.feedback-main.ready   { color: var(--muted); font-size: 22px; letter-spacing: 4px; }
.feedback-sub {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* DOTS */
.dots-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  flex-wrap: wrap;
  min-height: 14px;
  margin-bottom: 10px;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--paper2);
  flex-shrink: 0;
}
.dot.p { background: var(--accent2); border-color: var(--accent2); }
.dot.g { background: var(--gold); border-color: var(--gold); }
.dot.m { background: var(--accent); border-color: var(--accent); }
.dot.e,.dot.l { background: var(--blue); border-color: var(--blue); }

/* TAP BUTTON */
.tap-area {
  width: 100%;
  height: 100px;
  background: var(--ink);
  border: none;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.06s;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.05) inset;
}
.tap-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center 30%, rgba(255,255,255,0.04) 0%, transparent 70%);
}
.tap-area:active, .tap-area.hit {
  background: #2a1a0a;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 30px rgba(200,57,10,0.15) inset;
  transform: scale(0.985);
}
.tap-icon {
  font-size: 30px;
  margin-bottom: 4px;
  line-height: 1;
  filter: grayscale(0.3);
}
.tap-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.5);
}
.tap-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transform: scale(0);
  animation: ripple 0.4s ease-out forwards;
  pointer-events: none;
}
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

/* CONTROLS */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.btn {
  padding: 12px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  letter-spacing: 1px;
  box-shadow: 0 1px 4px var(--shadow);
}
.btn:hover { background: var(--paper2); }
.btn:active { transform: scale(0.97); }
.btn.start {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-size: 15px;
  padding: 14px;
  letter-spacing: 3px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.btn.start:hover { background: var(--ink2); }
.btn.listen-btn { border-color: var(--blue); color: var(--blue); }
.btn.next-btn { border-color: var(--accent2); color: var(--accent2); }

/* LEVEL SELECT */
.level-select-wrap {
  margin-bottom: 12px;
}
.level-select-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 6px;
  text-align: center;
}
.level-pills {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}
.level-pill {
  padding: 5px 10px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.level-pill.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
}
.level-pill.locked {
  opacity: 0.35;
  cursor: not-allowed;
}

/* RESULT CARD */
.result-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px var(--shadow);
  display: none;
}
.result-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 10px;
}
.result-grade {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  text-align: center;
  letter-spacing: 4px;
  line-height: 1;
  margin-bottom: 6px;
}
.grade-S { color: var(--gold); }
.grade-A { color: var(--accent2); }
.grade-B { color: var(--blue); }
.grade-C { color: var(--muted); }
.grade-D { color: var(--accent); }
.result-stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 6px;
}
.stat-box {
  background: var(--paper2);
  border-radius: 3px;
  padding: 8px 4px;
  text-align: center;
}
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; }
.stat-lbl { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-top: 2px; }
.stat-val.sv-p { color: var(--accent2); }
.stat-val.sv-g { color: var(--gold); }
.stat-val.sv-m { color: var(--accent); }
.stat-val.sv-a { color: var(--blue); }

/* BPM slider */
.bpm-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 8px;
  box-shadow: 0 1px 4px var(--shadow);
}
.bpm-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); flex-shrink: 0; font-weight: 700; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ink);
  cursor: pointer;
}
.bpm-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--ink);
  min-width: 40px;
  text-align: right;
  flex-shrink: 0;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">初見リズム練習</div>
      <div class="app-subtitle">SNARE SIGHT-READING TRAINER</div>
    </div>
    <div class="header-score">
      <div class="score-val" id="scoreVal">0</div>
      <div class="score-label">TOTAL SCORE</div>
    </div>
  </div>
  <div class="level-bar">
    <div class="level-chip" id="levelChip">Lv.1</div>
    <div class="level-desc" id="levelDesc">四分音符のみ</div>
    <div class="streak-badge" id="streakBadge"></div>
    <div class="xp-wrap"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <!-- Level Select -->
  <div class="level-select-wrap">
    <div class="level-select-title">— LEVEL —</div>
    <div class="level-pills" id="levelPills"></div>
  </div>

  <!-- BPM -->
  <div class="bpm-row">
    <span class="bpm-label">BPM</span>
    <input type="range" id="bpmSlider" min="40" max="160" value="70" oninput="setBpm(+this.value)">
    <span class="bpm-num" id="bpmNum">70</span>
  </div>

  <!-- Info -->
  <div class="info-row">
    <div class="time-sig" id="timeSigLabel">4/4拍子</div>
    <div class="bpm-chip" id="bpmChip">♩= 70</div>
    <div class="pattern-num" id="patNumLabel">パターン #1</div>
  </div>

  <!-- Sheet -->
  <div class="sheet-wrap" id="sheetWrap">
    <canvas id="staffCanvas"></canvas>
    <div class="cursor-line" id="cursorLine"></div>
  </div>

  <!-- Feedback -->
  <div class="feedback-zone">
    <div class="feedback-main ready" id="feedbackMain">譜面を読んでスタート</div>
    <div class="feedback-sub" id="feedbackSub"></div>
  </div>

  <!-- Dots -->
  <div class="dots-row" id="dotsRow"></div>

  <!-- Tap -->
  <div class="tap-area" id="tapArea" ontouchstart="onTap(event)" onmousedown="onTap(event)">
    <div class="tap-icon">🥁</div>
    <div class="tap-label">TAP</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn start" id="startBtn" onclick="startSession()">▶ スタート</button>
    <button class="btn listen-btn" onclick="listenPattern()">👂 聴く</button>
    <button class="btn next-btn" onclick="nextPattern()">→ 次のパターン</button>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-title">— RESULT —</div>
    <div class="result-grade" id="resultGrade">A</div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val sv-p" id="rP">0</div><div class="stat-lbl">PERFECT</div></div>
      <div class="stat-box"><div class="stat-val sv-g" id="rG">0</div><div class="stat-lbl">GOOD</div></div>
      <div class="stat-box"><div class="stat-val sv-m" id="rM">0</div><div class="stat-lbl">MISS</div></div>
      <div class="stat-box"><div class="stat-val sv-a" id="rAcc">0%</div><div class="stat-lbl">精度</div></div>
    </div>
  </div>
</main>

<script>
// ============================================================
// LEVEL DEFINITIONS
// ============================================================
const LEVELS = [
  {
    id:1, name:'Lv.1', desc:'四分音符のみ', timeSig:4, bpm:70,
    patterns: [
      [{t:'q'},{t:'q'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'q'},{t:'r'},{t:'q'}],
      [{t:'q'},{t:'r'},{t:'q'},{t:'q'}],
      [{t:'r'},{t:'q'},{t:'q'},{t:'q'}],
    ]
  },
  {
    id:2, name:'Lv.2', desc:'二分音符・全休符', timeSig:4, bpm:72,
    patterns: [
      [{t:'h'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'h'},{t:'q'}],
      [{t:'q'},{t:'q'},{t:'h'}],
      [{t:'h'},{t:'h'}],
    ]
  },
  {
    id:3, name:'Lv.3', desc:'八分音符入門 (3/4拍子)', timeSig:3, bpm:76,
    patterns: [
      [{t:'q'},{t:'e'},{t:'e'},{t:'q'}],
      [{t:'e'},{t:'e'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'q'},{t:'e'},{t:'e'}],
      [{t:'e'},{t:'e'},{t:'e'},{t:'e'},{t:'q'}],
    ]
  },
  {
    id:4, name:'Lv.4', desc:'八分音符 + 休符 (4/4)', timeSig:4, bpm:80,
    patterns: [
      [{t:'q'},{t:'e'},{t:'e'},{t:'er'},{t:'e'},{t:'q'}],
      [{t:'e'},{t:'e'},{t:'er'},{t:'e'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'er'},{t:'e'},{t:'e'},{t:'e'},{t:'q'}],
      [{t:'e'},{t:'er'},{t:'e'},{t:'e'},{t:'er'},{t:'e'},{t:'q'}],
    ]
  },
  {
    id:5, name:'Lv.5', desc:'シンコペーション基礎', timeSig:4, bpm:84,
    patterns: [
      [{t:'e'},{t:'q.'},{t:'e'},{t:'q'}],  // syncopation
      [{t:'q'},{t:'e'},{t:'q.'},{t:'e'}],
      [{t:'e'},{t:'q'},{t:'e'},{t:'h'}],
      [{t:'q.'},{t:'e'},{t:'q.'},{t:'e'}],
    ]
  },
  {
    id:6, name:'Lv.6', desc:'十六分音符入門', timeSig:4, bpm:80,
    patterns: [
      [{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'q'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'q'},{t:'s'},{t:'s'},{t:'e'},{t:'q'}],
      [{t:'s'},{t:'s'},{t:'e'},{t:'s'},{t:'s'},{t:'e'},{t:'q'}],
    ]
  },
  {
    id:7, name:'Lv.7', desc:'十六分 + 休符', timeSig:4, bpm:84,
    patterns: [
      [{t:'sr'},{t:'s'},{t:'s'},{t:'s'},{t:'q'},{t:'e'},{t:'e'},{t:'q'}],
      [{t:'s'},{t:'s'},{t:'sr'},{t:'s'},{t:'e'},{t:'e'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'sr'},{t:'s'},{t:'s'},{t:'s'},{t:'e'},{t:'e'},{t:'q'}],
      [{t:'s'},{t:'sr'},{t:'s'},{t:'sr'},{t:'q'},{t:'q'},{t:'q'}],
    ]
  },
  {
    id:8, name:'Lv.8', desc:'三連符', timeSig:4, bpm:80,
    patterns: [
      [{t:'t'},{t:'t'},{t:'t'},{t:'q'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'t'},{t:'t'},{t:'t'},{t:'q'},{t:'q'}],
      [{t:'q'},{t:'q'},{t:'t'},{t:'t'},{t:'t'},{t:'q'}],
      [{t:'t'},{t:'t'},{t:'t'},{t:'t'},{t:'t'},{t:'t'},{t:'q'}],
    ]
  },
  {
    id:9, name:'Lv.9', desc:'複合リズム', timeSig:4, bpm:88,
    patterns: [
      // e(0.5)+t*3(1)+s*4(1)+e(0.5)+q(1) = 4.0拍
      [{t:'e'},{t:'t'},{t:'t'},{t:'t'},{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'e'},{t:'q'}],
      // q(1)+t*3(1)+s*4(1)+q(1) = 4.0拍
      [{t:'q'},{t:'t'},{t:'t'},{t:'t'},{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'q'}],
      // t*3(1)+e(0.5)+e(0.5)+s*4(1)+q(1) = 4.0拍
      [{t:'t'},{t:'t'},{t:'t'},{t:'e'},{t:'e'},{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'q'}],
      // e(0.5)+e(0.5)+t*3(1)+e(0.5)+e(0.5)+q(1) = 4.0拍
      [{t:'e'},{t:'e'},{t:'t'},{t:'t'},{t:'t'},{t:'e'},{t:'e'},{t:'q'}],
    ]
  },
  {
    id:10, name:'Lv.10', desc:'上級・5拍子', timeSig:5, bpm:88,
    patterns: [
      // q(1)+e+e(1)+t*3(1)+q(1)+q(1) = 5拍
      [{t:'q'},{t:'e'},{t:'e'},{t:'t'},{t:'t'},{t:'t'},{t:'q'},{t:'q'}],
      // t*3(1)+s*4(1)+q(1)+e+e(1)+q(1) = 5拍
      [{t:'t'},{t:'t'},{t:'t'},{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'q'},{t:'e'},{t:'e'},{t:'q'}],
      // e+e(1)+s*4(1)+t*3(1)+e+e(1)+q(1) = 5拍
      [{t:'e'},{t:'e'},{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'t'},{t:'t'},{t:'t'},{t:'e'},{t:'e'},{t:'q'}],
      // s*4(1)+t*3(1)+q(1)+e+e(1)+q(1) = 5拍
      [{t:'s'},{t:'s'},{t:'s'},{t:'s'},{t:'t'},{t:'t'},{t:'t'},{t:'q'},{t:'e'},{t:'e'},{t:'q'}],
    ]
  },
];

// Note durations in beats
const NOTE_DUR = { q:1, h:2, w:4, 'q.':1.5, e:0.5, 'e.':0.75, er:0.5, s:0.25, sr:0.25, t:1/3 };
const NOTE_IS_REST = { er:true, sr:true, r:true };

// ============================================================
// STATE
// ============================================================
let currentLevel = 0; // index into LEVELS
let currentPatternIdx = 0;
let bpm = 70;
let gameState = 'idle'; // idle | countdown | playing | result
let expectedBeats = []; // { timeMs, idx }
let tapLog = [];
let gameStartTime = 0;
let gameTimer = null;
let listenTimer = null;
let totalScore = 0;
let streak = 0;
let xp = 0;
// localStorageからクリア済みレベルを復元
let unlockedLevel = parseInt(localStorage.getItem('snare_unlockedLevel') || '1', 10);
let patternResults = []; // per-note result: 'p','g','e','l','m'
let audioCtx = null;

// ============================================================
// AUDIO
// ============================================================
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSnare(time, vol=1) {
  const ac = getACtx();
  const t = time ?? ac.currentTime;
  // tone layer
  const osc = ac.createOscillator();
  const og = ac.createGain();
  osc.connect(og); og.connect(ac.destination);
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(60, t+0.1);
  og.gain.setValueAtTime(vol*0.5, t);
  og.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  osc.start(t); osc.stop(t+0.14);
  // noise layer
  const len = Math.floor(ac.sampleRate * 0.18);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/len*14);
  const src = ac.createBufferSource(); src.buffer = buf;
  const hpf = ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=1800;
  const ng = ac.createGain();
  src.connect(hpf); hpf.connect(ng); ng.connect(ac.destination);
  ng.gain.setValueAtTime(vol*1.1, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t+0.16);
  src.start(t); src.stop(t+0.2);
}

function playClick(time, accent=false) {
  const ac = getACtx();
  const t = time ?? ac.currentTime;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.frequency.value = accent ? 1600 : 1000;
  g.gain.setValueAtTime(accent ? 0.5 : 0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.03);
  osc.start(t); osc.stop(t+0.04);
}

// ============================================================
// CANVAS RENDERING
// ============================================================
const NOTE_COLORS = { p:'#1a6b3a', g:'#c8920a', e:'#0a4a8a', l:'#0a4a8a', m:'#c8390a', _:'#1a1408' };

function getPattern() {
  const lv = LEVELS[currentLevel];
  return lv.patterns[currentPatternIdx % lv.patterns.length];
}

function buildBeats(pattern) {
  const beats = [];
  pattern.forEach((note, i) => {
    const isRest = !!NOTE_IS_REST[note.t] || note.t === 'r';
    const dur = NOTE_DUR[note.t] || 1;
    beats.push({ dur, isRest, type: note.t, idx: i });
  });
  return beats;
}

// 三連符グループを検出（連続するtを3個ずつグループ化）
function findTripletGroups(beats) {
  const groups = []; // [{start, end}] beatのindexの範囲
  let i = 0;
  while (i < beats.length) {
    if (beats[i].type === 't' && !beats[i].isRest) {
      const start = i;
      let count = 0;
      while (i < beats.length && beats[i].type === 't' && count < 3) { i++; count++; }
      if (count === 3) groups.push({ start, end: i - 1 });
      else i = start + 1;
    } else {
      i++;
    }
  }
  return groups;
}

// ビームグループ: 同種の音符が連続する範囲（三連符グループも含む）
function findBeamGroups(beats, tripletGroups) {
  const tripletIdxSet = new Set();
  tripletGroups.forEach(g => { for (let i = g.start; i <= g.end; i++) tripletIdxSet.add(i); });

  const groups = [];
  let i = 0;
  while (i < beats.length) {
    const b = beats[i];
    if (b.isRest) { i++; continue; }

    // 三連符グループ
    if (b.type === 't') {
      const tg = tripletGroups.find(g => g.start === i);
      if (tg) {
        groups.push({ type: 't', notes: [tg.start, tg.start+1, tg.end], beamCount: 1 });
        i = tg.end + 1;
        continue;
      }
    }

    // 八分音符グループ（連続するeをまとめる）
    if (b.type === 'e') {
      const start = i;
      while (i < beats.length && beats[i].type === 'e' && !beats[i].isRest) i++;
      if (i - start >= 2) groups.push({ type: 'e', notes: Array.from({length: i-start}, (_,k)=>start+k), beamCount: 1 });
      else i = start + 1;
      continue;
    }

    // 十六分音符グループ
    if (b.type === 's') {
      const start = i;
      while (i < beats.length && beats[i].type === 's' && !beats[i].isRest) i++;
      if (i - start >= 2) groups.push({ type: 's', notes: Array.from({length: i-start}, (_,k)=>start+k), beamCount: 2 });
      else i = start + 1;
      continue;
    }

    i++;
  }
  return groups;
}

function drawStaff() {
  const canvas = document.getElementById('staffCanvas');
  const wrap = document.getElementById('sheetWrap');
  const W = wrap.clientWidth - 20;
  const H = 140; // 高さを増やして三連符括弧が見切れないように
  const DPR = window.devicePixelRatio || 2;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const c = canvas.getContext('2d');
  c.scale(DPR, DPR);
  c.clearRect(0, 0, W, H);

  const pattern = getPattern();
  const beats = buildBeats(pattern);
  const lv = LEVELS[currentLevel];
  const totalDur = beats.reduce((s, b) => s + b.dur, 0);

  // レイアウト定数
  const staffY = 80;          // 五線（単線）Y位置 — 下め
  const stemTop = staffY - 38; // 符尾の先端
  const beamY   = stemTop + 2; // 一次ビームY
  const bracketY = stemTop - 14; // 三連符括弧Y

  const noteAreaStart = 56;
  const noteAreaEnd = W - 14;
  const noteAreaW = noteAreaEnd - noteAreaStart;

  // ── pxPerBeat: 拍数で均等割り、ただし最小幅を保証 ──
  const pxPerBeat = noteAreaW / totalDur;

  // 音符ごとのX中心を計算（音符幅の中央付近）
  const HEAD_OFFSET = 8; // セル左端からの音符頭のオフセット
  function getHeadX(beatIdx) {
    const off = beats.slice(0, beatIdx).reduce((s, x) => s + x.dur, 0);
    return noteAreaStart + off * pxPerBeat + HEAD_OFFSET;
  }
  function getStemX(beatIdx) {
    const rx = (beats[beatIdx].type === 's' || beats[beatIdx].type === 't') ? 5 : 6;
    return getHeadX(beatIdx) + rx;
  }

  // ── 1. スタッフ線（単線パーカッション譜）──
  c.strokeStyle = '#2a2010';
  c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(10, staffY); c.lineTo(W - 10, staffY); c.stroke();

  // ── 2. パーカッションクレフ（縦2本線）──
  c.lineWidth = 3.5;
  c.strokeStyle = '#2a2010';
  c.beginPath(); c.moveTo(14, staffY - 16); c.lineTo(14, staffY + 16); c.stroke();
  c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(20, staffY - 12); c.lineTo(20, staffY + 12); c.stroke();

  // ── 3. 拍子記号 ──
  c.fillStyle = '#1a1408';
  c.font = `bold 20px 'Shippori Mincho', serif`;
  c.textAlign = 'center';
  c.fillText(lv.timeSig, 36, staffY - 2);
  c.fillText('4', 36, staffY + 16);

  // ── 4. 小節線 ──
  const timeSig = lv.timeSig;
  for (let beat = 0; beat <= totalDur + 0.001; beat += timeSig) {
    if (beat > totalDur + 0.001) break;
    const bx = noteAreaStart + beat * pxPerBeat;
    const isLast = beat >= totalDur - 0.001;
    c.strokeStyle = '#2a2010';
    c.lineWidth = isLast ? 2.5 : 1.2;
    c.beginPath();
    c.moveTo(bx, staffY - 14);
    c.lineTo(bx, staffY + 14);
    c.stroke();
    if (isLast) {
      c.lineWidth = 1.2;
      c.beginPath();
      c.moveTo(bx + 5, staffY - 14);
      c.lineTo(bx + 5, staffY + 14);
      c.stroke();
    }
  }

  // ── 5. 拍の薄い目盛り ──
  for (let beat = 1; beat < totalDur; beat += 1) {
    const bx = noteAreaStart + beat * pxPerBeat;
    c.strokeStyle = 'rgba(80,60,20,0.12)';
    c.lineWidth = 1;
    c.beginPath(); c.moveTo(bx, staffY - 5); c.lineTo(bx, staffY + 5); c.stroke();
  }

  // ── 6. ビームグループ・三連符を事前解析 ──
  const tripletGroups = findTripletGroups(beats);
  const beamGroups = findBeamGroups(beats, tripletGroups);
  const beamedSet = new Set();
  beamGroups.forEach(g => g.notes.forEach(n => beamedSet.add(n)));

  // ── 7. 音符を描く ──
  beats.forEach((b, i) => {
    const hx = getHeadX(i);
    const sx = getStemX(i);
    const res = patternResults[b.idx];
    const col = res ? NOTE_COLORS[res] : '#1a1408';

    window._notePositions = window._notePositions || [];
    window._notePositions[i] = { x: hx };

    if (b.isRest) {
      drawRest(c, b.type, hx, staffY, col);
      return;
    }

    // 音符頭
    const rx = (b.type === 's' || b.type === 't') ? 5 : 6;
    const filled = (b.type !== 'h' && b.type !== 'w');
    drawNoteHead(c, hx, staffY, filled, col, rx);

    // 符尾（全音符以外）
    if (b.type !== 'w') {
      c.strokeStyle = col;
      c.lineWidth = 1.5;
      c.beginPath();
      c.moveTo(sx, staffY - rx * 0.7);
      c.lineTo(sx, stemTop);
      c.stroke();

      // フラッグ（ビームなし単独音符のみ）
      if (!beamedSet.has(i)) {
        if (b.type === 'e') drawFlag(c, sx, stemTop, 1, col);
        if (b.type === 's') drawFlag(c, sx, stemTop, 2, col);
        if (b.type === 't') drawFlag(c, sx, stemTop, 1, col); // 単独三連符は旗1本
      }
    }

    // 付点
    if (b.type.includes('.')) {
      c.fillStyle = col;
      c.beginPath();
      c.arc(hx + rx + 4, staffY - 3, 2.5, 0, Math.PI * 2);
      c.fill();
    }
  });

  // ── 8. ビームを描く ──
  beamGroups.forEach(g => {
    const col = '#1a1408'; // ビームは常に黒（採点後も混乱しないよう）
    const nx = g.notes;
    const x1 = getStemX(nx[0]);
    const x2 = getStemX(nx[nx.length - 1]);

    c.strokeStyle = col;
    c.lineWidth = 3.5;
    c.lineCap = 'square';

    // 一次ビーム（八分・三連符すべて）
    c.beginPath();
    c.moveTo(x1, beamY);
    c.lineTo(x2, beamY);
    c.stroke();

    // 二次ビーム（十六分音符）
    if (g.beamCount >= 2) {
      c.beginPath();
      c.moveTo(x1, beamY + 5);
      c.lineTo(x2, beamY + 5);
      c.stroke();
    }

    c.lineCap = 'butt';
    c.lineWidth = 1;

    // 三連符括弧「3」
    if (g.type === 't') {
      const bx1 = getHeadX(nx[0]);
      const bx2 = getHeadX(nx[nx.length - 1]) + 10;
      const mid = (bx1 + bx2) / 2;
      const ty = bracketY;

      c.strokeStyle = '#444';
      c.lineWidth = 1.2;
      // 左の縦線と横線
      c.beginPath();
      c.moveTo(bx1, ty + 6);
      c.lineTo(bx1, ty);
      c.lineTo(mid - 6, ty);
      c.stroke();
      // 右の横線と縦線
      c.beginPath();
      c.moveTo(mid + 6, ty);
      c.lineTo(bx2, ty);
      c.lineTo(bx2, ty + 6);
      c.stroke();
      // 「3」
      c.fillStyle = '#333';
      c.font = 'bold 12px sans-serif';
      c.textAlign = 'center';
      c.fillText('3', mid, ty - 1);
    }
  });

  // 単独三連符（ビームグループに入らなかったt）にも括弧を付ける
  beats.forEach((b, i) => {
    if (b.type !== 't' || b.isRest || beamedSet.has(i)) return;
    // 単独のtに括弧
    const hx = getHeadX(i);
    const sx = getStemX(i);
    const bx1 = hx - 5;
    const bx2 = hx + 10;
    const mid = (bx1 + bx2) / 2;
    const ty = bracketY;
    c.strokeStyle = '#444';
    c.lineWidth = 1.2;
    c.beginPath();
    c.moveTo(bx1, ty + 6); c.lineTo(bx1, ty); c.lineTo(mid - 5, ty); c.stroke();
    c.beginPath();
    c.moveTo(mid + 5, ty); c.lineTo(bx2, ty); c.lineTo(bx2, ty + 6); c.stroke();
    c.fillStyle = '#333';
    c.font = 'bold 12px sans-serif';
    c.textAlign = 'center';
    c.fillText('3', mid, ty - 1);
  });
}

function drawNoteHead(c, x, y, filled, col, rx=6) {
  c.beginPath();
  c.ellipse(x, y, rx, rx*0.75, -0.25, 0, Math.PI*2);
  if (filled) { c.fillStyle=col; c.fill(); }
  else { c.strokeStyle=col; c.lineWidth=1.5; c.stroke(); }
}

function drawFlag(c, x, y, count, col) {
  c.strokeStyle=col; c.lineWidth=1.5;
  for (let f=0; f<count; f++) {
    const fy = y + f*6;
    c.beginPath();
    c.moveTo(x, fy);
    c.bezierCurveTo(x+14, fy+6, x+14, fy+12, x+6, fy+14);
    c.stroke();
  }
}

function drawRest(c, type, x, y, col) {
  c.fillStyle=col; c.strokeStyle=col;
  c.font = `bold 20px serif`;
  c.textAlign='center';
  if (type==='er') { c.fillText('𝄾', x, y+6); }
  else if (type==='sr') { c.fillText('𝄿', x, y+6); }
  else if (type==='r' || type==='qr') {
    c.fillRect(x-6, y-8, 12, 7);
  } else if (type==='hr') {
    c.fillRect(x-6, y, 12, 5);
  } else {
    c.fillStyle=col; c.font='18px serif'; c.fillText('𝄽', x, y+8);
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function setBpm(v) {
  bpm = v;
  document.getElementById('bpmNum').textContent = v;
  document.getElementById('bpmChip').textContent = `♩= ${v}`;
}

function buildExpectedBeats() {
  const pattern = getPattern();
  const secPerBeat = 60 / bpm;
  let timeSec = 0;
  const beats = [];
  pattern.forEach((note, i) => {
    const isRest = !!NOTE_IS_REST[note.t] || note.t === 'r';
    const dur = NOTE_DUR[note.t] || 1;
    // timeMs = patternStartACからの経過秒をmsに変換（オフセットなし）
    if (!isRest) beats.push({ timeSec, timeMs: timeSec * 1000, idx: i, dur });
    timeSec += dur * secPerBeat;
  });
  return beats;
}

let sessionPhase = 'idle';
let countdownTimer = null;

// ★ 核心：AudioContextの時刻を基準にすべてを管理
// patternStartAC = パターン1拍目がAudioContext上で鳴る時刻 (ac.currentTime単位)
// patternStartPN = 同じ瞬間のperformance.now() (ms単位) ← タップ判定に使用
let patternStartAC = 0;
let patternStartPN = 0;

function startSession() {
  if (sessionPhase === 'playing' || sessionPhase === 'countdown') {
    stopSession();
    return;
  }
  getACtx();
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('startBtn').textContent = '&#9209; 停止';
  sessionPhase = 'countdown';

  const ac = getACtx();
  const secPerBeat = 60 / bpm;

  // ac と performance.now を同時取得
  const acNow = ac.currentTime;
  const pnNow = performance.now();

  // インカウント: 1・2・3・4 の4拍
  const countBeats = 4;
  const countStartAC = acNow + 0.1;
  for (let i = 0; i < countBeats; i++) {
    playClick(countStartAC + i * secPerBeat, i === 0);
  }

  // パターン開始 = 4拍目の次の拍
  patternStartAC = countStartAC + countBeats * secPerBeat;
  // patternStartPN: AudioCtxとperformance.nowの対応関係を記録
  patternStartPN = pnNow + (patternStartAC - acNow) * 1000;

  // UI数字表示（音と同タイミング）
  const countStartDelay = (countStartAC - acNow) * 1000;
  for (let i = 0; i < countBeats; i++) {
    const delayMs = countStartDelay + i * secPerBeat * 1000;
    setTimeout(() => {
      if (sessionPhase !== 'countdown') return;
      document.getElementById('feedbackMain').textContent = i + 1;
      document.getElementById('feedbackMain').className = 'feedback-main ready';
      document.getElementById('feedbackSub').textContent = 'インカウント';
    }, delayMs);
  }

  // 4拍目終わり = パターン開始
  const patternStartDelay = countStartDelay + countBeats * secPerBeat * 1000;
  setTimeout(() => {
    if (sessionPhase !== 'countdown') return;
    beginPlay();
  }, patternStartDelay);
}

function beginPlay() {
  sessionPhase = 'playing';
  document.getElementById('feedbackMain').textContent = 'TAP!';
  document.getElementById('feedbackMain').className = 'feedback-main ready';
  document.getElementById('feedbackSub').textContent = '';
  expectedBeats = buildExpectedBeats();
  const pattern = getPattern();
  const lv = LEVELS[currentLevel];
  const ac = getACtx();
  const secPerBeat = 60 / bpm;
  const totalDurBeats = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 1), 0);
  const totalMs = totalDurBeats * secPerBeat * 1000;

  // ★ メトロノームをパターン開始と同じタイムラインでスケジュール
  for (let b = 0; b < Math.ceil(totalDurBeats); b++) {
    playClick(patternStartAC + b * secPerBeat, b % lv.timeSig === 0);
  }

  // ★ バーアニメーション
  // カーソル専用: beginPlay()が呼ばれた「実際の瞬間」のperformance.nowを記録し
  // patternStartAC との差分でAudioCtxと同期させる
  const ac2 = getACtx();
  const acAtBeginPlay = ac2.currentTime;
  const pnAtBeginPlay = performance.now();
  // patternStartAC までの残り時間(ms)。マイナスなら既に過ぎている
  const msUntilPatternStart = (patternStartAC - acAtBeginPlay) * 1000;
  // カーソルの実際の開始点 (performance.now 基準)
  const cursorStartPN = pnAtBeginPlay + msUntilPatternStart;

  const cursorEl = document.getElementById('cursorLine');
  const sheetWrap = document.getElementById('sheetWrap');
  const sheetW = sheetWrap.clientWidth - 20;
  const noteAreaStart = 52;
  const noteAreaEnd = sheetW - 18;
  cursorEl.style.display = 'block';
  cursorEl.style.left = noteAreaStart + 10 + 'px';

  function animCursor() {
    if (sessionPhase !== 'playing') return;
    const elapsedMs = performance.now() - cursorStartPN;
    const pct = Math.max(0, Math.min(elapsedMs / totalMs, 1));
    const cursorX = noteAreaStart + pct * (noteAreaEnd - noteAreaStart);
    cursorEl.style.left = (cursorX + 10) + 'px';

    if (elapsedMs < totalMs) {
      requestAnimationFrame(animCursor);
    } else {
      cursorEl.style.display = 'none';
      setTimeout(evalSession, 200);
    }
  }
  requestAnimationFrame(animCursor);

  // フォールバック終了タイマー
  gameTimer = setTimeout(() => {
    if (sessionPhase === 'playing') evalSession();
  }, totalMs + 800);
}

function stopSession() {
  sessionPhase = 'idle';
  clearTimeout(countdownTimer);
  clearTimeout(gameTimer);
  document.getElementById('cursorLine').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ スタート';
  document.getElementById('feedbackMain').textContent = '停止しました';
  document.getElementById('feedbackMain').className = 'feedback-main ready';
}

function onTap(e) {
  e.preventDefault();
  if (sessionPhase !== 'playing') return;

  // タップ時刻をAudioCtx基準で計算（setTimeout遅延の影響を受けない）
  const ac = getACtx();
  const tapRelMs = (ac.currentTime - patternStartAC) * 1000;

  // ビジュアル
  const btn = document.getElementById('tapArea');
  btn.classList.add('hit');
  setTimeout(() => btn.classList.remove('hit'), 80);
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.cssText = 'width:80px;height:80px;left:50%;top:50%;margin-left:-40px;margin-top:-40px;position:absolute;';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  playSnare();
  tapLog.push(tapRelMs);

  // ★ 即時フィードバック：最近傍の期待ビートとの差
  const PERFECT_MS = 80, GOOD_MS = 160;
  let bestDiff = 9999, bestB = null;
  expectedBeats.forEach(b => {
    const d = Math.abs(b.timeMs - tapRelMs);
    if (d < bestDiff) { bestDiff = d; bestB = b; }
  });
  if (bestDiff < PERFECT_MS) {
    showFeedback('PERFECT!', 'perfect', '');
  } else if (bestDiff < GOOD_MS) {
    const sign = bestB && tapRelMs < bestB.timeMs ? 'EARLY' : 'LATE';
    showFeedback(sign, sign === 'EARLY' ? 'early' : 'late', '');
  } else {
    showFeedback('MISS', 'miss', '');
  }
}

function evalSession() {
  sessionPhase = 'result';
  document.getElementById('cursorLine').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ スタート';

  const PERFECT_MS = 80, GOOD_MS = 160;
  const pattern = getPattern();
  const usedTaps = new Set();
  const results = new Array(pattern.length).fill('m');

  // ★ tapLog はすでにpatternStartPNからの経過ms。expectedBeats.timeMsと直接比較OK
  expectedBeats.forEach(b => {
    let best = null, bestDiff = 9999;
    tapLog.forEach((t, i) => {
      if (usedTaps.has(i)) return;
      const diff = t - b.timeMs;
      if (Math.abs(diff) < Math.abs(bestDiff)) { best = i; bestDiff = diff; }
    });
    if (best !== null && Math.abs(bestDiff) < GOOD_MS) {
      usedTaps.add(best);
      if (Math.abs(bestDiff) < PERFECT_MS) results[b.idx] = 'p';
      else if (bestDiff < 0) results[b.idx] = 'e'; // early
      else results[b.idx] = 'l'; // late
    }
    // else remains 'm'
  });

  patternResults = results;
  drawStaff();
  renderDots(results);

  const total = expectedBeats.length;
  const p = results.filter(r => r === 'p').length;
  const g = results.filter(r => r === 'e' || r === 'l').length;
  const m = results.filter(r => r === 'm').length;
  const acc = total > 0 ? Math.round((p * 100 + g * 50) / (total * 100) * 100) : 0;
  const earned = p * 120 + g * 60 - m * 30;
  totalScore += Math.max(0, earned);

  const grade = acc >= 95 ? 'S' : acc >= 80 ? 'A' : acc >= 65 ? 'B' : acc >= 50 ? 'C' : 'D';
  if (acc >= 60) { streak++; xp += Math.max(0, earned); }
  else { streak = 0; }

  if (acc >= 70 && currentLevel + 1 < LEVELS.length && LEVELS[currentLevel + 1].id > unlockedLevel) {
    unlockedLevel = LEVELS[currentLevel + 1].id;
    localStorage.setItem('snare_unlockedLevel', unlockedLevel);
    renderLevelPills();
  }

  updateXP();
  document.getElementById('scoreVal').textContent = totalScore;
  document.getElementById('streakBadge').textContent = streak > 1 ? `🔥${streak}連続` : '';
  document.getElementById('rP').textContent = p;
  document.getElementById('rG').textContent = g;
  document.getElementById('rM').textContent = m;
  document.getElementById('rAcc').textContent = acc + '%';
  const gradeEl = document.getElementById('resultGrade');
  gradeEl.textContent = grade;
  gradeEl.className = 'result-grade grade-' + grade;
  document.getElementById('resultCard').style.display = 'block';

  const msgs = { S: '完璧！素晴らしい！', A: 'Great！良い精度です', B: 'Good！もう少し！', C: 'Keep going!', D: 'また練習しよう' };
  showFeedback(
    grade === 'S' ? 'PERFECT!' : grade === 'A' ? 'GREAT!' : grade === 'B' ? 'GOOD!' : 'KEEP GOING',
    grade === 'S' || grade === 'A' ? 'perfect' : grade === 'B' ? 'good' : 'miss',
    msgs[grade]
  );
}

function showFeedback(main, cls, sub) {
  const el = document.getElementById('feedbackMain');
  el.textContent = main;
  el.className = 'feedback-main ' + (cls || 'ready');
  document.getElementById('feedbackSub').textContent = sub || '';
}

function renderDots(results) {
  const row = document.getElementById('dotsRow');
  row.innerHTML = results.map(r => `<div class="dot ${r || ''}"></div>`).join('');
}

// ============================================================
// LISTEN MODE
// ============================================================
function listenPattern() {
  if (sessionPhase === 'playing' || sessionPhase === 'countdown') return;
  const ac = getACtx();
  const pattern = getPattern();
  const lv = LEVELS[currentLevel];
  const secPerBeat = 60 / bpm;
  const startT = ac.currentTime + 0.15;
  const totalDur = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 1), 0);

  for (let b = 0; b < Math.ceil(totalDur); b++) {
    playClick(startT + b * secPerBeat, b % lv.timeSig === 0);
  }
  let timeOff = 0;
  pattern.forEach(note => {
    if (!NOTE_IS_REST[note.t] && note.t !== 'r') playSnare(startT + timeOff * secPerBeat);
    timeOff += (NOTE_DUR[note.t] || 1);
  });
  showFeedback('LISTEN...', 'ready', 'メトロノームと音を聴いて覚えよう');
}

// ============================================================
// PATTERN NAVIGATION
// ============================================================
function nextPattern() {
  const lv = LEVELS[currentLevel];
  currentPatternIdx = (currentPatternIdx + 1) % lv.patterns.length;
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('patNumLabel').textContent = `パターン #${currentPatternIdx + 1}`;
  showFeedback('譜面を読んでスタート', 'ready', '');
  drawStaff();
}

// ============================================================
// LEVEL PILLS
// ============================================================
function renderLevelPills() {
  const wrap = document.getElementById('levelPills');
  wrap.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const locked = lv.id > unlockedLevel;
    const pill = document.createElement('div');
    pill.className = 'level-pill' + (i === currentLevel ? ' active' : '') + (locked ? ' locked' : '');
    pill.textContent = locked ? `🔒${lv.name}` : lv.name;
    if (!locked) pill.onclick = () => selectLevel(i);
    wrap.appendChild(pill);
  });
}

function selectLevel(i) {
  if (LEVELS[i].id > unlockedLevel) return;
  currentLevel = i;
  currentPatternIdx = 0;
  patternResults = []; tapLog = [];
  const lv = LEVELS[i];
  bpm = lv.bpm;
  document.getElementById('bpmSlider').value = bpm;
  document.getElementById('bpmNum').textContent = bpm;
  document.getElementById('bpmChip').textContent = `♩= ${bpm}`;
  document.getElementById('levelChip').textContent = lv.name;
  document.getElementById('levelDesc').textContent = lv.desc;
  document.getElementById('timeSigLabel').textContent = `${lv.timeSig}/4拍子`;
  document.getElementById('patNumLabel').textContent = 'パターン #1';
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  showFeedback('譜面を読んでスタート', 'ready', '');
  renderLevelPills();
  drawStaff();
}

function updateXP() {
  const maxXP = LEVELS[currentLevel].id * 500;
  document.getElementById('xpFill').style.width = Math.min(100, xp / maxXP * 100) + '%';
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  renderLevelPills();
  drawStaff();
});

// デバッグ用: localStorage リセット（コンソールから呼べる）
function resetProgress() {
  localStorage.removeItem('snare_unlockedLevel');
  unlockedLevel = 1;
  renderLevelPills();
}

window.addEventListener('resize', () => { drawStaff(); });
</script>
