<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>リズム初見練習 — スネアトレーナー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --paper: #fdf8f0;
  --paper2: #f5efe2;
  --ink: #1a1408;
  --ink2: #3a3020;
  --staff: #2a2010;
  --accent: #c8390a;
  --accent2: #1a6b3a;
  --gold: #c8920a;
  --blue: #0a4a8a;
  --muted: #8a7a60;
  --border: #c8b890;
  --shadow: rgba(50,30,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--paper2);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(200,180,140,0.15) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(200,180,140,0.08) 28px);
}

/* HEADER */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255,255,255,0.02) 6px, rgba(255,255,255,0.02) 12px);
}
.header-top {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  position: relative;
  z-index: 1;
}
.app-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--paper);
}
.app-subtitle {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 1px;
}
.header-score {
  text-align: right;
}
.score-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--gold);
  letter-spacing: 2px;
  line-height: 1;
}
.score-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* LEVEL BAR */
.level-bar {
  width: 100%;
  background: rgba(255,255,255,0.05);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 1;
}
.level-chip {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.level-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  flex: 1;
}
.xp-wrap { width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; flex-shrink: 0; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c040); border-radius: 2px; transition: width 0.6s ease; }
.streak-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--accent);
  flex-shrink: 0;
}

/* MAIN */
main { padding: 12px 14px; }

/* INFO ROW */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.time-sig {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
}
.bpm-chip {
  background: var(--ink);
  color: var(--paper);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  padding: 4px 12px;
  border-radius: 3px;
}
.pattern-num {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--muted);
}

/* SHEET MUSIC AREA */
.sheet-wrap {
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 10px 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
  position: relative;
  overflow: hidden;
}
.sheet-wrap::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(200,150,100,0.15);
}
canvas#staffCanvas {
  width: 100%;
  display: block;
}

/* PLAYBACK CURSOR */
.cursor-line {
  position: absolute;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: rgba(200,57,10,0.6);
  border-radius: 1px;
  pointer-events: none;
  display: none;
  box-shadow: 0 0 6px rgba(200,57,10,0.4);
}

/* FEEDBACK */
.feedback-zone {
  min-height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  gap: 4px;
}
.feedback-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 5px;
  line-height: 1;
  transition: all 0.08s;
}
.feedback-main.perfect { color: var(--accent2); }
.feedback-main.good    { color: var(--gold); }
.feedback-main.early   { color: var(--blue); }
.feedback-main.late    { color: var(--blue); }
.feedback-main.miss    { color: var(--accent); }
.feedback-main.ready   { color: var(--muted); font-size: 22px; letter-spacing: 4px; }
.feedback-sub {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* DOTS */
.dots-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  flex-wrap: wrap;
  min-height: 14px;
  margin-bottom: 10px;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--paper2);
  flex-shrink: 0;
}
.dot.p { background: var(--accent2); border-color: var(--accent2); }
.dot.g { background: var(--gold); border-color: var(--gold); }
.dot.m { background: var(--accent); border-color: var(--accent); }
.dot.e,.dot.l { background: var(--blue); border-color: var(--blue); }

/* TAP BUTTON */
.tap-area {
  width: 100%;
  height: 100px;
  background: var(--ink);
  border: none;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.06s;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.05) inset;
}
.tap-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center 30%, rgba(255,255,255,0.04) 0%, transparent 70%);
}
.tap-area:active, .tap-area.hit {
  background: #2a1a0a;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 30px rgba(200,57,10,0.15) inset;
  transform: scale(0.985);
}
.tap-icon {
  font-size: 30px;
  margin-bottom: 4px;
  line-height: 1;
  filter: grayscale(0.3);
}
.tap-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.5);
}
.tap-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transform: scale(0);
  animation: ripple 0.4s ease-out forwards;
  pointer-events: none;
}
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

/* CONTROLS */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.btn {
  padding: 12px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  letter-spacing: 1px;
  box-shadow: 0 1px 4px var(--shadow);
}
.btn:hover { background: var(--paper2); }
.btn:active { transform: scale(0.97); }
.btn.start {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-size: 15px;
  padding: 14px;
  letter-spacing: 3px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.btn.start:hover { background: var(--ink2); }
.btn.listen-btn { border-color: var(--blue); color: var(--blue); }
.btn.next-btn { border-color: var(--accent2); color: var(--accent2); }

/* LEVEL SELECT */
.level-select-wrap {
  margin-bottom: 12px;
}
.level-select-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 6px;
  text-align: center;
}
.level-pills {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}
.level-pill {
  padding: 5px 10px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.level-pill.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
}
.level-pill.locked {
  opacity: 0.35;
  cursor: not-allowed;
}

/* RESULT CARD */
.result-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px var(--shadow);
  display: none;
}
.result-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 10px;
}
.result-grade {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  text-align: center;
  letter-spacing: 4px;
  line-height: 1;
  margin-bottom: 6px;
}
.grade-S { color: var(--gold); }
.grade-A { color: var(--accent2); }
.grade-B { color: var(--blue); }
.grade-C { color: var(--muted); }
.grade-D { color: var(--accent); }
.result-stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 6px;
}
.stat-box {
  background: var(--paper2);
  border-radius: 3px;
  padding: 8px 4px;
  text-align: center;
}
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; }
.stat-lbl { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-top: 2px; }
.stat-val.sv-p { color: var(--accent2); }
.stat-val.sv-g { color: var(--gold); }
.stat-val.sv-m { color: var(--accent); }
.stat-val.sv-a { color: var(--blue); }

/* BPM slider */
.bpm-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 8px;
  box-shadow: 0 1px 4px var(--shadow);
}
.bpm-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); flex-shrink: 0; font-weight: 700; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ink);
  cursor: pointer;
}
.bpm-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--ink);
  min-width: 40px;
  text-align: right;
  flex-shrink: 0;
}

  /* ===== マイク入力モード ===== */
  .mic-section {
    margin-bottom: 10px;
  }
  .input-mode-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
  }
  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 14px 8px;
    background: white;
    border: 3px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 0 var(--border);
    -webkit-user-select: none;
    user-select: none;
    min-height: 90px;
  }
  .mode-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--border);
  }
  .mode-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    box-shadow: 0 3px 0 #000;
    color: white;
  }
  .mode-btn.active .mode-desc { color: rgba(255,255,255,0.5); }
  .mode-icon { font-size: 32px; line-height: 1; }
  .mode-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--ink);
  }
  .mode-btn.active .mode-label { color: white; }
  .mode-desc {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
  }
  .mic-info-box {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: none;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .mic-info-box.show { display: flex; }
  .mic-status-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mic-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .mic-dot.on  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .mic-dot.hit { background: var(--accent);  box-shadow: 0 0 8px var(--accent); }
  .mic-state-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--muted);
    flex: 1;
  }
  .mic-hit-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.05s;
  }
  .mic-hit-label.show { opacity: 1; }
  .mic-bar-wrap {
    height: 10px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .mic-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 5px;
    transition: width 0.04s;
  }
  .mic-thresh-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
  }

</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">初見リズム練習</div>
      <div class="app-subtitle">SNARE SIGHT-READING TRAINER</div>
    </div>
    <div class="header-score">
      <div class="score-val" id="scoreVal">0</div>
      <div class="score-label">TOTAL SCORE</div>
    </div>
  </div>
  <div class="level-bar">
    <div class="level-chip" id="levelChip">Lv.1</div>
    <div class="level-desc" id="levelDesc">四分音符のみ</div>
    <div class="streak-badge" id="streakBadge"></div>
    <div class="xp-wrap"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <!-- Level Select -->
  <div class="level-select-wrap">
    <div class="level-select-title">— LEVEL —</div>
    <div class="level-pills" id="levelPills"></div>
  </div>

  <!-- 入力モード -->
  <div class="mic-section">
    <div class="input-mode-row">
      <div class="mode-btn active" id="modeTap" ontouchstart="setInputMode('tap')" onclick="setInputMode('tap')">
        <span class="mode-icon">👆</span>
        <span class="mode-label">TAP</span>
        <span class="mode-desc">画面をタップ</span>
      </div>
      <div class="mode-btn" id="modeMic" ontouchstart="setInputMode('mic')" onclick="setInputMode('mic')">
        <span class="mode-icon">🎤</span>
        <span class="mode-label">MIC</span>
        <span class="mode-desc">打音・声で入力</span>
      </div>
    </div>
    <!-- MICモード時の情報ボックス -->
    <div class="mic-info-box" id="micInfoBox">
      <div class="mic-status-row">
        <div class="mic-dot" id="micDot"></div>
        <span class="mic-state-label" id="micStateLabel">マイク起動中...</span>
        <span class="mic-hit-label" id="micHitLabel">HIT!</span>
      </div>
      <div class="mic-bar-wrap">
        <div class="mic-bar-fill" id="micBarFill"></div>
      </div>
      <div class="mic-thresh-row">
        <span>感度（高←→低）</span>
        <input type="range" id="micThresh" min="3" max="300" value="30" style="flex:1;"
          oninput="micThreshold=+this.value;document.getElementById('micThreshVal').textContent=this.value">
        <span id="micThreshVal">30</span>
      </div>
    </div>
  </div>

  <!-- BPM -->
  <div class="bpm-row">
    <span class="bpm-label">BPM</span>
    <input type="range" id="bpmSlider" min="40" max="160" value="70" oninput="setBpm(+this.value)">
    <span class="bpm-num" id="bpmNum">70</span>
  </div>

  <!-- Info -->
  <div class="info-row">
    <div class="time-sig" id="timeSigLabel">4/4拍子</div>
    <div class="bpm-chip" id="bpmChip">♩= 70</div>
    <div class="pattern-num" id="patNumLabel">パターン #1</div>
  </div>

  <!-- Sheet -->
  <div class="sheet-wrap" id="sheetWrap">
    <canvas id="staffCanvas"></canvas>
    <div class="cursor-line" id="cursorLine"></div>
  </div>

  <!-- Feedback -->
  <div class="feedback-zone">
    <div class="feedback-main ready" id="feedbackMain">譜面を読んでスタート</div>
    <div class="feedback-sub" id="feedbackSub"></div>
  </div>

  <!-- Dots -->
  <div class="dots-row" id="dotsRow"></div>

  <!-- Tap -->
  <div class="tap-area" id="tapArea" ontouchstart="onTap(event)" onmousedown="onTap(event)">
    <div class="tap-icon">🥁</div>
    <div class="tap-label">TAP</div>
  </div>

  <!-- Controls -->
  <!-- 苦手モードバナー -->
  <div class="weak-mode-banner" id="weakModeBanner" onclick="exitWeakMode()">
    ★ 苦手パターン練習中 — タップして通常に戻る
  </div>

  <div class="controls">
    <button class="btn start" id="startBtn" onclick="startSession()">▶ スタート</button>
    <button class="btn listen-btn" onclick="listenPattern()">👂 聴く</button>
    <button class="btn next-btn" onclick="nextPattern()">→ 次のパターン</button>
    <button class="btn" id="weakBtn" onclick="toggleWeak()" style="border-color:var(--border);color:var(--muted);">☆ 苦手に追加</button>
    <button class="btn" onclick="toggleWeakPanel()" style="border-color:var(--blue);color:var(--blue);">📋 苦手一覧</button>
  </div>

  <!-- 苦手パターン一覧 -->
  <div class="weak-panel" id="weakPanel" style="display:none;">
    <div class="weak-panel-title">
      <span>— 苦手パターン一覧 —</span>
      <button class="btn" onclick="enterWeakMode()" style="font-size:11px;padding:4px 10px;border-color:var(--accent);color:var(--accent);">まとめて練習</button>
    </div>
    <div class="weak-list" id="weakList"></div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-title">— RESULT —</div>
    <div class="result-grade" id="resultGrade">A</div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val sv-p" id="rP">0</div><div class="stat-lbl">PERFECT</div></div>
      <div class="stat-box"><div class="stat-val sv-g" id="rG">0</div><div class="stat-lbl">GOOD</div></div>
      <div class="stat-box"><div class="stat-val sv-m" id="rM">0</div><div class="stat-lbl">MISS</div></div>
      <div class="stat-box"><div class="stat-val sv-a" id="rAcc">0%</div><div class="stat-lbl">精度</div></div>
    </div>
  </div>
</main>

<script>
// ============================================================
// ============================================================
// LEVEL DEFINITIONS & RANDOM PATTERN GENERATOR
// ============================================================

// 各レベルの定義（固定パターンは削除し、ランダム生成ルールのみ持つ）
const LEVELS = [
  { id:1,  name:'Lv.1',  desc:'四分音符・四分休符',       timeSig:4, bpm:70  },
  { id:2,  name:'Lv.2',  desc:'二分音符',                  timeSig:4, bpm:72  },
  { id:3,  name:'Lv.3',  desc:'八分音符入門 (3/4)',         timeSig:3, bpm:76  },
  { id:4,  name:'Lv.4',  desc:'八分音符 + 休符 (4/4)',      timeSig:4, bpm:80  },
  { id:5,  name:'Lv.5',  desc:'付点・シンコペーション',     timeSig:4, bpm:84  },
  { id:6,  name:'Lv.6',  desc:'十六分音符入門',             timeSig:4, bpm:80  },
  { id:7,  name:'Lv.7',  desc:'十六分 + 休符',              timeSig:4, bpm:84  },
  { id:8,  name:'Lv.8',  desc:'三連符',                     timeSig:4, bpm:80  },
  { id:9,  name:'Lv.9',  desc:'複合リズム',                 timeSig:4, bpm:88  },
  { id:10, name:'Lv.10', desc:'上級・5拍子',                timeSig:5, bpm:88  },
];

// Note durations in beats
const NOTE_DUR    = { q:1, h:2, w:4, r:1, 'q.':1.5, e:0.5, 'e.':0.75, er:0.5, s:0.25, sr:0.25, t:1/3 };
const NOTE_IS_REST = { er:true, sr:true, r:true };

// ── ランダムパターン生成 ──────────────────────────────────────
// 拍数を満たすまで「使えるセル」からランダムに選んで並べる
function generatePattern(levelIdx) {
  const lv    = LEVELS[levelIdx];
  const total = lv.timeSig;
  const cells = makeCells(levelIdx);

  // セルのbeatsをNOTE_DURから計算（定義ミスを防ぐ）
  cells.forEach(c => {
    c.beats = c.notes.reduce((s, n) => s + (NOTE_DUR[n.t] || 0), 0);
  });

  for (let attempt = 0; attempt < 400; attempt++) {
    const result    = [];
    let remaining   = total;
    let ok          = true;

    while (remaining > 0.0001) {
      const usable = cells.filter(c => c.beats <= remaining + 0.0001);
      if (!usable.length) { ok = false; break; }
      const pick = usable[Math.floor(Math.random() * usable.length)];
      result.push(...pick.notes);
      remaining = +(remaining - pick.beats).toFixed(6);
    }

    if (ok && remaining < 0.001) {
      // 最低1つ実音が必要
      if (result.some(n => !NOTE_IS_REST[n.t] && n.t !== 'r')) return result;
    }
  }
  // フォールバック
  return Array.from({length: total}, () => ({t:'q'}));
}

function makeCells(levelIdx) {
  const id = levelIdx + 1;
  // 共通セル（全レベルで使える）
  const base = [];

  if (id === 1) {
    // 四分音符を多めに、休符は少なめ
    return [
      { notes:[{t:'q'}] }, { notes:[{t:'q'}] }, { notes:[{t:'q'}] },
      { notes:[{t:'q'}] }, { notes:[{t:'q'}] }, // 音符を多く
      { notes:[{t:'r'}] }, // 四分休符（少なめ）
    ];
  }

  if (id === 2) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 3) {
    // 3/4拍子: 3拍
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] }, // 八分×2=1拍
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 4) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'er'},{t:'e'}] }, // 八分休+八分
      { notes:[{t:'e'},{t:'er'}] }, // 八分+八分休
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 5) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'e'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 6) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] }, // 十六分×4=1拍
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'e'}] }, // 十六+十六+八=1拍
      { notes:[{t:'e'},{t:'s'},{t:'s'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 7) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'s'},{t:'s'}] }, // 十六休+十六×3
      { notes:[{t:'s'},{t:'sr'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'sr'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'sr'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'e'}] },
      { notes:[{t:'e'},{t:'sr'},{t:'s'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 8) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] }, // 八分三連=1拍
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 9) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'e'}] },
      { notes:[{t:'e'},{t:'s'},{t:'s'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'e'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 10) {
    // 5拍子: より複雑な組み合わせ
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'e'}] },
      { notes:[{t:'e'},{t:'s'},{t:'s'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'e'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  return [{ notes:[{t:'q'}] }];
}

// パターンをキー文字列に変換（苦手保存・重複排除用）
function patternToKey(pattern) {
  return pattern.map(n => n.t).join(',');
}

function getPattern() {
  if (weakPatternMode && currentWeakPattern) return currentWeakPattern;
  if (!currentGeneratedPattern) currentGeneratedPattern = generatePattern(currentLevel);
  return currentGeneratedPattern;
}

function refreshPattern() {

}

// AUDIO
// ============================================================
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSnare(time, vol=1) {
  const ac = getACtx();
  const t = time ?? ac.currentTime;
  // tone layer
  const osc = ac.createOscillator();
  const og = ac.createGain();
  osc.connect(og); og.connect(ac.destination);
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(60, t+0.1);
  og.gain.setValueAtTime(vol*0.5, t);
  og.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  osc.start(t); osc.stop(t+0.14);
  // noise layer
  const len = Math.floor(ac.sampleRate * 0.18);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/len*14);
  const src = ac.createBufferSource(); src.buffer = buf;
  const hpf = ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=1800;
  const ng = ac.createGain();
  src.connect(hpf); hpf.connect(ng); ng.connect(ac.destination);
  ng.gain.setValueAtTime(vol*1.1, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t+0.16);
  src.start(t); src.stop(t+0.2);
}

function playClick(time, accent=false) {
  const ac = getACtx();
  const t = time ?? ac.currentTime;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.frequency.value = accent ? 1600 : 1000;
  g.gain.setValueAtTime(accent ? 0.5 : 0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.03);
  osc.start(t); osc.stop(t+0.04);
}

// CANVAS RENDERING
// ============================================================
const NOTE_COLORS = { p:'#1a6b3a', g:'#c8920a', e:'#0a4a8a', l:'#0a4a8a', m:'#c8390a', _:'#1a1408' };

function buildBeats(pattern) {
  const beats = [];
  pattern.forEach((note, i) => {
    const isRest = !!NOTE_IS_REST[note.t] || note.t === 'r';
    const dur = NOTE_DUR[note.t] || 1;
    beats.push({ dur, isRest, type: note.t, idx: i });
  });
  return beats;
}

// 連続するtを3個ずつ三連符グループにまとめる
function findTripletGroups(beats) {
  const groups = [];
  let i = 0;
  while (i < beats.length) {
    if (beats[i].type === 't' && !beats[i].isRest) {
      const start = i;
      let cnt = 0;
      while (i < beats.length && beats[i].type === 't' && cnt < 3) { i++; cnt++; }
      if (cnt === 3) groups.push({ start, end: i - 1 });
      else i = start + 1;
    } else { i++; }
  }
  return groups;
}

// ビームグループを検出
function findBeamGroups(beats, tripletGroups) {
  const tripletStarts = new Set(tripletGroups.map(g => g.start));
  const tripletAll    = new Set(tripletGroups.flatMap(g => [g.start, g.start+1, g.end]));
  const groups = [];
  let i = 0;
  while (i < beats.length) {
    const b = beats[i];
    if (b.isRest || b.type === 'q' || b.type === 'h' || b.type === 'w' || b.type === 'q.') { i++; continue; }
    if (b.type === 't') {
      if (tripletStarts.has(i)) {
        const g = tripletGroups.find(g => g.start === i);
        groups.push({ type:'t', notes:[g.start, g.start+1, g.end], beamCount:1 });
        i = g.end + 1;
      } else { i++; }
      continue;
    }
    // e or s: 連続する同種をまとめる
    const type = b.type; // 'e' or 's'
    const start = i;
    while (i < beats.length && beats[i].type === type && !beats[i].isRest) i++;
    if (i - start >= 2) {
      groups.push({ type, notes: Array.from({length:i-start},(_,k)=>start+k), beamCount: type==='s'?2:1 });
    }
    // 1個だけなら単独（フラッグで描く）
  }
  return groups;
}

function drawStaff() {
  const canvas  = document.getElementById('staffCanvas');
  const wrap    = document.getElementById('sheetWrap');
  const W = wrap.clientWidth - 20;
  const H = 150;
  const DPR = window.devicePixelRatio || 2;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const c = canvas.getContext('2d');
  c.scale(DPR, DPR);
  c.clearRect(0, 0, W, H);

  const pattern = getPattern();
  const beats   = buildBeats(pattern);
  const lv      = LEVELS[currentLevel];
  const totalDur = beats.reduce((s,b) => s+b.dur, 0);

  // ── レイアウト定数 ──────────────────────────────────
  // 一線パーカッション譜: 音符頭は線の上、符尾は上向き（スネア標準）
  const lineY     = 90;   // スタッフ線Y（下めに置いて上に余白）
  const headAbove = 10;   // 音符頭中心は lineY - headAbove
  const noteY     = lineY - headAbove;  // 音符頭中心
  const stemTop   = noteY - 34;         // 符尾の上端（上向き）
  const beamY     = stemTop + 4;        // 一次ビームY（符尾の上端近く）
  const bracketY  = stemTop - 16;       // 三連符括弧Y（ビームの上）
  const flagStartY = stemTop;           // フラッグ起点（上端）

  const noteAreaStart = 58;
  const noteAreaEnd   = W - 14;
  const pxPerBeat     = (noteAreaEnd - noteAreaStart) / totalDur;
  const HEAD_OFFSET   = 8; // セル左端から音符頭中心までのオフセット

  function getHeadX(i) {
    const off = beats.slice(0,i).reduce((s,x)=>s+x.dur,0);
    return noteAreaStart + off * pxPerBeat + HEAD_OFFSET;
  }
  function getStemX(i) {
    const rx = (beats[i].type==='s'||beats[i].type==='t') ? 5 : 6;
    return getHeadX(i) + rx; // 右端から符尾（下向きは右側）
  }

  // ── 1. スタッフ線 ─────────────────────────────────
  c.strokeStyle = '#2a2010';
  c.lineWidth   = 1.8;
  c.beginPath(); c.moveTo(12, lineY); c.lineTo(W-12, lineY); c.stroke();

  // ── 2. パーカッションクレフ（縦2本線）────────────────
  c.lineWidth = 4;
  c.strokeStyle = '#1a1408';
  c.beginPath(); c.moveTo(15, lineY-20); c.lineTo(15, lineY+20); c.stroke();
  c.lineWidth = 1.8;
  c.beginPath(); c.moveTo(21, lineY-14); c.lineTo(21, lineY+14); c.stroke();

  // ── 3. 拍子記号 ───────────────────────────────────
  c.fillStyle  = '#1a1408';
  c.textAlign  = 'center';
  c.font = 'bold 20px serif';
  c.fillText(String(lv.timeSig), 38, lineY - 2);
  c.fillText('4', 38, lineY + 17);

  // ── 4. 小節線 ─────────────────────────────────────
  for (let beat=0; beat <= totalDur+0.001; beat += lv.timeSig) {
    if (beat > totalDur+0.001) break;
    const bx = noteAreaStart + beat * pxPerBeat;
    const isLast = beat >= totalDur - 0.001;
    c.strokeStyle = '#1a1408';
    c.lineWidth   = isLast ? 2.5 : 1.2;
    c.beginPath(); c.moveTo(bx, lineY-16); c.lineTo(bx, lineY+16); c.stroke();
    if (isLast) {
      c.lineWidth = 1.2;
      c.beginPath(); c.moveTo(bx+5, lineY-16); c.lineTo(bx+5, lineY+16); c.stroke();
    }
  }

  // ── 5. 拍目盛り（薄く）────────────────────────────
  for (let beat=1; beat<totalDur; beat+=1) {
    const bx = noteAreaStart + beat * pxPerBeat;
    c.strokeStyle = 'rgba(80,60,20,0.1)';
    c.lineWidth = 1;
    c.beginPath(); c.moveTo(bx, lineY-4); c.lineTo(bx, lineY+4); c.stroke();
  }

  // ── 6. グループ解析 ───────────────────────────────
  const tripletGroups = findTripletGroups(beats);
  const beamGroups    = findBeamGroups(beats, tripletGroups);
  const beamedSet     = new Set(beamGroups.flatMap(g => g.notes));
  window._notePositions = [];

  // ── 7. 音符・休符 ─────────────────────────────────
  beats.forEach((b, i) => {
    const hx  = getHeadX(i);
    const sx  = getStemX(i);
    const res = patternResults[b.idx];
    const col = res ? NOTE_COLORS[res] : '#1a1408';
    window._notePositions[i] = { x: hx };

    if (b.isRest) {
      drawRest(c, b.type, hx, lineY, col);
      return;
    }

    const rx     = (b.type==='s'||b.type==='t') ? 5 : 6;
    const filled = (b.type !== 'h' && b.type !== 'w');

    // 音符頭（noteY = lineY - headAbove）
    drawNoteHead(c, hx, noteY, filled, col, rx);

    // 符尾（上向き: 音符頭の右上端 → stemTop）
    if (b.type !== 'w') {
      c.strokeStyle = col;
      c.lineWidth   = 1.8;
      c.beginPath();
      c.moveTo(sx, noteY - rx * 0.7);  // 音符頭の右上端
      c.lineTo(sx, stemTop);
      c.stroke();

      // フラッグ（ビームなし単独音符）── 上向き符尾なので右下へ垂れるフラッグ
      if (!beamedSet.has(i)) {
        if (b.type === 'e') drawFlagUp(c, sx, flagStartY, 1, col);
        if (b.type === 's') drawFlagUp(c, sx, flagStartY, 2, col);
        if (b.type === 't') drawFlagUp(c, sx, flagStartY, 1, col);
      }
    }

    // 付点
    if (b.type.includes('.')) {
      c.fillStyle = col;
      c.beginPath();
      c.arc(hx + rx + 4, noteY - 3, 2.5, 0, Math.PI*2);
      c.fill();
    }
  });

  // ── 8. ビーム ─────────────────────────────────────
  beamGroups.forEach(g => {
    const col = '#1a1408';
    const nx  = g.notes;
    const x1  = getStemX(nx[0]);
    const x2  = getStemX(nx[nx.length-1]);
    c.strokeStyle = col;
    c.lineWidth   = 4;
    c.lineCap     = 'square';
    // 一次ビーム
    c.beginPath(); c.moveTo(x1, beamY); c.lineTo(x2, beamY); c.stroke();
    // 二次ビーム（十六分）
    if (g.beamCount >= 2) {
      c.beginPath(); c.moveTo(x1, beamY-5); c.lineTo(x2, beamY-5); c.stroke();
    }
    c.lineCap = 'butt'; c.lineWidth = 1;

    // 三連符括弧（ビームの下）
    if (g.type === 't') {
      drawTripletBracket(c, getHeadX(nx[0]), getHeadX(nx[nx.length-1]), bracketY);
    }
  });

  // 単独三連符（ビームグループ外のt）にも括弧
  beats.forEach((b, i) => {
    if (b.type !== 't' || b.isRest || beamedSet.has(i)) return;
    const hx = getHeadX(i);
    drawTripletBracket(c, hx - 5, hx + 10, bracketY);
  });
}

function drawNoteHead(c, x, y, filled, col, rx=6) {
  c.beginPath();
  c.ellipse(x, y, rx, rx * 0.72, -0.2, 0, Math.PI * 2);
  c.fillStyle   = filled ? col : 'white';
  c.strokeStyle = col;
  c.lineWidth   = 1.5;
  c.fill();
  c.stroke();
}

// 上向き符尾のフラッグ（右下へ垂れる）
function drawFlagUp(c, x, y, count, col) {
  c.strokeStyle = col;
  c.lineWidth   = 1.6;
  for (let f = 0; f < count; f++) {
    const fy = y + f * 7;  // 複数フラッグは下へ並べる
    c.beginPath();
    c.moveTo(x, fy);
    c.bezierCurveTo(x + 14, fy + 6, x + 14, fy + 12, x + 6, fy + 14);
    c.stroke();
  }
}

// 三連符括弧「3」
function drawTripletBracket(c, x1, x2, y) {
  const mid  = (x1 + x2) / 2;
  const gap  = 7;
  c.strokeStyle = '#333';
  c.lineWidth   = 1.2;
  // 左: 縦→横
  c.beginPath();
  c.moveTo(x1, y - 6); c.lineTo(x1, y); c.lineTo(mid - gap, y);
  c.stroke();
  // 右: 横→縦
  c.beginPath();
  c.moveTo(mid + gap, y); c.lineTo(x2, y); c.lineTo(x2, y - 6);
  c.stroke();
  // 数字「3」
  c.fillStyle = '#222';
  c.font      = 'bold 13px sans-serif';
  c.textAlign = 'center';
  c.fillText('3', mid, y + 4);
}

function drawRest(c, type, x, y, col) {
  c.fillStyle   = col;
  c.strokeStyle = col;
  c.textAlign   = 'center';

  if (type === 'r') {
    // 四分休符: 手書き風ジグザグ
    c.strokeStyle = col;
    c.lineWidth   = 2;
    c.beginPath();
    c.moveTo(x - 3, y - 10);
    c.lineTo(x + 4, y - 4);
    c.lineTo(x - 4, y + 2);
    c.lineTo(x + 3, y + 8);
    c.stroke();
    c.lineWidth = 1;
  } else if (type === 'h' || type === 'hr') {
    // 二分休符: 線の上に乗る長方形
    c.fillRect(x - 7, y - 14, 14, 6);
  } else if (type === 'w') {
    // 全休符: 線の下に垂れ下がる長方形
    c.fillRect(x - 7, y - 8, 14, 6);
  } else if (type === 'er') {
    // 八分休符: 手書き風
    c.lineWidth = 2;
    c.strokeStyle = col;
    c.beginPath();
    // 右上の斜め線
    c.moveTo(x - 2, y - 8);
    c.lineTo(x + 5, y - 2);
    c.stroke();
    // 丸い頭
    c.beginPath();
    c.arc(x + 4, y - 1, 3, 0, Math.PI * 2);
    c.fill();
    // 左下の曲線の尾
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(x + 1, y - 1);
    c.bezierCurveTo(x - 6, y + 4, x - 4, y + 10, x + 2, y + 10);
    c.stroke();
    c.lineWidth = 1;
  } else if (type === 'sr') {
    // 十六分休符: 八分休符の二重版
    c.lineWidth = 2;
    c.strokeStyle = col;
    // 上の斜め線
    c.beginPath();
    c.moveTo(x - 2, y - 10); c.lineTo(x + 5, y - 4); c.stroke();
    c.beginPath(); c.arc(x + 4, y - 3, 3, 0, Math.PI*2); c.fill();
    // 下の斜め線
    c.beginPath();
    c.moveTo(x - 2, y - 1); c.lineTo(x + 5, y + 5); c.stroke();
    c.beginPath(); c.arc(x + 4, y + 6, 3, 0, Math.PI*2); c.fill();
    // 縦の尾
    c.beginPath();
    c.moveTo(x + 1, y - 3);
    c.bezierCurveTo(x - 5, y + 4, x - 3, y + 12, x + 2, y + 13);
    c.stroke();
    c.lineWidth = 1;
  }
}


// ============================================================
// INPUT MODE (TAP / MIC)
// ============================================================
let inputMode = 'tap'; // 'tap' | 'mic'
let micStream = null;
let micAnalyser = null;
let micAnimFrame = null;
let micThreshold = 30;   // delta閾値（低いほど感度高い/3〜300で調整）
let micCooldownUntil = 0; // 連続検知防止のクールダウン(ms)
const MIC_COOLDOWN_MS = 150; // 最短打音間隔（残響・二重検知を防ぐ）

function setInputMode(mode) {
  inputMode = mode;
  document.getElementById('modeTap').classList.toggle('active', mode === 'tap');
  document.getElementById('modeMic').classList.toggle('active', mode === 'mic');
  document.getElementById('tapArea').style.opacity = mode === 'mic' ? '0.35' : '1';
  document.getElementById('tapArea').style.pointerEvents = mode === 'mic' ? 'none' : '';

  const box = document.getElementById('micInfoBox');
  if (mode === 'mic') {
    box.classList.add('show');
    startMic();
  } else {
    box.classList.remove('show');
    stopMic();
  }
}

async function startMic() {
  try {
    // iOSでは既存のStreamがあれば再利用（切断防止）
    if (micStream && micStream.active) {
      // 既に起動中 → analyserだけ再接続
      if (!micAnalyser) {
        const ac = getACtx();
        const source = ac.createMediaStreamSource(micStream);
        micAnalyser = ac.createAnalyser();
        micAnalyser.fftSize = 512;
        micAnalyser.smoothingTimeConstant = 0.0;
        source.connect(micAnalyser);
      }
      monitorMic();
      return;
    }
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    const ac = getACtx();
    // iOSではAudioContextをrunning状態に保つ
    if (ac.state === 'suspended') await ac.resume();
    const source = ac.createMediaStreamSource(micStream);
    micAnalyser = ac.createAnalyser();
    micAnalyser.fftSize = 512;
    micAnalyser.smoothingTimeConstant = 0.0;
    source.connect(micAnalyser);
    // iOSではstreamが切れないよう、ダミーノードに接続して保持
    const dummy = ac.createGain();
    dummy.gain.value = 0;
    micAnalyser.connect(dummy);
    dummy.connect(ac.destination);
    document.getElementById('micDot').classList.add('on');
    document.getElementById('micStateLabel').textContent = 'マイク ON';
    monitorMic();
  } catch(e) {
    alert('マイクのアクセスが許可されていません:\n' + e.message);
    setInputMode('tap');
  }
}

function stopMic() {
  // TAPモードに戻ってもstreamは切らない（iOSで再許可が必要になるため）
  if (micAnimFrame) { cancelAnimationFrame(micAnimFrame); micAnimFrame = null; }
  const dot = document.getElementById('micDot');
  const lbl = document.getElementById('micStateLabel');
  if (dot) { dot.classList.remove('on','hit'); }
  if (lbl) { lbl.textContent = 'マイク OFF'; }
  const fill = document.getElementById('micBarFill');
  if (fill) fill.style.width = '0%';
}

function monitorMic() {
  if (!micAnalyser) return;
  const buf = new Uint8Array(micAnalyser.frequencyBinCount);

  // ★ アタック検知用: 前フレームのピーク音量を保持
  let prevPeak = 0;
  // 直近の音量履歴（背景ノイズレベル推定用）
  const peakHistory = new Array(20).fill(0);
  let histIdx = 0;

  function tick() {
    micAnimFrame = requestAnimationFrame(tick);
    micAnalyser.getByteFrequencyData(buf);

    // 全帯域のピーク音量を計算
    let peak = 0;
    for (let i = 0; i < buf.length; i++) peak = Math.max(peak, buf[i]);

    // 背景ノイズレベル（直近20フレームの平均）
    peakHistory[histIdx % peakHistory.length] = peak;
    histIdx++;
    const bgLevel = peakHistory.reduce((a, b) => a + b, 0) / peakHistory.length;

    // ★ アタック = 前フレームからの急激な上昇量
    const delta = peak - prevPeak;
    prevPeak = peak;

    // メーターバー・ステータス更新
    const hitDetected = delta >= micThreshold && peak > bgLevel + 10;
    const barFill  = document.getElementById('micBarFill');
    const dot      = document.getElementById('micDot');
    const hitLabel = document.getElementById('micHitLabel');
    if (barFill) {
      const pct = Math.min(100, Math.max(0, delta / Math.max(micThreshold, 1) * 60));
      barFill.style.width = pct + '%';
    }
    if (dot) {
      dot.classList.toggle('hit', hitDetected);
      dot.classList.toggle('on',  !hitDetected);
    }
    if (hitLabel) {
      hitLabel.classList.toggle('show', hitDetected);
    }

    // ★ 打音判定:
    //   1. 前フレームからの音量上昇(delta)が閾値以上
    //   2. 現在音量が背景ノイズより十分高い
    //   3. クールダウン中でない
    if (sessionPhase === 'playing') {
      const now = performance.now();
      if (hitDetected && now > micCooldownUntil) {
        micCooldownUntil = now + MIC_COOLDOWN_MS;
        onHit();
      }
    }
  }
  tick();
}

// ============================================================
// GAME LOGIC
// ============================================================
function setBpm(v) {
  bpm = v;
  document.getElementById('bpmNum').textContent = v;
  document.getElementById('bpmChip').textContent = `♩= ${v}`;
}

function buildExpectedBeats() {
  const pattern = getPattern();
  const secPerBeat = 60 / bpm;
  let timeSec = 0;
  const beats = [];
  pattern.forEach((note, i) => {
    const isRest = !!NOTE_IS_REST[note.t] || note.t === 'r';
    const dur = NOTE_DUR[note.t] || 1;
    // timeMs = patternStartACからの経過秒をmsに変換（オフセットなし）
    if (!isRest) beats.push({ timeSec, timeMs: timeSec * 1000, idx: i, dur });
    timeSec += dur * secPerBeat;
  });
  return beats;
}


function startSession() {
  if (sessionPhase === 'playing' || sessionPhase === 'countdown') {
    stopSession();
    return;
  }
  getACtx();
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('startBtn').textContent = '⏹ 停止';
  sessionPhase = 'countdown';

  const ac = getACtx();
  const secPerBeat = 60 / bpm;

  // ac と performance.now を同時取得
  const acBase = ac.currentTime;
  const pnBase = performance.now();
  function acToPn(acT) { return pnBase + (acT - acBase) * 1000; }

  // インカウント: 1・2・3・4
  const countBeats = 4;
  const countStartAC = acBase + 0.08;
  for (let i = 0; i < countBeats; i++) {
    playClick(countStartAC + i * secPerBeat, i === 0);
  }

  // patternStartAC = 4拍目の次の頭
  patternStartAC = countStartAC + countBeats * secPerBeat;
  patternStartPN = acToPn(patternStartAC);

  // UI数字表示
  for (let i = 0; i < countBeats; i++) {
    const delayMs = acToPn(countStartAC + i * secPerBeat) - pnBase;
    setTimeout(() => {
      if (sessionPhase === 'idle') return;
      document.getElementById('feedbackMain').textContent = i + 1;
      document.getElementById('feedbackMain').className = 'feedback-main ready';
      document.getElementById('feedbackSub').textContent = 'インカウント';
    }, delayMs);
  }

  // ★ 4拍目が鳴るタイミングでplayingに移行 & beginPlay()をスケジュール
  // 4拍目 = countStartAC + 3 * secPerBeat
  const beat4AC  = countStartAC + 3 * secPerBeat;
  const beat4Pn  = acToPn(beat4AC);

  // 4拍目クリックが鳴る直前にplayingにして、タップ受付開始
  setTimeout(() => {
    if (sessionPhase === 'idle') return;
    sessionPhase = 'playing';
    expectedBeats = buildExpectedBeats();
    document.getElementById('feedbackMain').textContent = '4';
    document.getElementById('feedbackSub').textContent  = '← ここから叩ける';
  }, Math.max(0, beat4Pn - pnBase - 10));

  // patternStart直前にbeginPlay（メトロノーム・カーソル開始）
  const beginDelay = patternStartPN - pnBase - 30;
  setTimeout(() => {
    if (sessionPhase !== 'playing') return;
    beginPlay();
  }, Math.max(0, beginDelay));
}

function beginPlay() {
  // sessionPhaseはstartSession内で既にplayingに設定済み
  document.getElementById('feedbackMain').textContent = 'TAP!';
  document.getElementById('feedbackMain').className = 'feedback-main ready';
  document.getElementById('feedbackSub').textContent = '';
  const pattern = getPattern();
  const lv = LEVELS[currentLevel];
  const ac = getACtx();
  const secPerBeat = 60 / bpm;
  const totalDurBeats = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 1), 0);
  const totalMs = totalDurBeats * secPerBeat * 1000;

  // ★ メトロノームをパターン開始と同じタイムラインでスケジュール
  for (let b = 0; b < Math.ceil(totalDurBeats); b++) {
    playClick(patternStartAC + b * secPerBeat, b % lv.timeSig === 0);
  }

  // ★ バーアニメーション: acとpnを同時取得してAudioCtxと正確に同期
  const acAtBeginPlay = ac.currentTime;
  const pnAtBeginPlay = performance.now();
  // patternStartAC に対応するperformance.now時刻を計算
  const cursorStartPN = pnAtBeginPlay + (patternStartAC - acAtBeginPlay) * 1000;

  const cursorEl = document.getElementById('cursorLine');
  const sheetWrap = document.getElementById('sheetWrap');
  const sheetW = sheetWrap.clientWidth - 20;
  const noteAreaStart = 58;
  const noteAreaEnd = sheetW - 14;
  cursorEl.style.display = 'block';
  cursorEl.style.left = noteAreaStart + 10 + 'px';

  function animCursor() {
    if (sessionPhase !== 'playing') return;
    const elapsedMs = performance.now() - cursorStartPN;
    const pct = Math.max(0, Math.min(elapsedMs / totalMs, 1));
    const cursorX = noteAreaStart + pct * (noteAreaEnd - noteAreaStart);
    cursorEl.style.left = (cursorX + 10) + 'px';

    if (elapsedMs < totalMs) {
      requestAnimationFrame(animCursor);
    } else {
      cursorEl.style.display = 'none';
      setTimeout(evalSession, 200);
    }
  }
  requestAnimationFrame(animCursor);

  // フォールバック終了タイマー
  gameTimer = setTimeout(() => {
    if (sessionPhase === 'playing') evalSession();
  }, totalMs + 800);
}

function stopSession() {
  sessionPhase = 'idle';
  clearTimeout(countdownTimer);
  clearTimeout(gameTimer);
  document.getElementById('cursorLine').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ スタート';
  document.getElementById('feedbackMain').textContent = '停止しました';
  document.getElementById('feedbackMain').className = 'feedback-main ready';
  // マイクはモードが変わるまで継続（停止しない）
}

function onTap(e) {
  e.preventDefault();
  if (sessionPhase !== 'playing') return;
  if (inputMode === 'mic') return; // micモード中はタップ無効

  // タップビジュアル
  const btn = document.getElementById('tapArea');
  btn.classList.add('hit');
  setTimeout(() => btn.classList.remove('hit'), 80);
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.cssText = 'width:80px;height:80px;left:50%;top:50%;margin-left:-40px;margin-top:-40px;position:absolute;';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  onHit();
}

// タップ・マイク共通の判定処理
function onHit() {
  if (sessionPhase !== 'playing') return;

  // ★ AudioCtx基準でタップ時刻を記録
  // patternStartAC より前の打音（1拍目直前の早打ち）も拾えるよう
  // clampせずそのままの値を使う
  const ac = getACtx();
  const tapRelMs = (ac.currentTime - patternStartAC) * 1000;

  playSnare();
  tapLog.push(tapRelMs);

  // 判定ウィンドウ
  const PERFECT_EARLY = 80,  PERFECT_LATE = 80;   // ±80ms でPERFECT
  const GOOD_EARLY    = 200, GOOD_LATE    = 160;   // 前方向は200msまで許容

  let bestDiff = 999999, bestB = null;
  expectedBeats.forEach(b => {
    const diff = tapRelMs - b.timeMs;
    // 判定ウィンドウ内かどうか
    if (diff >= -GOOD_EARLY && diff <= GOOD_LATE) {
      const absDiff = Math.abs(diff);
      if (absDiff < Math.abs(bestDiff)) { bestDiff = diff; bestB = b; }
    }
  });

  if (!bestB) {
    // ウィンドウ外 = MISS（フィードバックはしない：どの音符にも対応しない打音）
    return;
  }
  if (bestDiff >= -PERFECT_EARLY && bestDiff <= PERFECT_LATE) {
    showFeedback('PERFECT!', 'perfect', '');
  } else {
    showFeedback(bestDiff < 0 ? 'EARLY' : 'LATE', bestDiff < 0 ? 'early' : 'late', '');
  }
}

function evalSession() {
  sessionPhase = 'result';
  document.getElementById('cursorLine').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ スタート';

  const PERFECT_EARLY = 80,  PERFECT_LATE = 80;
  const GOOD_EARLY    = 200, GOOD_LATE    = 160;
  const pattern = getPattern();
  const usedTaps = new Set();
  const results = new Array(pattern.length).fill('m');

  expectedBeats.forEach(b => {
    let best = null, bestDiff = 999999;
    tapLog.forEach((t, i) => {
      if (usedTaps.has(i)) return;
      const diff = t - b.timeMs;
      if (diff >= -GOOD_EARLY && diff <= GOOD_LATE) {
        if (Math.abs(diff) < Math.abs(bestDiff)) { best = i; bestDiff = diff; }
      }
    });
    if (best !== null) {
      usedTaps.add(best);
      const diff = tapLog[best] - b.timeMs;
      if (diff >= -PERFECT_EARLY && diff <= PERFECT_LATE) results[b.idx] = 'p';
      else if (diff < 0) results[b.idx] = 'e';
      else results[b.idx] = 'l';
    }
  });

  patternResults = results;
  drawStaff();
  renderDots(results);

  const total = expectedBeats.length;
  const p = results.filter(r => r === 'p').length;
  const g = results.filter(r => r === 'e' || r === 'l').length;
  const m = results.filter(r => r === 'm').length;
  const acc = total > 0 ? Math.round((p * 100 + g * 50) / (total * 100) * 100) : 0;
  const earned = p * 120 + g * 60 - m * 30;
  totalScore += Math.max(0, earned);

  const grade = acc >= 95 ? 'S' : acc >= 80 ? 'A' : acc >= 65 ? 'B' : acc >= 50 ? 'C' : 'D';
  if (acc >= 60) { streak++; xp += Math.max(0, earned); }
  else { streak = 0; }

  if (acc >= 70 && currentLevel + 1 < LEVELS.length && LEVELS[currentLevel + 1].id > unlockedLevel) {
    unlockedLevel = LEVELS[currentLevel + 1].id;
    localStorage.setItem('snare_unlockedLevel', unlockedLevel);
    renderLevelPills();
  }
  updateWeakBtn();

  updateXP();
  document.getElementById('scoreVal').textContent = totalScore;
  document.getElementById('weakModeBanner').style.display = weakPatternMode ? 'block' : 'none';
  document.getElementById('streakBadge').textContent = streak > 1 ? `🔥${streak}連続` : '';
  document.getElementById('rP').textContent = p;
  document.getElementById('rG').textContent = g;
  document.getElementById('rM').textContent = m;
  document.getElementById('rAcc').textContent = acc + '%';
  const gradeEl = document.getElementById('resultGrade');
  gradeEl.textContent = grade;
  gradeEl.className = 'result-grade grade-' + grade;
  document.getElementById('resultCard').style.display = 'block';

  const msgs = { S: '完璧！素晴らしい！', A: 'Great！良い精度です', B: 'Good！もう少し！', C: 'Keep going!', D: 'また練習しよう' };
  showFeedback(
    grade === 'S' ? 'PERFECT!' : grade === 'A' ? 'GREAT!' : grade === 'B' ? 'GOOD!' : 'KEEP GOING',
    grade === 'S' || grade === 'A' ? 'perfect' : grade === 'B' ? 'good' : 'miss',
    msgs[grade]
  );
}

function showFeedback(main, cls, sub) {
  const el = document.getElementById('feedbackMain');
  el.textContent = main;
  el.className = 'feedback-main ' + (cls || 'ready');
  document.getElementById('feedbackSub').textContent = sub || '';
}

function renderDots(results) {
  const row = document.getElementById('dotsRow');
  row.innerHTML = results.map(r => `<div class="dot ${r || ''}"></div>`).join('');
}

// ============================================================
// LISTEN MODE
// ============================================================
function listenPattern() {
  if (sessionPhase === 'playing' || sessionPhase === 'countdown') return;
  const ac = getACtx();
  const pattern = getPattern();
  const lv = LEVELS[currentLevel];
  const secPerBeat = 60 / bpm;
  const startT = ac.currentTime + 0.15;
  const totalDur = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 1), 0);

  for (let b = 0; b < Math.ceil(totalDur); b++) {
    playClick(startT + b * secPerBeat, b % lv.timeSig === 0);
  }
  let timeOff = 0;
  pattern.forEach(note => {
    if (!NOTE_IS_REST[note.t] && note.t !== 'r') playSnare(startT + timeOff * secPerBeat);
    timeOff += (NOTE_DUR[note.t] || 1);
  });
  showFeedback('LISTEN...', 'ready', 'メトロノームと音を聴いて覚えよう');
}

// ============================================================
// PATTERN NAVIGATION
// ============================================================
function nextPattern() {
  if (weakPatternMode) {
    weakPatternIndex = (weakPatternIndex + 1) % weakPatterns.length;
    currentWeakPattern = weakPatterns[weakPatternIndex] ? weakPatterns[weakPatternIndex].pattern : null;
    updateWeakModeLabel();
  } else {
    refreshPattern();
  }
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('weakBtn') && updateWeakBtn();
  showFeedback('譜面を読んでスタート', 'ready', '');
  drawStaff();
}

function updateWeakModeLabel() {
  const lbl = document.getElementById('patNumLabel');
  if (weakPatternMode) {
    lbl.textContent = `苦手 ${weakPatternIndex+1}/${weakPatterns.length}`;
  } else {
    lbl.textContent = 'ランダム';
  }
}

function updateWeakBtn() {
  const btn = document.getElementById('weakBtn');
  if (!btn) return;
  const key = patternToKey(getPattern());
  const isWeak = weakPatterns.some(w => w.key === key);
  btn.textContent = isWeak ? '★ 苦手登録済' : '☆ 苦手に追加';
  btn.style.borderColor = isWeak ? 'var(--gold)' : 'var(--border)';
  btn.style.color = isWeak ? 'var(--gold)' : 'var(--muted)';
}

function toggleWeak() {
  const pattern = getPattern();
  const key = patternToKey(pattern);
  const idx = weakPatterns.findIndex(w => w.key === key);
  const lv = LEVELS[currentLevel];
  if (idx >= 0) {
    weakPatterns.splice(idx, 1);
  } else {
    weakPatterns.push({ key, pattern: JSON.parse(JSON.stringify(pattern)), levelId: lv.id, levelName: lv.name, addedAt: Date.now() });
  }
  localStorage.setItem('snare_weakPatterns', JSON.stringify(weakPatterns));
  updateWeakBtn();
  renderWeakList();
}

function enterWeakMode() {
  if (!weakPatterns.length) { alert('苦手パターンがまだありません'); return; }
  weakPatternMode = true;
  weakPatternIndex = 0;
  currentWeakPattern = weakPatterns[0].pattern;
  // レベルを合わせる
  const lvIdx = LEVELS.findIndex(l => l.id === weakPatterns[0].levelId);
  if (lvIdx >= 0) selectLevel(lvIdx, true);
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn();
  showFeedback('苦手パターン練習', 'ready', '');
  drawStaff();
  // 苦手パネルを閉じる
  document.getElementById('weakPanel').style.display = 'none';
}

function exitWeakMode() {
  weakPatternMode = false;
  currentWeakPattern = null;
  refreshPattern();
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn();
  showFeedback('譜面を読んでスタート', 'ready', '');
  drawStaff();
}

function renderWeakList() {
  const list = document.getElementById('weakList');
  if (!list) return;
  if (!weakPatterns.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;">苦手パターンはまだありません</div>';
    return;
  }
  list.innerHTML = weakPatterns.map((w, i) => `
    <div class="weak-item" onclick="previewWeak(${i})">
      <div class="weak-item-left">
        <span class="weak-lv-badge">${w.levelName}</span>
        <span class="weak-notes">${w.key.replace(/,/g,' ')}</span>
      </div>
      <button class="weak-del" onclick="event.stopPropagation();deleteWeak(${i})">✕</button>
    </div>
  `).join('');
}

function previewWeak(i) {
  weakPatternMode = true;
  weakPatternIndex = i;
  currentWeakPattern = weakPatterns[i].pattern;
  const lvIdx = LEVELS.findIndex(l => l.id === weakPatterns[i].levelId);
  if (lvIdx >= 0) selectLevel(lvIdx, true);
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn();
  showFeedback('苦手パターン練習', 'ready', '');
  drawStaff();
  document.getElementById('weakPanel').style.display = 'none';
}

function deleteWeak(i) {
  weakPatterns.splice(i, 1);
  localStorage.setItem('snare_weakPatterns', JSON.stringify(weakPatterns));
  renderWeakList();
  updateWeakBtn();
  if (weakPatternMode && weakPatterns.length === 0) exitWeakMode();
}

// ============================================================
// LEVEL PILLS
// ============================================================
function renderLevelPills() {
  const wrap = document.getElementById('levelPills');
  wrap.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const locked = lv.id > unlockedLevel;
    const pill = document.createElement('div');
    pill.className = 'level-pill' + (i === currentLevel ? ' active' : '') + (locked ? ' locked' : '');
    pill.textContent = locked ? `🔒${lv.name}` : lv.name;
    if (!locked) pill.onclick = () => selectLevel(i);
    wrap.appendChild(pill);
  });
}

function selectLevel(i, keepWeakMode = false) {
  if (LEVELS[i].id > unlockedLevel) return;
  currentLevel = i;
  if (!keepWeakMode) { weakPatternMode = false; currentWeakPattern = null; refreshPattern(); }
  patternResults = []; tapLog = [];
  const lv = LEVELS[i];
  bpm = lv.bpm;
  document.getElementById('bpmSlider').value = bpm;
  document.getElementById('bpmNum').textContent = bpm;
  document.getElementById('bpmChip').textContent = `♩= ${bpm}`;
  document.getElementById('levelChip').textContent = lv.name;
  document.getElementById('levelDesc').textContent = lv.desc;
  document.getElementById('timeSigLabel').textContent = `${lv.timeSig}/4拍子`;
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn && updateWeakBtn();
  showFeedback('譜面を読んでスタート', 'ready', '');
  renderLevelPills();
  drawStaff();
}

function updateXP() {
  const maxXP = LEVELS[currentLevel].id * 500;
  document.getElementById('xpFill').style.width = Math.min(100, xp / maxXP * 100) + '%';
}

// ============================================================
// INIT
// ============================================================
function toggleWeakPanel() {
  const panel = document.getElementById('weakPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) renderWeakList();
}

window.addEventListener('load', () => {
  renderLevelPills();
  refreshPattern();
  drawStaff();
  updateWeakBtn();
  renderWeakList();
  updateWeakModeLabel();
});

// デバッグ用: localStorage リセット（コンソールから呼べる）
function resetProgress() {
  localStorage.removeItem('snare_unlockedLevel');
  unlockedLevel = 1;
  renderLevelPills();
}

window.addEventListener('resize', () => { drawStaff(); });
</script>
</body>
</html>
