<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VexFlow Test</title>
</head>
<body style="background:#fff;padding:20px;">
<h3 id="status">Loading VexFlow...</h3>
<div id="output"></div>
<div id="score"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vexflow/4.2.2/vexflow.min.js"
  onload="onVFLoad()" onerror="onVFError()"></script>
<script>
function onVFError() {
  document.getElementById('status').textContent = '❌ VexFlow CDN load FAILED';
  document.getElementById('status').style.color = 'red';
}

function onVFLoad() {
  document.getElementById('status').textContent = '✅ VexFlow loaded! Testing render...';

  try {
    // Check what's available
    const info = [];
    info.push('typeof Vex: ' + typeof Vex);
    info.push('typeof Vex.Flow: ' + typeof Vex?.Flow);
    info.push('Renderer: ' + typeof Vex?.Flow?.Renderer);
    info.push('Stave: ' + typeof Vex?.Flow?.Stave);
    info.push('StaveNote: ' + typeof Vex?.Flow?.StaveNote);
    document.getElementById('output').innerHTML = '<pre>' + info.join('\n') + '</pre>';

    // Try to render a simple measure
    const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;

    const div = document.getElementById('score');
    const renderer = new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(400, 150);
    const ctx = renderer.getContext();

    const stave = new Stave(10, 30, 380);
    stave.addClef('percussion').addTimeSignature('4/4');
    stave.setContext(ctx).draw();

    const notes = [
      new StaveNote({ keys: ['b/4'], duration: 'q' }),
      new StaveNote({ keys: ['b/4'], duration: 'q' }),
      new StaveNote({ keys: ['b/4'], duration: 'q' }),
      new StaveNote({ keys: ['b/4'], duration: 'q' }),
    ];

    const voice = new Voice({ num_beats: 4, beat_value: 4 });
    voice.addTickables(notes);

    new Formatter().joinVoices([voice]).format([voice], 300);
    voice.draw(ctx, stave);

    document.getElementById('status').textContent = '✅ VexFlow rendered successfully!';
    document.getElementById('status').style.color = 'green';

  } catch(e) {
    document.getElementById('status').textContent = '❌ Error: ' + e.message;
    document.getElementById('status').style.color = 'red';
    document.getElementById('output').innerHTML += '<pre style="color:red">' + e.stack + '</pre>';
  }
}
</script>
</body>
</html>
