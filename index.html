<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>リズム初見練習 — スネアトレーナー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Music&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --paper: #fdf8f0;
  --paper2: #f5efe2;
  --ink: #1a1408;
  --ink2: #3a3020;
  --staff: #2a2010;
  --accent: #c8390a;
  --accent2: #1a6b3a;
  --gold: #c8920a;
  --blue: #c8a000;
  --muted: #8a7a60;
  --border: #c8b890;
  --shadow: rgba(50,30,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--paper2);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(200,180,140,0.15) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(200,180,140,0.08) 28px);
}

/* HEADER */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255,255,255,0.02) 6px, rgba(255,255,255,0.02) 12px);
}
.header-top {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  position: relative;
  z-index: 1;
}
.app-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--paper);
}
.app-subtitle {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 1px;
}
.header-score {
  text-align: right;
}
.score-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--gold);
  letter-spacing: 2px;
  line-height: 1;
}
.score-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* LEVEL BAR */
.level-bar {
  width: 100%;
  background: rgba(255,255,255,0.05);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 1;
}
.level-chip {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.level-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  flex: 1;
}
.xp-wrap { width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; flex-shrink: 0; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c040); border-radius: 2px; transition: width 0.6s ease; }
.streak-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--accent);
  flex-shrink: 0;
}

/* MAIN */
main { padding: 12px 14px; }

/* INFO ROW */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.time-sig {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
}
.bpm-chip {
  background: var(--ink);
  color: var(--paper);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  padding: 4px 12px;
  border-radius: 3px;
}
.pattern-num {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--muted);
}

/* SHEET MUSIC AREA */
.sheet-wrap {
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 10px 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
  position: relative;
  overflow: hidden;
}
.sheet-wrap::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(200,150,100,0.15);
}
canvas#staffCanvas {
  width: 100%;
  display: block;
}

/* PLAYBACK CURSOR */
.cursor-line {
  position: absolute;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: rgba(200,57,10,0.6);
  border-radius: 1px;
  pointer-events: none;
  display: none;
  box-shadow: 0 0 6px rgba(200,57,10,0.4);
}

/* FEEDBACK */
.feedback-zone {
  min-height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  gap: 4px;
}
.feedback-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 5px;
  line-height: 1;
  transition: all 0.08s;
}
.feedback-main.perfect { color: var(--accent2); }
.feedback-main.good    { color: var(--gold); }
.feedback-main.early   { color: var(--blue); }
.feedback-main.late    { color: var(--blue); }
.feedback-main.miss    { color: var(--accent); }
.feedback-main.ready   { color: var(--muted); font-size: 22px; letter-spacing: 4px; }
.feedback-sub {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* DOTS */
.dots-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  flex-wrap: wrap;
  min-height: 14px;
  margin-bottom: 10px;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--paper2);
  flex-shrink: 0;
}
.dot.p { background: var(--accent2); border-color: var(--accent2); }
.dot.g { background: var(--gold); border-color: var(--gold); }
.dot.m { background: var(--accent); border-color: var(--accent); }
.dot.e,.dot.l { background: var(--blue); border-color: var(--blue); }

/* TAP BUTTON */
.tap-area {
  width: 100%;
  height: 100px;
  background: var(--ink);
  border: none;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.06s;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.05) inset;
}
.tap-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center 30%, rgba(255,255,255,0.04) 0%, transparent 70%);
}
.tap-area:active, .tap-area.hit {
  background: #2a1a0a;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 30px rgba(200,57,10,0.15) inset;
  transform: scale(0.985);
}
.tap-icon {
  font-size: 30px;
  margin-bottom: 4px;
  line-height: 1;
  filter: grayscale(0.3);
}
.tap-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.5);
}
.tap-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transform: scale(0);
  animation: ripple 0.4s ease-out forwards;
  pointer-events: none;
}
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

/* CONTROLS */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.btn {
  padding: 12px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  letter-spacing: 1px;
  box-shadow: 0 1px 4px var(--shadow);
}
.btn:hover { background: var(--paper2); }
.btn:active { transform: scale(0.97); }
.btn.start {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-size: 15px;
  padding: 14px;
  letter-spacing: 3px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.btn.start:hover { background: var(--ink2); }
.btn.listen-btn { border-color: var(--blue); color: var(--blue); }
.btn.next-btn { border-color: var(--accent2); color: var(--accent2); }

/* LEVEL SELECT */
.level-select-wrap {
  margin-bottom: 12px;
}
.level-select-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 6px;
  text-align: center;
}
.level-pills {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}
.level-pill {
  padding: 5px 10px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.level-pill.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
}
.level-pill.locked {
  opacity: 0.35;
  cursor: not-allowed;
}

/* RESULT CARD */
.result-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px var(--shadow);
  display: none;
}
.result-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 10px;
}
.result-grade {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  text-align: center;
  letter-spacing: 4px;
  line-height: 1;
  margin-bottom: 6px;
}
.grade-S { color: var(--gold); }
.grade-A { color: var(--accent2); }
.grade-B { color: var(--blue); }
.grade-C { color: var(--muted); }
.grade-D { color: var(--accent); }
.result-stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 6px;
}
.stat-box {
  background: var(--paper2);
  border-radius: 3px;
  padding: 8px 4px;
  text-align: center;
}
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; }
.stat-lbl { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-top: 2px; }
.stat-val.sv-p { color: var(--accent2); }
.stat-val.sv-g { color: var(--gold); }
.stat-val.sv-m { color: var(--accent); }
.stat-val.sv-a { color: var(--blue); }

/* BPM slider */
.bpm-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 8px;
  box-shadow: 0 1px 4px var(--shadow);
}
.bpm-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); flex-shrink: 0; font-weight: 700; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ink);
  cursor: pointer;
}
.bpm-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--ink);
  min-width: 40px;
  text-align: right;
  flex-shrink: 0;
}

  /* ===== マイク入力モード ===== */
  .mic-section {
    margin-bottom: 10px;
  }
  .input-mode-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
  }
  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 14px 8px;
    background: white;
    border: 3px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 0 var(--border);
    -webkit-user-select: none;
    user-select: none;
    min-height: 90px;
  }
  .mode-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--border);
  }
  .mode-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    box-shadow: 0 3px 0 #000;
    color: white;
  }
  .mode-btn.active .mode-desc { color: rgba(255,255,255,0.5); }
  .mode-icon { font-size: 32px; line-height: 1; }
  .mode-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--ink);
  }
  .mode-btn.active .mode-label { color: white; }
  .mode-desc {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
  }
  .mic-info-box {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: none;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .mic-info-box.show { display: flex; }
  .mic-status-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mic-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .mic-dot.on  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .mic-dot.hit { background: var(--accent);  box-shadow: 0 0 8px var(--accent); }
  .mic-state-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--muted);
    flex: 1;
  }
  .mic-hit-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.05s;
  }
  .mic-hit-label.show { opacity: 1; }
  .mic-bar-wrap {
    height: 10px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .mic-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 5px;
    transition: width 0.04s;
  }
  .mic-thresh-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
  }

</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">初見リズム練習</div>
      <div class="app-subtitle">SNARE SIGHT-READING TRAINER</div>
    </div>
    <div class="header-score">
      <div class="score-val" id="scoreVal">0</div>
      <div class="score-label">TOTAL SCORE</div>
    </div>
  </div>
  <div class="level-bar">
    <div class="level-chip" id="levelChip">Lv.1</div>
    <div class="level-desc" id="levelDesc">四分音符のみ</div>
    <div class="streak-badge" id="streakBadge"></div>
    <div class="xp-wrap"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <!-- Level Select -->
  <div class="level-select-wrap">
    <div class="level-select-title">— LEVEL —</div>
    <div class="level-pills" id="levelPills"></div>
  </div>

  <!-- 入力モード -->
  <div class="mic-section">
    <div class="input-mode-row">
      <div class="mode-btn active" id="modeTap" ontouchstart="setInputMode('tap')" onclick="setInputMode('tap')">
        <span class="mode-icon">👆</span>
        <span class="mode-label">TAP</span>
        <span class="mode-desc">画面をタップ</span>
      </div>
      <div class="mode-btn" id="modeMic" ontouchstart="setInputMode('mic')" onclick="setInputMode('mic')">
        <span class="mode-icon">🎤</span>
        <span class="mode-label">MIC</span>
        <span class="mode-desc">打音・声で入力</span>
      </div>
    </div>
    <!-- MICモード時の情報ボックス -->
    <div class="mic-info-box" id="micInfoBox">
      <div class="mic-status-row">
        <div class="mic-dot" id="micDot"></div>
        <span class="mic-state-label" id="micStateLabel">マイク起動中...</span>
        <span class="mic-hit-label" id="micHitLabel">HIT!</span>
      </div>
      <div class="mic-bar-wrap">
        <div class="mic-bar-fill" id="micBarFill"></div>
      </div>
      <div class="mic-thresh-row">
        <span>感度（高←→低）</span>
        <input type="range" id="micThresh" min="3" max="300" value="30" style="flex:1;"
          oninput="micThreshold=+this.value;document.getElementById('micThreshVal').textContent=this.value">
        <span id="micThreshVal">30</span>
      </div>
    </div>
  </div>

  <!-- BPM -->
  <div class="bpm-row">
    <span class="bpm-label">BPM</span>
    <input type="range" id="bpmSlider" min="40" max="160" value="70" oninput="setBpm(+this.value)">
    <span class="bpm-num" id="bpmNum">70</span>
  </div>

  <!-- Info -->
  <div class="info-row">
    <div class="time-sig" id="timeSigLabel">4/4拍子</div>
    <div class="bpm-chip" id="bpmChip">♩= 70</div>
    <div class="pattern-num" id="patNumLabel">パターン #1</div>
  </div>

  <!-- Sheet -->
  <div class="sheet-wrap" id="sheetWrap">
    <!-- AlphaTab譜面コンテナ -->
    <div id="atContainer"></div>
    <!-- カーソル -->
    <div class="cursor-line" id="cursorLine"></div>
    <!-- タップ位置ライン（複数表示） -->
    <div id="tapLineLayer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;"></div>
  </div>

  <!-- Feedback -->
  <div class="feedback-zone">
    <div class="feedback-main ready" id="feedbackMain">譜面を読んでスタート</div>
    <div class="feedback-sub" id="feedbackSub"></div>
  </div>

  <!-- Dots -->
  <div class="dots-row" id="dotsRow"></div>

  <!-- Tap -->
  <div class="tap-area" id="tapArea" ontouchstart="onTap(event)" onmousedown="onTap(event)">
    <div class="tap-icon">🥁</div>
    <div class="tap-label">TAP</div>
  </div>

  <!-- Controls -->
  <!-- 苦手モードバナー -->
  <div class="weak-mode-banner" id="weakModeBanner" onclick="exitWeakMode()">
    ★ 苦手パターン練習中 — タップして通常に戻る
  </div>

  <div class="controls">
    <button class="btn start" id="startBtn" onclick="startSession()">▶ スタート</button>
    <button class="btn listen-btn" onclick="listenPattern()">👂 聴く</button>
    <button class="btn next-btn" onclick="nextPattern()">→ 次のパターン</button>
    <button class="btn" id="weakBtn" onclick="toggleWeak()" style="border-color:var(--border);color:var(--muted);">☆ 苦手に追加</button>
    <button class="btn" onclick="toggleWeakPanel()" style="border-color:var(--blue);color:var(--blue);">📋 苦手一覧</button>
  </div>

  <!-- 苦手パターン一覧 -->
  <div class="weak-panel" id="weakPanel" style="display:none;">
    <div class="weak-panel-title">
      <span>— 苦手パターン一覧 —</span>
      <button class="btn" onclick="enterWeakMode()" style="font-size:11px;padding:4px 10px;border-color:var(--accent);color:var(--accent);">まとめて練習</button>
    </div>
    <div class="weak-list" id="weakList"></div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-title">— RESULT —</div>
    <div class="result-grade" id="resultGrade">A</div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val sv-p" id="rP">0</div><div class="stat-lbl">PERFECT</div></div>
      <div class="stat-box"><div class="stat-val sv-g" id="rG">0</div><div class="stat-lbl">GOOD</div></div>

<script>
// ============================================================
// ============================================================
// LEVEL DEFINITIONS & RANDOM PATTERN GENERATOR
// ============================================================

// 各レベルの定義（固定パターンは削除し、ランダム生成ルールのみ持つ）
const LEVELS = [
  { id:1,  name:'Lv.1',  desc:'四分音符・四分休符',       timeSig:4, bpm:70  },
  { id:2,  name:'Lv.2',  desc:'二分音符',                  timeSig:4, bpm:72  },
  { id:3,  name:'Lv.3',  desc:'八分音符入門 (3/4)',         timeSig:3, bpm:76  },
  { id:4,  name:'Lv.4',  desc:'八分音符 + 休符 (4/4)',      timeSig:4, bpm:80  },
  { id:5,  name:'Lv.5',  desc:'付点・シンコペーション',     timeSig:4, bpm:84  },
  { id:6,  name:'Lv.6',  desc:'十六分音符入門',             timeSig:4, bpm:80  },
  { id:7,  name:'Lv.7',  desc:'十六分 + 休符',              timeSig:4, bpm:84  },
  { id:8,  name:'Lv.8',  desc:'三連符',                     timeSig:4, bpm:80  },
  { id:9,  name:'Lv.9',  desc:'複合リズム',                 timeSig:4, bpm:88  },
  { id:10, name:'Lv.10', desc:'上級・5拍子',                timeSig:5, bpm:88  },
];

// Note durations in beats
const NOTE_DUR    = { q:1, h:2, w:4, r:1, 'q.':1.5, e:0.5, 'e.':0.75, er:0.5, s:0.25, sr:0.25, t:1/3, p5:1/5, p6:1/6, p7:1/7, p9:2/9 };
const NOTE_IS_REST = { er:true, sr:true, r:true };

// ── ランダムパターン生成 ──────────────────────────────────────
// 拍数を満たすまで「使えるセル」からランダムに選んで並べる
function generatePattern(levelIdx) {
  const lv    = LEVELS[levelIdx];
  const total = lv.timeSig;
  const cells = makeCells(levelIdx);

  // セルのbeatsをNOTE_DURから計算（定義ミスを防ぐ）
  cells.forEach(c => {
    c.beats = c.notes.reduce((s, n) => s + (NOTE_DUR[n.t] || 0), 0);
  });

  for (let attempt = 0; attempt < 400; attempt++) {
    const result    = [];
    let remaining   = total;
    let ok          = true;

    while (remaining > 0.0001) {
      const usable = cells.filter(c => c.beats <= remaining + 0.0001);
      if (!usable.length) { ok = false; break; }
      const pick = usable[Math.floor(Math.random() * usable.length)];
      result.push(...pick.notes);
      remaining = +(remaining - pick.beats).toFixed(6);
    }

    if (ok && remaining < 0.001) {
      // 最低1つ実音が必要
      if (result.some(n => !NOTE_IS_REST[n.t] && n.t !== 'r')) return result;
    }
  }
  // フォールバック
  return Array.from({length: total}, () => ({t:'q'}));
}

function makeCells(levelIdx) {
  const id = levelIdx + 1;
  // 共通セル（全レベルで使える）
  const base = [];

  if (id === 1) {
    // 四分音符を多めに、休符は少なめ
    return [
      { notes:[{t:'q'}] }, { notes:[{t:'q'}] }, { notes:[{t:'q'}] },
      { notes:[{t:'q'}] }, { notes:[{t:'q'}] }, // 音符を多く
      { notes:[{t:'r'}] }, // 四分休符（少なめ）
    ];
  }

  if (id === 2) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 3) {
    // 3/4拍子: 3拍
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] }, // 八分×2=1拍
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 4) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'er'},{t:'e'}] }, // 八分休+八分
      { notes:[{t:'e'},{t:'er'}] }, // 八分+八分休
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 5) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'e'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'h'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 6) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] }, // 十六分×4=1拍
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'e'}] }, // 十六+十六+八=1拍
      { notes:[{t:'e'},{t:'s'},{t:'s'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 7) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'s'},{t:'s'}] }, // 十六休+十六×3
      { notes:[{t:'s'},{t:'sr'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'sr'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'sr'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'e'}] },
      { notes:[{t:'e'},{t:'sr'},{t:'s'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'r'}] },
    ];
  }

  if (id === 8) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] }, // 八分三連=1拍
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 9) {
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },                           // 三連符 (1拍)
      { notes:[{t:'p5'},{t:'p5'},{t:'p5'},{t:'p5'},{t:'p5'}] },     // 五連符 (1拍)
      { notes:[{t:'sr'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'e'}] },
      { notes:[{t:'e'},{t:'s'},{t:'s'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'e'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  if (id === 10) {
    // 5拍子: より複雑な組み合わせ
    return [
      { notes:[{t:'q'}] },
      { notes:[{t:'q'}] },
      { notes:[{t:'e'},{t:'e'}] },
      { notes:[{t:'s'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'t'},{t:'t'},{t:'t'}] },
      { notes:[{t:'sr'},{t:'s'},{t:'s'},{t:'s'}] },
      { notes:[{t:'s'},{t:'s'},{t:'e'}] },
      { notes:[{t:'e'},{t:'s'},{t:'s'}] },
      { notes:[{t:'er'},{t:'e'}] },
      { notes:[{t:'q.'}] },
      { notes:[{t:'e'}] },
      { notes:[{t:'r'}] },
      { notes:[{t:'h'}] },
    ];
  }

  return [{ notes:[{t:'q'}] }];
}

// パターンをキー文字列に変換（苦手保存・重複排除用）
function patternToKey(pattern) {
  return pattern.map(n => n.t).join(',');
}

// 現在のパターン（ランダム生成 or 苦手パターン）
let currentGeneratedPattern = null;

function getPattern() {
  if (weakPatternMode && currentWeakPattern) return currentWeakPattern;
  if (!currentGeneratedPattern) currentGeneratedPattern = generatePattern(currentLevel);
  return currentGeneratedPattern;
}

function refreshPattern() {
  currentGeneratedPattern = generatePattern(currentLevel);
}

// ============================================================
// AUDIO
// ============================================================
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSnare(time, vol=1) {
  const ac = getACtx();
  const t = time ?? ac.currentTime;
  // tone layer
  const osc = ac.createOscillator();
  const og = ac.createGain();
  osc.connect(og); og.connect(ac.destination);
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(60, t+0.1);
  og.gain.setValueAtTime(vol*0.5, t);
  og.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  osc.start(t); osc.stop(t+0.14);
  // noise layer
  const len = Math.floor(ac.sampleRate * 0.18);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/len*14);
  const src = ac.createBufferSource(); src.buffer = buf;
  const hpf = ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=1800;
  const ng = ac.createGain();
  src.connect(hpf); hpf.connect(ng); ng.connect(ac.destination);
  ng.gain.setValueAtTime(vol*1.1, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t+0.16);
  src.start(t); src.stop(t+0.2);
}

function playClick(time, accent=false) {
  const ac = getACtx();
  const t = time ?? ac.currentTime;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.frequency.value = accent ? 1600 : 1000;
  g.gain.setValueAtTime(accent ? 0.5 : 0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.03);
  osc.start(t); osc.stop(t+0.04);
}

// 休符をIMG要素でrestLayerに配置する
function placeRestImages(beats, getHeadX, lineY, canvasW, canvasH) {
  const layer = document.getElementById('restLayer');
  if (!layer) return;
  layer.innerHTML = '';

  const canvas = document.getElementById('staffCanvas');
  // canvas論理座標 → CSS表示座標の比率
  // canvas.width/height はDPR倍されているので offsetWidth/Height を使う
  const scaleX = canvas.offsetWidth  / canvasW;
  const scaleY = canvas.offsetHeight / canvasH;

  beats.forEach((b, i) => {
    if (!b.isRest) return;
    if (b.type !== 'r' && b.type !== 'er' && b.type !== 'sr') return;

    const src = REST_IMG_SRC[b.type];
    if (!src) return;

    const hx = getHeadX(i); // canvas論理座標（px）

    // 休符の表示サイズ（論理px）
    const dispH = b.type === 'sr' ? 32 : 24;
    const dispW = b.type === 'r'  ? 16 : 12;

    // 休符の縦位置: lineYを中心に上下にオフセット
    // r: 四分休符 → lineYの少し上から
    // er/sr: 八分・十六分休符 → lineYの上に配置
    const offsetY = b.type === 'r'  ? -dispH * 0.85 :
                    b.type === 'er' ? -dispH * 0.75 :
                    -dispH * 0.65;

    // CSS座標に変換
    const cssLeft = (hx - dispW / 2) * scaleX;
    const cssTop  = (lineY + offsetY) * scaleY;
    const cssW    = dispW * scaleX;
    const cssH    = dispH * scaleY;

    const imgEl = document.createElement('img');
    imgEl.src = src;
    imgEl.style.cssText = `position:absolute;left:${cssLeft}px;top:${cssTop}px;width:${cssW}px;height:${cssH}px;`;
    layer.appendChild(imgEl);
  });
}

const NOTE_COLORS = { p:'#1a6b3a', g:'#c8920a', e:'#c8a000', l:'#c8a000', m:'#c8390a', _:'#1a1408' };

// パターン配列をAlphaTex文字列に変換
function buildBeats(pattern) {
  const beats = [];
  pattern.forEach((note, i) => {
    const isRest = !!NOTE_IS_REST[note.t] || note.t === 'r';
    const dur = NOTE_DUR[note.t] || 1;
    beats.push({ dur, isRest, type: note.t, idx: i });
  });
  return beats;
}

// 連続するtを3個ずつ三連符グループにまとめる
// 連符グループ検出（3・5・6・7・9連符に対応）
function findTripletGroups(beats) {
  const groups = [];
  let i = 0;

  // タイプごとの「1グループのサイズ」を定義
  // tは必ず3個で1グループ（六連符はt×3+t×3の2グループ）
  const TUPLET_SIZE = {
    't':  3,  // 三連符: 必ず3個で1グループ
    'p5': 5,  // 五連符: 5個で1グループ
    'p6': 6,  // 六連符: 6個で1グループ
    'p7': 7,  // 七連符: 7個で1グループ
    'p9': 9,  // 九連符: 9個で1グループ
  };

  while (i < beats.length) {
    const type = beats[i].type;
    if (!(type in TUPLET_SIZE) || beats[i].isRest) { i++; continue; }

    const groupSize = TUPLET_SIZE[type];
    const start = i;

    // groupSize個だけ進める
    let cnt = 0;
    while (i < beats.length && beats[i].type === type && !beats[i].isRest && cnt < groupSize) {
      i++; cnt++;
    }

    if (cnt === groupSize) {
      // ぴったりgroupSize個 → グループ登録
      groups.push({ start, end: start + groupSize - 1, count: groupSize, num: groupSize });
    } else {
      // 不完全なグループは単独扱いに戻す
      i = start + 1;
    }
  }
  return groups;
}

// ビームグループを検出
function findBeamGroups(beats, tripletGroups) {
  const tripletStarts = new Set(tripletGroups.map(g => g.start));
  // 全インデックスを登録（5連符は5個分、7連符は7個分すべて）
  const tripletAll = new Set(
    tripletGroups.flatMap(g =>
      Array.from({length: g.end - g.start + 1}, (_, k) => g.start + k)
    )
  );
  const groups = [];
  let i = 0;
  while (i < beats.length) {
    const b = beats[i];
    if (b.isRest || b.type === 'q' || b.type === 'h' || b.type === 'w' || b.type === 'q.') { i++; continue; }
    // 連符タイプ（t/p5/p7/p9）
    if (b.type === 't' || b.type === 'p5' || b.type === 'p6' || b.type === 'p7' || b.type === 'p9') {
      if (tripletStarts.has(i)) {
        const g = tripletGroups.find(g => g.start === i);
        const noteIdxs = Array.from({length: g.end - g.start + 1}, (_, k) => g.start + k);
        groups.push({ type: b.type, notes: noteIdxs, beamCount:1, tupletNum: g.num });
        i = g.end + 1;
      } else { i++; }
      continue;
    }
    // e or s: 1拍単位でグループ化（拍をまたいで繋がらない）
    const type = b.type;
    if (type !== 'e' && type !== 's') { i++; continue; }
    const maxBeats = 1.0; // 1グループは最大1拍分
    const noteDur  = NOTE_DUR[type] || 0.5;
    const start = i;
    let accumulated = 0;
    while (i < beats.length && beats[i].type === type && !beats[i].isRest) {
      if (accumulated + noteDur > maxBeats + 0.001) break; // 1拍超えたら切る
      accumulated += noteDur;
      i++;
    }
    if (i - start >= 2) {
      groups.push({ type, notes: Array.from({length:i-start},(_,k)=>start+k), beamCount: type==='s'?2:1 });
    }
    // 1個だけなら単独（フラッグで描く）
  }
  return groups;
}

function drawStaff() {
  const container = document.getElementById('atContainer');
  if (!container) return;
  container.innerHTML = '';

  if (typeof Vex === 'undefined') {
    container.innerHTML = '<div style="padding:20px;color:#aaa;text-align:center;">VexFlow読込中...</div>';
    setTimeout(drawStaff, 500);
    return;
  }

  const pattern = getPattern();
  const lv      = LEVELS[currentLevel];
  const VF      = Vex.Flow;
  const { Renderer, Stave, StaveNote, Voice, Formatter, Beam, Tuplet } = VF;

  const W  = Math.max(container.clientWidth || 360, 200);
  const SX = 10, SY = 20;
  const SW = W - SX * 2 - 4;

  const renderer = new Renderer(container, Renderer.Backends.SVG);
  renderer.resize(W, 110);
  const ctx = renderer.getContext();
  const svg = container.querySelector('svg');
  if (svg) svg.style.cssText = 'background:white;display:block;';

  // ── 一線パーカッション譜 ──
  const stave = new Stave(SX, SY, SW);
  stave.addClef('percussion');
  stave.addTimeSignature(lv.timeSig + '/4');
  stave.setNumLines(1);   // 一線譜
  stave.setContext(ctx).draw();

  // ── 音符タイプ → VexFlow duration 変換 ──
  const DUR_MAP = {
    q:    'q',   h:  'h',   w:  'w',
    'q.': 'qd',  e:  '8',   s:  '16',
    r:    'qr',  er: '8r',  sr: '16r',
    t:    '8',   p5: '8',   p6: '8',   p7: '8',   p9: '16',
  };
  const TUPLET_N = { t:3, p5:5, p6:6, p7:7, p9:9 };
  const DOTS = { 'q.': true };

  // ── 音符生成（連符グループを検出しながら順番に処理）──
  const allNotes   = [];   // 全StaveNote（Voice用）
  const tupletDefs = [];   // { notes: [], n: number } 連符グループ

  let pi = 0;
  let patIdx = 0; // pattern配列のインデックス（patternResultsと対応）
  while (pi < pattern.length) {
    const t = pattern[pi].t;
    const isRest = (t === 'r' || t === 'er' || t === 'sr');
    const tupN   = TUPLET_N[t];
    const dur    = DUR_MAP[t] || 'q';

    if (tupN) {
      const grpNotes = [];
      let cnt = 0;
      while (pi < pattern.length && pattern[pi].t === t && cnt < tupN) {
        const sn = makeNote(dur, isRest, VF, StaveNote);
        sn._patIdx = patIdx; // patternResultsとの対応用
        grpNotes.push(sn);
        allNotes.push(sn);
        pi++; patIdx++; cnt++;
      }
      if (grpNotes.length > 0) {
        tupletDefs.push({ notes: grpNotes, n: tupN,
          beatsOccupied: (t === 'p9') ? 2 : 1 });
      }
    } else {
      const sn = makeNote(dur, isRest, VF, StaveNote, DOTS[t]);
      sn._patIdx = patIdx;
      allNotes.push(sn);
      pi++; patIdx++;
    }
  }

  if (allNotes.length === 0) return;

  // ── Voice ──
  const voice = new Voice({ num_beats: lv.timeSig, beat_value: 4 }).setStrict(false);
  voice.addTickables(allNotes);

  // ── Formatter ──
  try {
    new Formatter().joinVoices([voice]).format([voice], SW - 90);
  } catch(e) {
    try { new Formatter().formatToStave([voice], stave); } catch(e2) {}
  }

  // ── 採点結果の色をStaveNoteに適用 ──
  allNotes.forEach((sn) => {
    const res = patternResults[sn._patIdx];
    if (!res) return;
    const col = NOTE_COLORS[res] || '#1a1408';
    try {
      sn.setStyle({ fillStyle: col, strokeStyle: col });
      if (sn.stem) sn.stem.setStyle({ fillStyle: col, strokeStyle: col });
      // 音符頭にも色を適用
      if (sn.noteHeads) sn.noteHeads.forEach(nh => {
        try { nh.setStyle({ fillStyle: col, strokeStyle: col }); } catch(e) {}
      });
    } catch(e) {}
  });

  // ── Voice描画 ──
  voice.draw(ctx, stave);

  // ── 各音符の実際のX座標を記録（カーソル・タップ線の正確な位置計算用）──
  // VexFlowが配置した音符頭の中心X座標を取得
  window._noteXPositions = []; // index = pattern index, value = VexFlow X座標
  window._noteTimeMsMap  = []; // index = pattern index, value = timeMs
  const _secPerBeat = 60 / bpm;
  let _timeSec = 0;
  allNotes.forEach(sn => {
    try {
      const nx = sn.getAbsoluteX();
      window._noteXPositions[sn._patIdx] = nx;
    } catch(e) {}
  });
  // timeMsも記録（patternと同期）
  pattern.forEach((n, i) => {
    const dur = NOTE_DUR[n.t] || 1;
    window._noteTimeMsMap[i] = _timeSec * 1000;
    _timeSec += dur * _secPerBeat;
  });

  // ── Beam: 連符以外の8分・16分をビームでまとめる ──
  const tupletNoteSet = new Set(tupletDefs.flatMap(g => g.notes));
  const beamableNotes = allNotes.filter(n => {
    if (n.isRest()) return false;
    if (tupletNoteSet.has(n)) return false;
    const d = n.getDuration();
    return d === '8' || d === '16';
  });
  // 手動でビームグループを作成（1拍単位）
  // 連続する音符を拍の境界で区切ってBeamを生成
  const beams = makeBeamGroups(beamableNotes, allNotes, pattern, lv.timeSig);
  beams.forEach(b => b.setContext(ctx).draw());

  // ── 連符: Beam + Tuplet ──
  tupletDefs.forEach(g => {
    try {
      // 連符グループのビーム
      if (g.notes.length >= 2 && !g.notes[0].isRest()) {
        const tb = new Beam(g.notes, true);
        tb.setContext(ctx).draw();
      }
      // 連符括弧（符尾上向き → 上に表示、数字のみ「3」）
      const tup = new Tuplet(g.notes, {
        num_notes:      g.n,
        beats_occupied: g.beatsOccupied || 1,
        location:       -1,      // -1=符尾と反対側=上（符尾上向きなら上）
        ratioed:        false,   // 「3:2」ではなく「3」だけ表示
        bracketed:      true,    // 括弧を表示
      });
      tup.setContext(ctx).draw();
    } catch(e) { console.warn('tuplet draw error', e); }
  });

  // 1拍目〜最終音符の実際のX座標を記録（SVG内部座標）
  // カーソル・タップ線の基準として使う
  try {
    const firstNote = allNotes[0];
    const lastNote  = allNotes[allNotes.length - 1];
    window._vfFirstNoteX = firstNote ? firstNote.getAbsoluteX() : stave.getNoteStartX();
    window._vfLastNoteX  = lastNote  ? lastNote.getAbsoluteX()  : SX + SW;
    // 最後の音符の1音符分先を終端とする（最後の音符の右端）
    const lastDur = lastNote ? lastNote.getWidth() : 20;
    window._vfEndX = window._vfLastNoteX + lastDur;
    // 後方互換
    window._vfStaveX    = window._vfFirstNoteX;
    window._vfStaveEndX = window._vfEndX;
  } catch(e) {
    window._vfStaveX    = stave.getNoteStartX();
    window._vfStaveEndX = SX + SW;
    window._vfFirstNoteX = window._vfStaveX;
    window._vfEndX       = window._vfStaveEndX;
  }
}

function makeNote(dur, isRest, VF, StaveNote, dotted) {
  const sn = new StaveNote({
    keys:           ['b/4'],
    duration:       dur,
    stem_direction: 1,
    clef:           'percussion',
  });
  if (dotted && VF.Dot) {
    VF.Dot.buildAndAttach([sn]);
  }
  return sn;
}

// 手動ビームグループ作成
// 全音符リストの中でbeamableNotesを1拍ずつに区切ってBeamオブジェクトを生成
function makeBeamGroups(beamableNotes, allNotes, pattern, timeSig) {
  if (beamableNotes.length === 0) return [];
  const VF = Vex.Flow;
  const beams = [];

  // allNotes内でのbeamableNotesの位置から拍境界を計算
  // 各音符のpatIdx → 拍位置（何拍目か）
  const secPerBeat = 60 / bpm;
  let beatPos = 0; // 累積拍数
  const noteBeats = {}; // patIdx → 累積拍数
  pattern.forEach((n, i) => {
    noteBeats[i] = beatPos;
    beatPos += NOTE_DUR[n.t] || 1;
  });

  // beamableNotesを拍単位でグループ化
  // 同じ整数拍に属する音符をまとめる
  const groups = {}; // beatIndex → [StaveNote]
  beamableNotes.forEach(sn => {
    const bi = Math.floor(noteBeats[sn._patIdx] + 0.001); // 何拍目か（0始まり）
    if (!groups[bi]) groups[bi] = [];
    groups[bi].push(sn);
  });

  // 各グループでBeamを作成（2音符以上あるもの）
  Object.values(groups).forEach(grp => {
    if (grp.length >= 2) {
      try {
        const beam = new VF.Beam(grp, true);
        beams.push(beam);
      } catch(e) { console.warn('beam error', e); }
    }
  });

  return beams;
}

const tapLineTimers = [];

// タップ位置の全記録（セッション終了後の残像用）
let _tapLineData = []; // { relMs, col } セッション中に蓄積

function showTapLine(tapRelMs) {

  const layer = document.getElementById('tapLineLayer');
  if (!layer) return;
  _tapLineData.push({ relMs: tapRelMs });

// SVGスケール比率を取得（VexFlow内部座標 → CSS表示座標）
function getSvgScale() {
  const container = document.getElementById('atContainer');
  if (!container) return 1;
  const svg = container.querySelector('svg');
  if (!svg) return 1;
  const svgW   = parseFloat(svg.getAttribute('width')  || svg.viewBox?.baseVal?.width  || 0);
  const dispW  = svg.getBoundingClientRect().width;
  return svgW > 0 && dispW > 0 ? dispW / svgW : 1;
}

// パターン全体のms → X座標（純粋な時間ベース線形補間）
// VexFlowのSVG座標をCSS座標に変換してから使う
function tapRelMsToX(relMs, sheetWrap) {
  const pattern    = getPattern();
  const secPerBeat = 60 / bpm;
  const totalDur   = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 0), 0);
  const totalMs    = totalDur * secPerBeat * 1000;

  // SVGスケールを考慮したnoteStart/noteEnd
  // _vfFirstNoteX = 1拍目音符の中心X（SVG内部座標）
  // _vfEndX       = 最終音符右端X（SVG内部座標）
  const scale     = getSvgScale();
  const noteStart = (window._vfFirstNoteX !== undefined ? window._vfFirstNoteX : 80) * scale;
  const noteEnd   = (window._vfEndX       !== undefined ? window._vfEndX       : 350) * scale;

  // 純粋な時間ベース線形補間
  const pct = Math.max(0, Math.min(1, relMs / totalMs));
  return noteStart + pct * (noteEnd - noteStart);
}

// 期待ビート位置 → X座標
function beatMsToX(beatMs, sheetWrap) {
  return tapRelMsToX(beatMs, sheetWrap);
}

// レイヤーを再描画（残像として全タップラインを描く）
function _renderTapLayer(showExpected) {
  const layer     = document.getElementById('tapLineLayer');
  const sheetWrap = document.getElementById('sheetWrap');
  if (!layer || !sheetWrap) return;

  // フラッシュ要素は残してラインだけ更新
  [...layer.querySelectorAll('.tap-line-persist')].forEach(e => e.remove());

  // タップ線（赤）
  _tapLineData.forEach(d => {
    const x   = tapRelMsToX(d.relMs);
    const el  = document.createElement('div');
    el.className = 'tap-line-persist';
    el.style.cssText = `
      position:absolute;
      left:${x - 1}px;
      top:8px;bottom:8px;
      width:2px;
      background:var(--accent);
      opacity:0.55;
      pointer-events:none;
      border-radius:1px;
    `;
    layer.appendChild(el);
  });

  // 期待ビート線（黒点線）
  if (showExpected && expectedBeats.length > 0) {
    expectedBeats.forEach(b => {
      const x  = beatMsToX(b.timeMs);
      const el = document.createElement('div');
      el.className = 'tap-line-persist';
      el.style.cssText = `
        position:absolute;
        left:${x}px;
        top:8px;bottom:8px;
        width:1px;
        background:var(--ink);
        opacity:0.25;
        pointer-events:none;
        border-style:dashed;
      `;
      layer.appendChild(el);
    });
  }
}

// セッション終了後：残像を確定表示
function freezeTapLines() {
  _renderTapLayer(true); // 期待ビート線も一緒に表示
}

function clearTapLines() {
  _tapLineData = [];
  const layer = document.getElementById('tapLineLayer');
  if (layer) layer.innerHTML = '';
  tapLineTimers.forEach(t => clearTimeout(t));
  tapLineTimers.length = 0;
}

// INPUT MODE (TAP / MIC)
// ============================================================
let inputMode = 'tap'; // 'tap' | 'mic'
let micStream = null;
let micAnalyser = null;
let micAnimFrame = null;
let micThreshold = 30;   // delta閾値（低いほど感度高い/3〜300で調整）
let micCooldownUntil = 0; // 連続検知防止のクールダウン(ms)
const MIC_COOLDOWN_MS = 150; // 最短打音間隔（残響・二重検知を防ぐ）

function setInputMode(mode) {
  inputMode = mode;
  document.getElementById('modeTap').classList.toggle('active', mode === 'tap');
  document.getElementById('modeMic').classList.toggle('active', mode === 'mic');
  document.getElementById('tapArea').style.opacity = mode === 'mic' ? '0.35' : '1';
  document.getElementById('tapArea').style.pointerEvents = mode === 'mic' ? 'none' : '';

  const box = document.getElementById('micInfoBox');
  if (mode === 'mic') {
    box.classList.add('show');
    startMic();
  } else {
    box.classList.remove('show');
    stopMic();
  }
}

async function startMic() {
  try {
    // iOSでは既存のStreamがあれば再利用（切断防止）
    if (micStream && micStream.active) {
      // 既に起動中 → analyserだけ再接続
      if (!micAnalyser) {
        const ac = getACtx();
        const source = ac.createMediaStreamSource(micStream);
        micAnalyser = ac.createAnalyser();
        micAnalyser.fftSize = 512;
        micAnalyser.smoothingTimeConstant = 0.0;
        source.connect(micAnalyser);
      }
      monitorMic();
      return;
    }
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    const ac = getACtx();
    // iOSではAudioContextをrunning状態に保つ
    if (ac.state === 'suspended') await ac.resume();
    const source = ac.createMediaStreamSource(micStream);
    micAnalyser = ac.createAnalyser();
    micAnalyser.fftSize = 512;
    micAnalyser.smoothingTimeConstant = 0.0;
    source.connect(micAnalyser);
    // iOSではstreamが切れないよう、ダミーノードに接続して保持
    const dummy = ac.createGain();
    dummy.gain.value = 0;
    micAnalyser.connect(dummy);
    dummy.connect(ac.destination);
    document.getElementById('micDot').classList.add('on');
    document.getElementById('micStateLabel').textContent = 'マイク ON';
    monitorMic();
  } catch(e) {
    alert('マイクのアクセスが許可されていません:\n' + e.message);
    setInputMode('tap');
  }
}

function stopMic() {
  // TAPモードに戻ってもstreamは切らない（iOSで再許可が必要になるため）
  if (micAnimFrame) { cancelAnimationFrame(micAnimFrame); micAnimFrame = null; }
  const dot = document.getElementById('micDot');
  const lbl = document.getElementById('micStateLabel');
  if (dot) { dot.classList.remove('on','hit'); }
  if (lbl) { lbl.textContent = 'マイク OFF'; }
  const fill = document.getElementById('micBarFill');
  if (fill) fill.style.width = '0%';
}

function monitorMic() {
  if (!micAnalyser) return;
  const buf = new Uint8Array(micAnalyser.frequencyBinCount);

  // ★ アタック検知用: 前フレームのピーク音量を保持
  let prevPeak = 0;
  // 直近の音量履歴（背景ノイズレベル推定用）
  const peakHistory = new Array(20).fill(0);
  let histIdx = 0;

  function tick() {
    micAnimFrame = requestAnimationFrame(tick);
    micAnalyser.getByteFrequencyData(buf);

    // 全帯域のピーク音量を計算
    let peak = 0;
    for (let i = 0; i < buf.length; i++) peak = Math.max(peak, buf[i]);

    // 背景ノイズレベル（直近20フレームの平均）
    peakHistory[histIdx % peakHistory.length] = peak;
    histIdx++;
    const bgLevel = peakHistory.reduce((a, b) => a + b, 0) / peakHistory.length;

    // ★ アタック = 前フレームからの急激な上昇量
    const delta = peak - prevPeak;
    prevPeak = peak;

    // メーターバー・ステータス更新
    const hitDetected = delta >= micThreshold && peak > bgLevel + 10;
    const barFill  = document.getElementById('micBarFill');
    const dot      = document.getElementById('micDot');
    const hitLabel = document.getElementById('micHitLabel');
    if (barFill) {
      const pct = Math.min(100, Math.max(0, delta / Math.max(micThreshold, 1) * 60));
      barFill.style.width = pct + '%';
    }
    if (dot) {
      dot.classList.toggle('hit', hitDetected);
      dot.classList.toggle('on',  !hitDetected);
    }
    if (hitLabel) {
      hitLabel.classList.toggle('show', hitDetected);
    }

    // ★ 打音判定:
    //   1. 前フレームからの音量上昇(delta)が閾値以上
    //   2. 現在音量が背景ノイズより十分高い
    //   3. クールダウン中でない
    if (sessionPhase === 'playing') {
      const now = performance.now();
      if (hitDetected && now > micCooldownUntil) {
        micCooldownUntil = now + MIC_COOLDOWN_MS;
        onHit();
      }
    }
  }
  tick();
}

// ============================================================
// GAME LOGIC
// ============================================================
function setBpm(v) {
  bpm = v;
  document.getElementById('bpmNum').textContent = v;
  document.getElementById('bpmChip').textContent = `♩= ${v}`;
}

function buildExpectedBeats() {
  const pattern    = getPattern();
  const secPerBeat = 60 / bpm;
  let timeSec = 0; // パターン開始からの経過秒
  const beats = [];
  pattern.forEach((note, i) => {
    const isRest = !!NOTE_IS_REST[note.t] || note.t === 'r';
    const dur    = NOTE_DUR[note.t] || 1; // 拍数
    // timeMs = パターン開始からの経過ms（秒に変換してからms）
    // dur拍 × secPerBeat秒/拍 = 経過秒
    if (!isRest) beats.push({ timeSec, timeMs: timeSec * 1000, idx: i, dur });
    timeSec += dur * secPerBeat; // 次の音符の開始時刻（秒）
  });
  return beats;
}


function startSession() {
  if (sessionPhase === 'playing' || sessionPhase === 'countdown') {
    stopSession();
    return;
  }
  getACtx();
  patternResults = [];
  tapLog = [];
  clearTapLines();
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('startBtn').textContent = '⏹ 停止';
  sessionPhase = 'countdown';

  const ac = getACtx();
  const secPerBeat = 60 / bpm;

  // ac と performance.now を同時取得
  const acBase = ac.currentTime;
  const pnBase = performance.now();
  function acToPn(acT) { return pnBase + (acT - acBase) * 1000; }

  // インカウント: 1・2・3・4
  const countBeats = 4;
  const countStartAC = acBase + 0.08;
  for (let i = 0; i < countBeats; i++) {
    playClick(countStartAC + i * secPerBeat, i === 0);
  }

  // patternStartAC = 4拍目の次の頭
  patternStartAC = countStartAC + countBeats * secPerBeat;
  patternStartPN = acToPn(patternStartAC);

  // UI数字表示
  for (let i = 0; i < countBeats; i++) {
    const delayMs = acToPn(countStartAC + i * secPerBeat) - pnBase;
    setTimeout(() => {
      if (sessionPhase === 'idle') return;
      document.getElementById('feedbackMain').textContent = i + 1;
      document.getElementById('feedbackMain').className = 'feedback-main ready';
      document.getElementById('feedbackSub').textContent = 'インカウント';
    }, delayMs);
  }

  // ★ 4拍目が鳴るタイミングでplayingに移行 & beginPlay()をスケジュール
  // 4拍目 = countStartAC + 3 * secPerBeat
  const beat4AC  = countStartAC + 3 * secPerBeat;
  const beat4Pn  = acToPn(beat4AC);

  // 4拍目クリックが鳴る直前にplayingにして、タップ受付開始
  setTimeout(() => {
    if (sessionPhase === 'idle') return;
    sessionPhase = 'playing';
    expectedBeats = buildExpectedBeats();
    document.getElementById('feedbackMain').textContent = '4';
    document.getElementById('feedbackSub').textContent  = '← ここから叩ける';
  }, Math.max(0, beat4Pn - pnBase - 10));

  // patternStart直前にbeginPlay（メトロノーム・カーソル開始）
  const beginDelay = patternStartPN - pnBase - 30;
  setTimeout(() => {
    if (sessionPhase !== 'playing') return;
    beginPlay();
  }, Math.max(0, beginDelay));
}

function beginPlay() {
  // sessionPhaseはstartSession内で既にplayingに設定済み
  document.getElementById('feedbackMain').textContent = 'TAP!';
  document.getElementById('feedbackMain').className = 'feedback-main ready';
  document.getElementById('feedbackSub').textContent = '';
  const pattern = getPattern();
  const lv = LEVELS[currentLevel];
  const ac = getACtx();
  const secPerBeat = 60 / bpm;
  const totalDurBeats = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 1), 0);
  const totalMs = totalDurBeats * secPerBeat * 1000;

  // ★ メトロノームをパターン開始と同じタイムラインでスケジュール
  for (let b = 0; b < Math.ceil(totalDurBeats); b++) {
    playClick(patternStartAC + b * secPerBeat, b % lv.timeSig === 0);
  }

  // ★ バーアニメーション
  const cursorEl  = document.getElementById('cursorLine');
  const container = document.getElementById('atContainer');

  // SVGスケールを一度だけ計算
  const svgEl    = container ? container.querySelector('svg') : null;
  const svgIntW  = svgEl ? parseFloat(svgEl.getAttribute('width') || '0') : 0;
  const svgDispW = svgEl ? svgEl.getBoundingClientRect().width : 0;
  const svgScale = (svgIntW > 0 && svgDispW > 0) ? svgDispW / svgIntW : 1;

  // atContainerのsheetWrap内でのオフセットも加算
  const sheetWrapEl  = document.getElementById('sheetWrap');
  const atEl         = container;
  const offsetX = (atEl && sheetWrapEl)
    ? atEl.getBoundingClientRect().left - sheetWrapEl.getBoundingClientRect().left
    : 0;
  const x0 = (window._vfFirstNoteX || 80)  * svgScale + offsetX;
  const x1 = (window._vfEndX       || 350) * svgScale + offsetX;

  window._cursorX0      = x0;
  window._cursorX1      = x1;
  window._cursorTotalMs = totalMs;

  // ★ beginPlay()が呼ばれた瞬間のACとPNを同時取得して対応付け
  const acNow = ac.currentTime;
  const pnNow = performance.now();
  // patternStartACに対応するperformance.now
  // (patternStartACはAudioCtxのスケジュール時刻なので未来の場合もある)
  const animStartPN = pnNow + (patternStartAC - acNow) * 1000;

  cursorEl.style.display = 'block';
  cursorEl.style.left    = x0 + 'px';

  function animCursor() {
    if (sessionPhase !== 'playing') return;
    const elapsedMs = performance.now() - animStartPN;
    if (elapsedMs < 0) {
      requestAnimationFrame(animCursor);
      return;
    }
    const pct     = Math.min(1, elapsedMs / totalMs);
    const cursorX = x0 + pct * (x1 - x0);
    cursorEl.style.left = cursorX + 'px';

    if (elapsedMs < totalMs) {
      requestAnimationFrame(animCursor);
    } else {
      cursorEl.style.display = 'none';
      setTimeout(evalSession, 200);
    }
  }
  requestAnimationFrame(animCursor);

  // フォールバック終了タイマー
  gameTimer = setTimeout(() => {
    if (sessionPhase === 'playing') evalSession();
  }, totalMs + 800);
}

function stopSession() {
  sessionPhase = 'idle';
  clearTimeout(countdownTimer);
  clearTimeout(gameTimer);
  document.getElementById('cursorLine').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ スタート';
  document.getElementById('feedbackMain').textContent = '停止しました';
  document.getElementById('feedbackMain').className = 'feedback-main ready';
  // マイクはモードが変わるまで継続（停止しない）
}

function onTap(e) {
  e.preventDefault();
  if (sessionPhase !== 'playing') return;
  if (inputMode === 'mic') return; // micモード中はタップ無効

  // タップビジュアル
  const btn = document.getElementById('tapArea');
  btn.classList.add('hit');
  setTimeout(() => btn.classList.remove('hit'), 80);
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.cssText = 'width:80px;height:80px;left:50%;top:50%;margin-left:-40px;margin-top:-40px;position:absolute;';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  onHit();
}

// タップ・マイク共通の判定処理
function onHit() {
  if (sessionPhase !== 'playing') return;

  // ★ AudioCtx基準でタップ時刻を記録
  // patternStartAC より前の打音（1拍目直前の早打ち）も拾えるよう
  // clampせずそのままの値を使う
  const ac = getACtx();
  const tapRelMs = (ac.currentTime - patternStartAC) * 1000;

  playSnare();
  tapLog.push(tapRelMs);
  showTapLine(tapRelMs);  // タップ位置を赤線で表示

  // 判定ウィンドウ
  const PERFECT_EARLY = 80,  PERFECT_LATE = 80;   // ±80ms でPERFECT
  const GOOD_EARLY    = 200, GOOD_LATE    = 160;   // 前方向は200msまで許容

  let bestDiff = 999999, bestB = null;
  expectedBeats.forEach(b => {
    const diff = tapRelMs - b.timeMs;
    // 判定ウィンドウ内かどうか
    if (diff >= -GOOD_EARLY && diff <= GOOD_LATE) {
      const absDiff = Math.abs(diff);
      if (absDiff < Math.abs(bestDiff)) { bestDiff = diff; bestB = b; }
    }
  });

  if (!bestB) {
    // ウィンドウ外 = MISS（フィードバックはしない：どの音符にも対応しない打音）
    return;
  }
  if (bestDiff >= -PERFECT_EARLY && bestDiff <= PERFECT_LATE) {
    showFeedback('PERFECT!', 'perfect', '');
  } else {
    showFeedback(bestDiff < 0 ? 'EARLY' : 'LATE', bestDiff < 0 ? 'early' : 'late', '');
  }
}

function evalSession() {
  sessionPhase = 'result';
  document.getElementById('cursorLine').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ スタート';

  const PERFECT_EARLY = 80,  PERFECT_LATE = 80;
  const GOOD_EARLY    = 200, GOOD_LATE    = 160;
  const pattern = getPattern();
  const usedTaps = new Set();
  const results = new Array(pattern.length).fill('m');

  expectedBeats.forEach(b => {
    let best = null, bestDiff = 999999;
    tapLog.forEach((t, i) => {
      if (usedTaps.has(i)) return;
      const diff = t - b.timeMs;
      if (diff >= -GOOD_EARLY && diff <= GOOD_LATE) {
        if (Math.abs(diff) < Math.abs(bestDiff)) { best = i; bestDiff = diff; }
      }
    });
    if (best !== null) {
      usedTaps.add(best);
      const diff = tapLog[best] - b.timeMs;
      if (diff >= -PERFECT_EARLY && diff <= PERFECT_LATE) results[b.idx] = 'p';
      else if (diff < 0) results[b.idx] = 'e';
      else results[b.idx] = 'l';
    }
  });

  patternResults = results;
  drawStaff();
  renderDots(results);

  const total = expectedBeats.length;
  const p = results.filter(r => r === 'p').length;
  const g = results.filter(r => r === 'e' || r === 'l').length;
  const m = results.filter(r => r === 'm').length;
  const acc = total > 0 ? Math.round((p * 100 + g * 50) / (total * 100) * 100) : 0;
  const earned = p * 120 + g * 60 - m * 30;
  totalScore += Math.max(0, earned);

  const grade = acc >= 95 ? 'S' : acc >= 80 ? 'A' : acc >= 65 ? 'B' : acc >= 50 ? 'C' : 'D';
  if (acc >= 60) { streak++; xp += Math.max(0, earned); }
  else { streak = 0; }

  if (acc >= 70 && currentLevel + 1 < LEVELS.length && LEVELS[currentLevel + 1].id > unlockedLevel) {
    unlockedLevel = LEVELS[currentLevel + 1].id;
    localStorage.setItem('snare_unlockedLevel', unlockedLevel);
    renderLevelPills();
  }
  updateWeakBtn();

  updateXP();
  document.getElementById('scoreVal').textContent = totalScore;
  document.getElementById('weakModeBanner').style.display = weakPatternMode ? 'block' : 'none';
  document.getElementById('streakBadge').textContent = streak > 1 ? `🔥${streak}連続` : '';
  document.getElementById('rP').textContent = p;
  document.getElementById('rG').textContent = g;
  document.getElementById('rM').textContent = m;
  document.getElementById('rAcc').textContent = acc + '%';
  const gradeEl = document.getElementById('resultGrade');
  gradeEl.textContent = grade;
  gradeEl.className = 'result-grade grade-' + grade;
  document.getElementById('resultCard').style.display = 'block';

  const msgs = { S: '完璧！素晴らしい！', A: 'Great！良い精度です', B: 'Good！もう少し！', C: 'Keep going!', D: 'また練習しよう' };
  showFeedback(
    grade === 'S' ? 'PERFECT!' : grade === 'A' ? 'GREAT!' : grade === 'B' ? 'GOOD!' : 'KEEP GOING',
    grade === 'S' || grade === 'A' ? 'perfect' : grade === 'B' ? 'good' : 'miss',
    msgs[grade]
  );
}

function showFeedback(main, cls, sub) {
  const el = document.getElementById('feedbackMain');
  el.textContent = main;
  el.className = 'feedback-main ' + (cls || 'ready');
  document.getElementById('feedbackSub').textContent = sub || '';
}

function renderDots(results) {
  const row = document.getElementById('dotsRow');
  row.innerHTML = results.map(r => `<div class="dot ${r || ''}"></div>`).join('');
}

// ============================================================
// LISTEN MODE
// ============================================================
function listenPattern() {
  if (sessionPhase === 'playing' || sessionPhase === 'countdown') return;
  const ac = getACtx();
  const pattern = getPattern();
  const lv = LEVELS[currentLevel];
  const secPerBeat = 60 / bpm;
  const startT = ac.currentTime + 0.15;
  const totalDur = pattern.reduce((s, n) => s + (NOTE_DUR[n.t] || 1), 0);

  for (let b = 0; b < Math.ceil(totalDur); b++) {
    playClick(startT + b * secPerBeat, b % lv.timeSig === 0);
  }
  let timeOff = 0;
  pattern.forEach(note => {
    if (!NOTE_IS_REST[note.t] && note.t !== 'r') playSnare(startT + timeOff * secPerBeat);
    timeOff += (NOTE_DUR[note.t] || 1);
  });
  showFeedback('LISTEN...', 'ready', 'メトロノームと音を聴いて覚えよう');
}

// ============================================================
// PATTERN NAVIGATION
// ============================================================
function nextPattern() {
  if (weakPatternMode) {
    weakPatternIndex = (weakPatternIndex + 1) % weakPatterns.length;
    currentWeakPattern = weakPatterns[weakPatternIndex] ? weakPatterns[weakPatternIndex].pattern : null;
    updateWeakModeLabel();
  } else {
    refreshPattern();
  }
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('weakBtn') && updateWeakBtn();
  showFeedback('譜面を読んでスタート', 'ready', '');
  drawStaff();
}

function updateWeakModeLabel() {
  const lbl = document.getElementById('patNumLabel');
  if (weakPatternMode) {
    lbl.textContent = `苦手 ${weakPatternIndex+1}/${weakPatterns.length}`;
  } else {
    lbl.textContent = 'ランダム';
  }
}

function updateWeakBtn() {
  const btn = document.getElementById('weakBtn');
  if (!btn) return;
  const key = patternToKey(getPattern());
  const isWeak = weakPatterns.some(w => w.key === key);
  btn.textContent = isWeak ? '★ 苦手登録済' : '☆ 苦手に追加';
  btn.style.borderColor = isWeak ? 'var(--gold)' : 'var(--border)';
  btn.style.color = isWeak ? 'var(--gold)' : 'var(--muted)';
}

function toggleWeak() {
  const pattern = getPattern();
  const key = patternToKey(pattern);
  const idx = weakPatterns.findIndex(w => w.key === key);
  const lv = LEVELS[currentLevel];
  if (idx >= 0) {
    weakPatterns.splice(idx, 1);
  } else {
    weakPatterns.push({ key, pattern: JSON.parse(JSON.stringify(pattern)), levelId: lv.id, levelName: lv.name, addedAt: Date.now() });
  }
  localStorage.setItem('snare_weakPatterns', JSON.stringify(weakPatterns));
  updateWeakBtn();
  renderWeakList();
}

function enterWeakMode() {
  if (!weakPatterns.length) { alert('苦手パターンがまだありません'); return; }
  weakPatternMode = true;
  weakPatternIndex = 0;
  currentWeakPattern = weakPatterns[0].pattern;
  // レベルを合わせる
  const lvIdx = LEVELS.findIndex(l => l.id === weakPatterns[0].levelId);
  if (lvIdx >= 0) selectLevel(lvIdx, true);
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn();
  showFeedback('苦手パターン練習', 'ready', '');
  drawStaff();
  // 苦手パネルを閉じる
  document.getElementById('weakPanel').style.display = 'none';
}

function exitWeakMode() {
  weakPatternMode = false;
  currentWeakPattern = null;
  refreshPattern();
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn();
  showFeedback('譜面を読んでスタート', 'ready', '');
  drawStaff();
}

function renderWeakList() {
  const list = document.getElementById('weakList');
  if (!list) return;
  if (!weakPatterns.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;">苦手パターンはまだありません</div>';
    return;
  }
  list.innerHTML = weakPatterns.map((w, i) => `
    <div class="weak-item" onclick="previewWeak(${i})">
      <div class="weak-item-left">
        <span class="weak-lv-badge">${w.levelName}</span>
        <span class="weak-notes">${w.key.replace(/,/g,' ')}</span>
      </div>
      <button class="weak-del" onclick="event.stopPropagation();deleteWeak(${i})">✕</button>
    </div>
  `).join('');
}

function previewWeak(i) {
  weakPatternMode = true;
  weakPatternIndex = i;
  currentWeakPattern = weakPatterns[i].pattern;
  const lvIdx = LEVELS.findIndex(l => l.id === weakPatterns[i].levelId);
  if (lvIdx >= 0) selectLevel(lvIdx, true);
  patternResults = [];
  tapLog = [];
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn();
  showFeedback('苦手パターン練習', 'ready', '');
  drawStaff();
  document.getElementById('weakPanel').style.display = 'none';
}

function deleteWeak(i) {
  weakPatterns.splice(i, 1);
  localStorage.setItem('snare_weakPatterns', JSON.stringify(weakPatterns));
  renderWeakList();
  updateWeakBtn();
  if (weakPatternMode && weakPatterns.length === 0) exitWeakMode();
}

// ============================================================
// LEVEL PILLS
// ============================================================
function renderLevelPills() {
  const wrap = document.getElementById('levelPills');
  wrap.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const locked = lv.id > unlockedLevel;
    const pill = document.createElement('div');
    pill.className = 'level-pill' + (i === currentLevel ? ' active' : '') + (locked ? ' locked' : '');
    pill.textContent = locked ? `🔒${lv.name}` : lv.name;
    if (!locked) pill.onclick = () => selectLevel(i);
    wrap.appendChild(pill);
  });
}

function selectLevel(i, keepWeakMode = false) {
  if (LEVELS[i].id > unlockedLevel) return;
  currentLevel = i;
  if (!keepWeakMode) { weakPatternMode = false; currentWeakPattern = null; refreshPattern(); }
  patternResults = []; tapLog = [];
  const lv = LEVELS[i];
  bpm = lv.bpm;
  document.getElementById('bpmSlider').value = bpm;
  document.getElementById('bpmNum').textContent = bpm;
  document.getElementById('bpmChip').textContent = `♩= ${bpm}`;
  document.getElementById('levelChip').textContent = lv.name;
  document.getElementById('levelDesc').textContent = lv.desc;
  document.getElementById('timeSigLabel').textContent = `${lv.timeSig}/4拍子`;
  document.getElementById('dotsRow').innerHTML = '';
  document.getElementById('resultCard').style.display = 'none';
  updateWeakModeLabel();
  updateWeakBtn && updateWeakBtn();
  showFeedback('譜面を読んでスタート', 'ready', '');
  renderLevelPills();
  drawStaff();
}

function updateXP() {
  const maxXP = LEVELS[currentLevel].id * 500;
  document.getElementById('xpFill').style.width = Math.min(100, xp / maxXP * 100) + '%';
}

// ============================================================
// INIT
// ============================================================
function toggleWeakPanel() {
  const panel = document.getElementById('weakPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) renderWeakList();
}

window.addEventListener('load', () => {
  renderLevelPills();
  refreshPattern();
  drawStaff();
  updateWeakBtn();
  renderWeakList();
  updateWeakModeLabel();
});

// デバッグ用: localStorage リセット（コンソールから呼べる）
function resetProgress() {
  localStorage.removeItem('snare_unlockedLevel');
  unlockedLevel = 1;
  renderLevelPills();
}

window.addEventListener('resize', () => { drawStaff(); });
</script>
